<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct - Zol Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #0b141a; font-family: 'Tajawal', sans-serif; color: white; }
        
        /* مطابقة تنسيق الموقع المطلوب */
        .iti { width: 100%; display: block; }
        .iti__flag-container { border-radius: 12px 0 0 12px; }
        .iti__selected-flag { background-color: #202c33 !important; padding: 0 15px !important; border-radius: 12px 0 0 12px; }
        
        /* قائمة الدول والبحث */
        .iti__country-list { 
            background-color: #111b21 !important; 
            border: 1px solid #2a3942 !important; 
            color: white !important;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 320px;
        }
        .iti__search-input {
            background-color: #202c33 !important;
            color: white !important;
            border: 1px solid #3b4a54 !important;
            padding: 10px !important;
            margin: 8px !important;
            border-radius: 8px !important;
            width: calc(100% - 16px) !important;
            text-align: right;
        }
        .iti__country:hover { background-color: #2a3942 !important; }
        .iti__dial-code { color: #25D366 !important; font-weight: bold; }

        /* تنسيق الحقل */
        .phone-field {
            background-color: #2a3942 !important;
            border: 1px solid #3b4a54 !important;
            color: white !important;
            font-size: 1.25rem !important;
            padding: 15px 15px 15px 100px !important; /* مساحة للعلم والمفتاح */
            border-radius: 15px !important;
            width: 100%;
            outline: none;
        }
        .phone-field:focus { border-color: #25D366 !important; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-8 rounded-[2rem] shadow-2xl border border-white/5">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-[#25D366]">مراسلة واتساب مباشرة</h1>
            <p class="text-gray-400 text-sm mt-2">مثل الموقع المطلوب - بحث وربط تلقائي</p>
        </div>

        <div class="space-y-6">
            <div class="relative" dir="ltr">
                <label class="block text-right text-[11px] font-bold text-gray-500 uppercase mb-2 mr-2">رقم الجوال</label>
                <input type="tel" id="phone" class="phone-field" placeholder="50xxxxxxx">
            </div>

            <div class="text-right">
                <label class="block text-[11px] font-bold text-gray-500 uppercase mb-2 mr-2">الرسالة (اختياري)</label>
                <textarea id="message" rows="3" class="w-full bg-[#2a3942] border border-[#3b4a54] rounded-2xl p-4 text-white outline-none focus:border-[#25D366] resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="send()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-black py-4 rounded-2xl font-bold text-xl transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2">
                <span>إرسال عبر واتساب</span>
            </button>
        </div>
        
        <p class="text-center text-[10px] text-gray-600 mt-8 tracking-widest uppercase">Smart Dialing System 2026</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script>
        const phoneInput = document.querySelector("#phone");

        // خارطة أسماء الدول بالعربي لدعم البحث
        const arabicMap = {
            "sa": "السعودية", "eg": "مصر", "sd": "السودان", "ae": "الإمارات",
            "kw": "الكويت", "qa": "قطر", "jo": "الأردن", "ps": "فلسطين",
            "iq": "العراق", "ye": "اليمن", "ma": "المغرب", "dz": "الجزائر",
            "sy": "سوريا", "lb": "لبنان", "ly": "ليبيا", "om": "عمان", "bh": "البحرين"
        };

        // تهيئة المكتبة بنفس منطق الموقع المذكور
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "sa",
            separateDialCode: true, // إظهار المفتاح بجانب العلم
            countrySearch: true,    // تفعيل محرك البحث
            i18n: { 
                searchPlaceholder: "بحث عن دولة...",
                ...arabicMap 
            },
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        // ميزة "الذكاء": إذا كتب المستخدم مفتاح الدولة يدوياً يتغير العلم
        phoneInput.addEventListener('input', function() {
            const fullValue = phoneInput.value;
            // التحقق إذا كان المستخدم يحاول كتابة كود دولة
            if (fullValue.startsWith('+') || fullValue.length > 1) {
                // المكتبة تقوم بالتعرف التلقائي على الكود وتغيير العلم
            }
        });

        function send() {
            const number = iti.getNumber(); // يجلب الرقم كاملاً مع الكود
            const msg = encodeURIComponent(document.getElementById('message').value);
            
            if (!iti.isValidNumber()) {
                alert("يرجى إدخال رقم هاتف صحيح");
                return;
            }

            // فتح الرابط المباشر
            const finalUrl = `https://wa.me/${number.replace('+', '')}?text=${msg}`;
            window.open(finalUrl, '_blank');
        }
    </script>
</body>
</html>
