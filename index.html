<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Pro - المراسلة المباشرة</title>
    
    <meta name="theme-color" content="#00a884">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --brand: #00a884; --dark: #111b21; --bg: #f0f2f5; 
            --surface: #ffffff; --text: #111b21; --gray: #667781; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .app-shell { width: 100%; max-width: 500px; background: var(--surface); height: 100%; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); }

        /* الهيدر */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: #fff; }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-section img { width: 40px; height: 40px; border-radius: 10px; }
        .logo-section h1 { font-size: 18px; font-weight: 800; color: var(--brand); }

        .btn-lang { background: var(--bg); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; }

        /* المحتوى الرئيسي */
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .section-label { font-size: 13px; font-weight: 700; color: var(--gray); margin-bottom: 6px; display: block; }

        /* حقول الإدخال */
        .input-wrapper { display: flex; gap: 10px; align-items: center; }
        .country-select { display: flex; align-items: center; background: var(--bg); border-radius: 15px; padding: 0 12px; width: 110px; height: 60px; flex-shrink: 0; border: 2px solid transparent; }
        .dial-input { width: 100%; border: none; background: transparent; font-weight: 800; font-size: 18px; text-align: center; outline: none; }
        .phone-input { flex: 1; height: 60px; background: var(--bg); border-radius: 15px; border: 2px solid transparent; padding: 0 15px; font-size: 20px; font-weight: 800; outline: none; }
        .phone-input:focus { border-color: var(--brand); background: #fff; }

        /* الرسائل والشرائح */
        .msg-box { width: 100%; height: 100px; background: var(--bg); border-radius: 15px; border: none; padding: 15px; font-size: 16px; outline: none; resize: none; }
        .chips-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chips-scroll::-webkit-scrollbar { display: none; }
        .chip { background: #e7f8ef; color: var(--brand); border: none; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .chip:active { transform: scale(0.95); background: var(--brand); color: #fff; }

        /* الأزرار */
        .btn-main { width: 100%; height: 60px; border-radius: 20px; border: none; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; margin-bottom: 10px; }
        .btn-send { background: var(--brand); color: #fff; box-shadow: 0 10px 20px rgba(0,168,132,0.2); }
        .btn-qr { background: var(--dark); color: #fff; }
        .btn-install { background: linear-gradient(45deg, #0072ff, #00d2ff); color: white; display: none; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        /* شريط التنقل السفلي */
        nav { background: #fff; padding: 10px 5px; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-item { border: none; background: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; cursor: pointer; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--brand); }
        .nav-item i { font-size: 20px; }

        /* واجهة الباركود والسجل */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        .scan-ui { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scan-bracket { width: 260px; height: 260px; border: 4px solid #fff; border-radius: 30px; position: relative; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); }
        .scan-beam { position: absolute; width: 100%; height: 3px; background: var(--brand); top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px var(--brand); }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; display: none; align-items: flex-end; }
        .modal-sheet { width: 100%; background: #fff; border-radius: 30px 30px 0 0; padding: 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-sheet.show { transform: translateY(0); }
    </style>
</head>
<body>

<div id="qr-overlay" class="overlay">
    <video id="video-preview"></video>
    <div class="scan-ui">
        <button onclick="closeScanner()" style="position:absolute; top:40px; left:20px; padding:12px 25px; border-radius:30px; border:none; background:rgba(255,255,255,0.2); color:#fff; font-weight:bold; backdrop-filter:blur(10px);">إغلاق</button>
        <div class="scan-bracket"><div class="scan-beam"></div></div>
        <p style="color:#fff; margin-top:30px; font-weight:bold;">ضع الرمز داخل المربع</p>
    </div>
</div>

<div class="app-shell">
    <header>
        <div class="logo-section">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png">
            <h1>واتساب برو</h1>
        </div>
        <button class="btn-lang" onclick="toggleLanguage()" id="langBtn">English</button>
    </header>

    <main>
        <button id="installBtn" class="btn-main btn-install" onclick="executeInstall()">تثبيت التطبيق على الهاتف <i class="fas fa-download"></i></button>

        <div>
            <span class="section-label" id="lbl-phone">رقم الجوال</span>
            <div class="input-wrapper">
                <div class="country-select">
                    <span id="flag" class="flag-icon flag-icon-sd"></span>
                    <span style="font-weight:900; margin:0 5px;">+</span>
                    <input type="tel" id="dial" class="dial-input" value="249">
                </div>
                <input type="tel" id="phone" class="phone-input" placeholder="500000000">
            </div>
        </div>

        <div>
            <span class="section-label" id="lbl-msg">الرسالة المقترحة</span>
            <textarea id="msg" class="msg-box">السلام عليكم</textarea>
            <div class="chips-scroll" id="chips-container">
                </div>
        </div>

        <button class="btn-main btn-send" onclick="sendNow()"><span id="txt-send">إرسال الآن</span> <i class="fas fa-paper-plane"></i></button>
        <button class="btn-main btn-qr" onclick="openScanner()"><span id="txt-scan">مسح باركود</span> <i class="fas fa-qrcode"></i></button>
    </main>

    <div id="historyModal" class="modal" onclick="closeHistory()">
        <div class="modal-sheet" id="historySheet" onclick="event.stopPropagation()">
            <h3 style="text-align:center; margin-bottom:20px;" id="txt-hist-title">آخر المراسلات</h3>
            <div id="historyEntries"></div>
            <button onclick="closeHistory()" style="width:100%; padding:15px; margin-top:15px; border:none; border-radius:15px; background:var(--bg); font-weight:bold;">إغلاق</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><span id="nav-home">الرئيسية</span></div>
        <div class="nav-item" onclick="openHistory()"><i class="fas fa-clock-rotate-left"></i><span id="nav-hist">السجل</span></div>
        <div class="nav-item" onclick="window.location.href='https://t.me/your_support'"><i class="fas fa-headset"></i><span id="nav-supp">الدعم</span></div>
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-rotate"></i><span id="nav-refr">تحديث</span></div>
    </nav>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let countries = [];
    let currentLang = 'ar';

    // 1. الرسائل المقترحة
    const suggestions = {
        ar: ["السلام عليكم", "بكم السعر؟", "متوفر؟", "أين الموقع؟"],
        en: ["Hello", "Price please?", "Is it available?", "Location?"]
    };

    async function init() {
        renderChips();
        
        // جلب الدول لربط الأعلام والمفاتيح
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,cca2');
            countries = await res.json();
            
            // تحديد الدولة تلقائياً
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            document.getElementById('dial').value = geo.country_calling_code.replace('+', '');
            document.getElementById('flag').className = `flag-icon flag-icon-${geo.country_code.toLowerCase()}`;
        } catch(e) { console.log("Offline mode"); }

        // مراقبة كتابة المفتاح لتغيير العلم
        document.getElementById('dial').oninput = (e) => {
            const val = e.target.value.trim();
            const found = countries.find(c => (c.idd.root + (c.idd.suffixes?.[0] || "")).replace('+', '') === val);
            if(found) document.getElementById('flag').className = `flag-icon flag-icon-${found.cca2.toLowerCase()}`;
        };
    }

    function renderChips() {
        const container = document.getElementById('chips-container');
        container.innerHTML = '';
        suggestions[currentLang].forEach(s => {
            const b = document.createElement('button'); b.className = 'chip'; b.innerText = s;
            b.onclick = () => document.getElementById('msg').value = s;
            container.appendChild(b);
        });
    }

    // 2. الكاميرا والباركود
    async function openScanner() {
        document.getElementById('qr-overlay').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video-preview', (result) => {
            if (result) {
                let val = result.text;
                document.getElementById('phone').value = val.includes('wa.me/') ? val.split('wa.me/')[1].split('?')[0] : val.replace(/\D/g, '');
                closeScanner();
            }
        });
    }
    function closeScanner() { codeReader.reset(); document.getElementById('qr-overlay').style.display = 'none'; }

    // 3. السجل المتقدم
    function sendNow() {
        const full = document.getElementById('dial').value + document.getElementById('phone').value;
        if(full.length < 5) return alert(currentLang === 'ar' ? "الرقم خطأ" : "Invalid number");
        
        let h = JSON.parse(localStorage.getItem('pro_hist') || '[]');
        if(!h.includes(full)) { h.unshift(full); localStorage.setItem('pro_hist', JSON.stringify(h.slice(0,12))); }
        
        window.location.href = `https://wa.me/${full}?text=${encodeURIComponent(document.getElementById('msg').value)}`;
    }

    function openHistory() {
        const list = document.getElementById('historyEntries');
        list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('pro_hist') || '[]');
        h.forEach(n => {
            const div = document.createElement('div');
            div.style = "padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; font-weight:bold; cursor:pointer;";
            div.innerHTML = `<span>+${n}</span><i class="fab fa-whatsapp" style="color:green"></i>`;
            div.onclick = () => { document.getElementById('phone').value = n.slice(document.getElementById('dial').value.length); closeHistory(); };
            list.appendChild(div);
        });
        document.getElementById('historyModal').style.display = 'flex';
        setTimeout(() => document.getElementById('historySheet').classList.add('show'), 10);
    }
    function closeHistory() {
        document.getElementById('historySheet').classList.remove('show');
        setTimeout(() => document.getElementById('historyModal').style.display = 'none', 400);
    }

    // 4. تغيير اللغة والتثبيت
    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const isAr = currentLang === 'ar';
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = isAr ? 'English' : 'العربية';
        // تحديث النصوص
        document.getElementById('lbl-phone').innerText = isAr ? 'رقم الجوال' : 'Phone Number';
        document.getElementById('txt-send').innerText = isAr ? 'إرسال الآن' : 'Send Now';
        document.getElementById('nav-home').innerText = isAr ? 'الرئيسية' : 'Home';
        document.getElementById('nav-hist').innerText = isAr ? 'السجل' : 'History';
        renderChips();
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'flex';
    });
    function executeInstall() {
        if(deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBtn').style.display = 'none'; });
        }
    }

    window.onload = init;
</script>
</body>
</html>
