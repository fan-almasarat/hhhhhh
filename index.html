<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ZOL CHAT ULTIMATE 2026</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --wa: #25D366; --dark: #075E54; --bg: #f0f2f5; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }
        .app-container { max-width: 500px; margin: 0 auto; height: 100%; background: var(--white); display: flex; flex-direction: column; position: relative; }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: #fff; }
        .logo { color: var(--wa); font-weight: 900; font-size: 22px; }
        .install-btn { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 20px; font-size: 12px; display: none; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* محرك البحث */
        .search-box { position: relative; }
        .search-input { width: 100%; padding: 15px 45px 15px 15px; border-radius: 12px; border: 2px solid #eee; font-size: 16px; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--wa); }
        .search-box i { position: absolute; right: 15px; top: 18px; color: #aaa; }

        .country-results { position: absolute; top: 100%; left: 0; width: 100%; background: #fff; z-index: 100; border-radius: 0 0 12px 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-height: 250px; overflow-y: auto; display: none; }
        .country-item { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }

        /* حقل الهاتف */
        .phone-group { display: flex; gap: 10px; }
        .code-display { width: 100px; background: #f8f9fa; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; border: 2px solid #eee; }
        .num-input { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #eee; font-size: 18px; font-weight: bold; outline: none; }

        .msg-area { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; height: 80px; resize: none; outline: none; }

        .btn-send { background: var(--wa); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* السجل المنبثق */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 25px 25px 0 0; padding: 20px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .history-list { max-height: 300px; overflow-y: auto; }
        .history-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }

        footer { background: #fff; padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #eee; }
        .nav-btn { background: none; border: none; color: #888; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--wa); }
        .nav-btn i { font-size: 20px; }
        .nav-btn span { font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">ZOL CHAT PRO</div>
        <button id="pwaBtn" class="install-btn">تثبيت التطبيق</button>
    </header>

    <main>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="cSearch" class="search-input" placeholder="بحث عن دولة (بالعربي أو English)">
            <div id="results" class="country-results"></div>
        </div>

        <div class="phone-group">
            <div class="code-display">
                <span id="fIcon" class="flag-icon flag-icon-sd"></span>
                <input type="text" id="pCode" value="249" style="width:40px; border:none; background:none; font-weight:bold; text-align:center;" readonly>
            </div>
            <input type="tel" id="pNum" class="num-input" placeholder="ادخل الرقم">
        </div>

        <textarea id="pMsg" class="msg-area" placeholder="اكتب رسالتك هنا...">السلام عليكم</textarea>

        <button class="btn-send" onclick="launchChat()">
            <span>فتح محادثة</span> <i class="fab fa-whatsapp"></i>
        </button>
    </main>

    <footer>
        <button class="nav-btn active"><i class="fas fa-home"></i><span>الرئيسية</span></button>
        <button class="nav-btn" onclick="openHistory()"><i class="fas fa-clock-rotate-left"></i><span>آخر المراسلات</span></button>
        <button class="nav-link" onclick="shareApp()"><i class="fas fa-share-nodes"></i><span>مشاركة</span></button>
    </footer>
</div>

<div id="hModal" class="modal" onclick="closeHistory()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="width:40px; height:5px; background:#ddd; margin:0 auto 15px; border-radius:10px;"></div>
        <h3 style="margin-bottom:15px; text-align:center;">السجل الأخير</h3>
        <div id="hList" class="history-list"></div>
        <button onclick="closeHistory()" style="width:100%; padding:15px; margin-top:15px; border:none; border-radius:12px; background:#f0f2f5; font-weight:bold;">إغلاق</button>
    </div>
</div>

<script>
    // قاعدة بيانات شاملة
    let countries = [];
    async function fetchCountries() {
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,translations');
            const data = await res.json();
            countries = data.map(c => ({
                nameAr: c.translations.ara ? c.translations.ara.common : c.name.common,
                nameEn: c.name.common,
                code: c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : ""),
                flag: c.cca2.toLowerCase()
            })).sort((a, b) => a.nameAr.localeCompare(b.nameAr));
            detectLocation();
        } catch(e) { console.error("Data error"); }
    }

    // البحث الذكي بالعربي والانجليزي
    document.getElementById('cSearch').oninput = function(e) {
        const val = e.target.value.toLowerCase();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '';
        if(!val) { resDiv.style.display = 'none'; return; }

        const filtered = countries.filter(c => 
            c.nameAr.includes(val) || c.nameEn.toLowerCase().includes(val) || c.code.includes(val)
        );

        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'country-item';
                div.innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span> <span>${c.nameAr} (${c.code})</span>`;
                div.onclick = () => {
                    document.getElementById('pCode').value = c.code.replace('+','');
                    document.getElementById('fIcon').className = `flag-icon flag-icon-${c.flag}`;
                    document.getElementById('cSearch').value = c.nameAr;
                    resDiv.style.display = 'none';
                };
                resDiv.appendChild(div);
            });
        }
    };

    // اكتشاف الموقع تلقائياً
    async function detectLocation() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            const myCountry = countries.find(c => c.flag === data.country.toLowerCase());
            if(myCountry) {
                document.getElementById('pCode').value = myCountry.code.replace('+','');
                document.getElementById('fIcon').className = `flag-icon flag-icon-${myCountry.flag}`;
            }
        } catch(e) {}
    }

    function launchChat() {
        const code = document.getElementById('pCode').value;
        const num = document.getElementById('pNum').value.replace(/\s/g,'');
        const msg = encodeURIComponent(document.getElementById('pMsg').value);
        if(num) {
            const full = code + num;
            saveToHistory(full);
            window.location.href = `https://wa.me/${full}?text=${msg}`;
        }
    }

    function saveToHistory(n) {
        let h = JSON.parse(localStorage.getItem('zh_v2') || '[]');
        if(!h.includes(n)) { h.unshift(n); localStorage.setItem('zh_v2', JSON.stringify(h.slice(0,10))); }
    }

    function openHistory() {
        const list = document.getElementById('hList');
        list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('zh_v2') || '[]');
        if(h.length === 0) list.innerHTML = '<p style="text-align:center; color:#aaa; padding:20px;">لا يوجد سجل</p>';
        h.forEach(n => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:#25d366"></i>`;
            item.onclick = () => { document.getElementById('pNum').value = n; closeHistory(); };
            list.appendChild(item);
        });
        document.getElementById('hModal').style.display = 'flex';
    }

    function closeHistory() { document.getElementById('hModal').style.display = 'none'; }

    // ملف الـ PWA
    let defP;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); defP = e;
        document.getElementById('pwaBtn').style.display = 'block';
    });
    document.getElementById('pwaBtn').onclick = () => {
        if(defP) { defP.prompt(); defP = null; document.getElementById('pwaBtn').style.display = 'none'; }
    };

    function shareApp() {
        if(navigator.share) navigator.share({title: 'Zol Chat', url: location.href});
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    window.onload = fetchCountries;
</script>
</body>
</html>
