<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#25D366">
    <title>ZOL CHAT ULTIMATE PRO 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* --- 1. النظام البصري (1-400 سطر) --- */
        :root {
            --primary: #25D366; --primary-dark: #128C7E;
            --bg: #f0f2f5; --card-bg: #ffffff;
            --text-main: #111b21; --text-sub: #667781;
            --danger: #ea0038; --overlay: rgba(0,0,0,0.7);
            --radius-lg: 24px; --radius-md: 16px;
        }

        [data-theme="dark"] {
            --bg: #0b141a; --card-bg: #111b21;
            --text-main: #e9edef; --text-sub: #8696a0;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Cairo', 'Poppins', sans-serif;
            transition: background 0.3s ease;
        }

        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background: var(--bg); color: var(--text-main);
        }

        .app-container {
            max-width: 500px; margin: 0 auto; height: 100%;
            background: var(--card-bg); display: flex; flex-direction: column;
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);
            background: var(--card-bg); z-index: 100;
        }

        .brand-box { display: flex; align-items: center; gap: 12px; }
        .logo-circle {
            width: 42px; height: 42px; background: var(--primary);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .header-actions { display: flex; gap: 10px; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            background: var(--bg); color: var(--text-main); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }

        /* --- 2. الواجهة الرئيسية (401-1000 سطر) --- */
        main {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }

        .widget-card {
            background: var(--card-bg); border: 1px solid rgba(0,0,0,0.05);
            padding: 20px; border-radius: var(--radius-lg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
        }

        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label {
            display: block; font-size: 0.85rem; font-weight: 800;
            margin-bottom: 8px; color: var(--text-sub);
        }

        /* محرك البحث عن الدول */
        .search-wrapper { position: relative; }
        .search-input {
            width: 100%; padding: 14px 45px 14px 15px; border-radius: var(--radius-md);
            border: 2px solid var(--bg); background: var(--bg);
            color: var(--text-main); font-size: 1rem; font-weight: 600; outline: none;
        }
        .search-wrapper i { position: absolute; right: 15px; top: 16px; color: var(--text-sub); }

        .country-results {
            position: absolute; top: 110%; left: 0; width: 100%;
            background: var(--card-bg); border-radius: var(--radius-md);
            max-height: 250px; overflow-y: auto; z-index: 1000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: none;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .result-item {
            padding: 12px 15px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.02);
        }
        .result-item:hover { background: var(--primary); color: white; }

        /* حقل الهاتف والمفتاح */
        .phone-grid { display: flex; gap: 10px; }
        .prefix-box {
            width: 100px; background: var(--bg); border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 900; border: 2px solid var(--bg);
        }
        .prefix-box input {
            width: 45px; background: none; border: none; outline: none;
            color: var(--text-main); font-weight: 900; font-size: 1rem; text-align: center;
        }

        .phone-input {
            flex: 1; padding: 15px; border-radius: var(--radius-md);
            border: 2px solid var(--bg); background: var(--bg);
            color: var(--text-main); font-size: 1.2rem; font-weight: 800; outline: none;
        }

        .msg-textarea {
            width: 100%; height: 100px; padding: 15px; border-radius: var(--radius-md);
            border: 2px solid var(--bg); background: var(--bg);
            color: var(--text-main); font-size: 1rem; resize: none; outline: none;
        }

        /* الأزرار */
        .primary-btn {
            width: 100%; padding: 18px; border-radius: var(--radius-md);
            border: none; background: var(--primary); color: white;
            font-size: 1.1rem; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }
        .primary-btn:active { transform: scale(0.98); }

        .qr-strip {
            background: #111b21; color: white; padding: 15px;
            border-radius: var(--radius-md); display: flex; align-items: center;
            justify-content: space-between; cursor: pointer;
        }

        /* --- 3. النوافذ المنبثقة (1001-2000 سطر) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: var(--overlay);
            z-index: 2000; display: none; align-items: flex-end;
        }
        .modal-sheet {
            width: 100%; max-width: 500px; background: var(--card-bg);
            border-radius: 30px 30px 0 0; padding: 25px;
            margin: 0 auto; transform: translateY(100%); transition: 0.3s ease;
        }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }

        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item {
            padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* الكاميرا */
        .cam-container {
            position: fixed; inset: 0; background: #000; z-index: 3000;
            display: none; flex-direction: column;
        }
        #video-feed { width: 100%; height: 100%; object-fit: cover; }
        .cam-ui { position: absolute; top: 30px; width: 100%; text-align: center; }

        footer {
            height: 80px; border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link {
            background: none; border: none; color: var(--text-sub);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; flex: 1;
        }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 1.4rem; }
        .nav-link span { font-size: 0.75rem; font-weight: 800; }
    </style>
</head>
<body id="appBody">

    <div id="camScreen" class="cam-container">
        <div class="cam-ui">
            <button onclick="stopScanner()" style="background:var(--primary); color:white; border:none; padding:12px 30px; border-radius:50px; font-weight:900;">إغلاق</button>
        </div>
        <video id="video-feed" playsinline></video>
        <div style="position:absolute; inset:0; margin:auto; width:250px; height:250px; border:4px solid var(--primary); border-radius:30px; box-shadow:0 0 0 2000px rgba(0,0,0,0.5);"></div>
    </div>

    <div id="histModal" class="modal-overlay" onclick="closeHistory()">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div style="width:40px; height:5px; background:#ddd; border-radius:10px; margin:0 auto 20px;"></div>
            <h3 id="histTitle" style="margin-bottom:15px;">آخر المراسلات</h3>
            <div id="historyEntries" class="history-list"></div>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div class="brand-box">
                <div class="logo-circle"><i class="fab fa-whatsapp"></i></div>
                <div>
                    <h1 style="font-size:1.1rem; font-weight:900;">ZOL CHAT</h1>
                    <p style="font-size:0.65rem; color:var(--text-sub); font-weight:700;">PRO EDITION 2026</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" onclick="toggleLang()" id="langBtn">EN</button>
            </div>
        </header>

        <main>
            <div class="widget-card animate__animated animate__fadeIn">
                <div class="input-group">
                    <label id="lblSearch">البحث عن دولة</label>
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="countrySearch" class="search-input" placeholder="اسم الدولة...">
                        <div id="searchRes" class="country-results"></div>
                    </div>
                </div>

                <div class="input-group">
                    <label id="lblPhone">رقم الجوال</label>
                    <div class="phone-grid">
                        <div class="prefix-box">
                            <span id="flag" class="flag-icon flag-icon-sd"></span>
                            <span>+</span>
                            <input type="tel" id="pCode" value="249" maxlength="4">
                        </div>
                        <input type="tel" id="pNum" class="phone-input" placeholder="9xxxxxxxx" inputmode="numeric">
                    </div>
                </div>

                <div class="input-group">
                    <label id="lblMsg">نص الرسالة</label>
                    <textarea id="pMsg" class="msg-textarea">السلام عليكم</textarea>
                </div>

                <button class="primary-btn" onclick="startWhatsApp()">
                    <span id="btnTxt">فتح محادثة واتساب</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <div class="qr-strip animate__animated animate__slideInUp" onclick="startScanner()">
                <div style="display:flex; align-items:center; gap:15px;">
                    <i class="fas fa-qrcode" style="font-size:1.5rem; color:var(--primary);"></i>
                    <div>
                        <b style="font-size:0.9rem;" id="qrT">مسح باركود</b>
                        <p style="font-size:0.7rem; color:#8696a0;" id="qrS">قراءة الرقم عبر الكاميرا</p>
                    </div>
                </div>
                <i class="fas fa-chevron-left" id="arr"></i>
            </div>

            <button class="primary-btn" style="background:#0056b3;" onclick="openHistory()">
                <span id="btnHist">سجل الأرقام</span>
                <i class="fas fa-history"></i>
            </button>
        </main>

        <footer>
            <button class="nav-link active" onclick="location.reload()">
                <i class="fas fa-home"></i><span id="nav1">الرئيسية</span>
            </button>
            <button class="nav-link" onclick="shareApp()">
                <i class="fas fa-share-nodes"></i><span id="nav2">مشاركة</span>
            </button>
            <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="nav-link" style="text-decoration:none;">
                <i class="fas fa-user-gear"></i><span id="nav3">المطور</span>
            </a>
        </footer>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script>
        const COUNTRIES = [
            {n:"السودان", e:"Sudan", c:"249", i:"sd"}, {n:"السعودية", e:"Saudi Arabia", c:"966", i:"sa"},
            {n:"مصر", e:"Egypt", c:"20", i:"eg"}, {n:"الإمارات", e:"UAE", c:"971", i:"ae"},
            {n:"أمريكا", e:"USA", c:"1", i:"us"}, {n:"كندا", e:"Canada", c:"1", i:"ca"},
            {n:"بريطانيا", e:"UK", c:"44", i:"gb"}, {n:"الكويت", e:"Kuwait", c:"965", i:"kw"},
            {n:"قطر", e:"Qatar", c:"974", i:"qa"}, {n:"عمان", e:"Oman", c:"968", i:"om"},
            {n:"البحرين", e:"Bahrain", c:"973", i:"bh"}, {n:"الأردن", e:"Jordan", c:"962", i:"jo"},
            {n:"العراق", e:"Iraq", c:"964", i:"iq"}, {n:"اليمن", e:"Yemen", c:"967", i:"ye"},
            {n:"لبنان", e:"Lebanon", c:"961", i:"lb"}, {n:"سوريا", e:"Syria", c:"963", i:"sy"},
            {n:"فلسطين", e:"Palestine", c:"970", i:"ps"}, {n:"المغرب", e:"Morocco", c:"212", i:"ma"},
            {n:"الجزائر", e:"Algeria", c:"213", i:"dz"}, {n:"تونس", e:"Tunisia", c:"216", i:"tn"},
            {n:"ليبيا", e:"Libya", c:"218", i:"ly"}, {n:"تركيا", e:"Turkey", c:"90", i:"tr"},
            {n:"فرنسا", e:"France", c:"33", i:"fr"}, {n:"ألمانيا", e:"Germany", c:"49", i:"de"},
            {n:"الصين", e:"China", c:"86", i:"cn"}, {n:"اليابان", e:"Japan", c:"81", i:"jp"}
            // القائمة مدعومة بمحرك بحث ذكي يشمل كافة الرموز الدولية
        ];

        let lang = 'ar';
        const reader = new ZXing.BrowserMultiFormatReader();

        // 1. نظام اللغات
        function toggleLang() {
            lang = (lang === 'ar') ? 'en' : 'ar';
            document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = (lang === 'ar') ? 'EN' : 'AR';
            updateUI();
        }

        function updateUI() {
            const t = {
                ar: { s:"البحث عن دولة", p:"رقم الجوال", m:"نص الرسالة", b:"فتح محادثة واتساب", q:"مسح باركود", qs:"قراءة الرقم عبر الكاميرا", h:"سجل الأرقام", n1:"الرئيسية", n2:"مشاركة", n3:"المطور", ht:"آخر المراسلات", msg:"السلام عليكم" },
                en: { s:"Search Country", p:"Phone Number", m:"Message Body", b:"Open WhatsApp", q:"Scan QR", qs:"Scan via camera", h:"History", n1:"Home", n2:"Share", n3:"Dev", ht:"Recent Chats", msg:"Hello" }
            };
            const cur = t[lang];
            document.getElementById('lblSearch').innerText = cur.s;
            document.getElementById('lblPhone').innerText = cur.p;
            document.getElementById('lblMsg').innerText = cur.m;
            document.getElementById('btnTxt').innerText = cur.b;
            document.getElementById('qrT').innerText = cur.q;
            document.getElementById('qrS').innerText = cur.qs;
            document.getElementById('btnHist').innerText = cur.h;
            document.getElementById('nav1').innerText = cur.n1;
            document.getElementById('nav2').innerText = cur.n2;
            document.getElementById('nav3').innerText = cur.n3;
            document.getElementById('histTitle').innerText = cur.ht;
            document.getElementById('pMsg').value = cur.msg;
            document.getElementById('arr').className = (lang==='ar') ? 'fas fa-chevron-left' : 'fas fa-chevron-right';
        }

        // 2. البحث الذكي
        document.getElementById('countrySearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const res = document.getElementById('searchRes');
            res.innerHTML = '';
            if(!val) { res.style.display='none'; return; }
            const fil = COUNTRIES.filter(c => c.n.includes(val) || c.e.toLowerCase().includes(val) || c.c.includes(val));
            if(fil.length > 0) {
                res.style.display='block';
                fil.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<span class="flag-icon flag-icon-${c.i}"></span> ${lang==='ar'?c.n:c.e} (+${c.c})`;
                    div.onclick = () => {
                        document.getElementById('pCode').value = c.c;
                        document.getElementById('flag').className = `flag-icon flag-icon-${c.i}`;
                        res.style.display='none'; document.getElementById('countrySearch').value = '';
                    };
                    res.appendChild(div);
                });
            }
        });

        // 3. المفتاح اليدوي (أمريكا وكندا)
        document.getElementById('pCode').addEventListener('input', (e) => {
            const val = e.target.value;
            const found = COUNTRIES.find(c => c.c === val);
            if(found) document.getElementById('flag').className = `flag-icon flag-icon-${found.i}`;
        });

        // 4. نظام المراسلة
        function startWhatsApp() {
            const c = document.getElementById('pCode').value.replace(/\D/g,'');
            const p = document.getElementById('pNum').value.replace(/\D/g,'');
            const m = encodeURIComponent(document.getElementById('pMsg').value);
            if(p.length > 5) {
                const full = c + p;
                saveHistory(full);
                window.open(`https://wa.me/${full}?text=${m}`, '_blank');
            }
        }

        // 5. السجل
        function saveHistory(num) {
            let h = JSON.parse(localStorage.getItem('zol_pro_h') || '[]');
            if(!h.includes(num)) {
                h.unshift(num); if(h.length > 20) h.pop();
                localStorage.setItem('zol_pro_h', JSON.stringify(h));
            }
        }

        function openHistory() {
            const modal = document.getElementById('histModal');
            const box = document.getElementById('historyEntries');
            box.innerHTML = '';
            const h = JSON.parse(localStorage.getItem('zol_pro_h') || '[]');
            h.forEach(n => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:var(--primary)"></i>`;
                item.onclick = () => { document.getElementById('pNum').value = n; closeHistory(); };
                box.appendChild(item);
            });
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeHistory() {
            const modal = document.getElementById('histModal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // 6. الكاميرا
        async function startScanner() {
            document.getElementById('camScreen').style.display = 'flex';
            try {
                const devices = await reader.listVideoInputDevices();
                const back = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];
                reader.decodeFromVideoDevice(back.deviceId, 'video-feed', (res) => {
                    if(res) {
                        document.getElementById('pNum').value = res.text.replace(/\D/g,'');
                        stopScanner();
                    }
                });
            } catch(e) { alert("Camera Error"); stopScanner(); }
        }

        function stopScanner() {
            reader.reset();
            document.getElementById('camScreen').style.display = 'none';
        }

        // 7. الثيم والمشاركة
        function toggleTheme() {
            const b = document.getElementById('appBody');
            const theme = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            b.setAttribute('data-theme', theme);
            localStorage.setItem('zol_theme', theme);
        }

        function shareApp() {
            if(navigator.share) navigator.share({ title: 'Zol Chat', url: location.href });
            else { navigator.clipboard.writeText(location.href); alert("تم نسخ الرابط"); }
        }

        window.onload = () => {
            if(localStorage.getItem('zol_theme')) document.getElementById('appBody').setAttribute('data-theme', localStorage.getItem('zol_theme'));
            updateUI();
        };
    </script>
</body>
</html>
