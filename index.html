<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Professional Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #0b141a; font-family: 'Tajawal', sans-serif; color: white; }
        
        /* تخصيص شكل قائمة الدول والبحث */
        .iti { width: 100%; }
        .iti__country-list { 
            background-color: #111b21 !important; 
            border: 1px solid #2a3942 !important; 
            color: white !important;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 350px;
        }
        .iti__search-input {
            background-color: #202c33 !important;
            color: white !important;
            border: none !important;
            padding: 12px !important;
            margin: 10px !important;
            border-radius: 10px !important;
            width: calc(100% - 20px) !important;
        }
        .iti__country { padding: 12px 15px !important; }
        .iti__country:hover, .iti__country.iti__highlight { background-color: #2a3942 !important; }
        .iti__selected-flag { background-color: #202c33 !important; border-radius: 12px 0 0 12px !important; }
        
        /* تخصيص المدخلات */
        input, textarea {
            background-color: #2a3942 !important;
            color: white !important;
            border: 1px solid #3b4a54 !important;
            transition: all 0.3s ease;
        }
        input:focus { border-color: #25D366 !important; box-shadow: 0 0 10px rgba(37, 211, 102, 0.2) !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-8 rounded-[2.5rem] shadow-2xl border border-white/5 relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-green-500/10 rounded-full blur-3xl text-white"></div>
        
        <div class="text-center mb-10">
            <div class="inline-block p-4 bg-green-500/10 rounded-3xl mb-4">
                <svg class="w-10 h-10 text-[#25D366]" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </div>
            <h1 class="text-2xl font-bold">واتساب المباشر</h1>
            <p class="text-gray-400 text-sm mt-2">تواصل فوراً مع أي رقم حول العالم</p>
        </div>

        <div class="space-y-6">
            <div dir="ltr">
                <label class="block text-[11px] font-bold mb-2 text-gray-500 uppercase tracking-widest text-right">رقم الجوال</label>
                <input type="tel" id="phone" class="w-full p-5 rounded-2xl outline-none font-bold text-lg">
            </div>

            <div>
                <label class="block text-[11px] font-bold mb-2 text-gray-500 uppercase tracking-widest">الرسالة (اختياري)</label>
                <textarea id="message" rows="3" class="w-full p-5 rounded-2xl outline-none text-sm resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="send()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-black py-5 rounded-2xl font-bold text-xl transition-all active:scale-95 shadow-[0_10px_20px_rgba(37,211,102,0.2)] flex items-center justify-center gap-3">
                <span>إرسال الآن</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>

        <p class="text-center text-[10px] text-gray-600 mt-8 uppercase tracking-[3px]">Global Search Enabled • 2026 Edition</p>
    </div>

    <script>
        // تهيئة المكتبة العالمية مع خيار البحث المدمج
        const phoneInputField = document.querySelector("#phone");
        const phoneInput = window.intlTelInput(phoneInputField, {
            // تفعيل البحث داخل القائمة
            initialCountry: "auto",
            geoIpLookup: function(callback) {
                fetch("https://ipapi.co/json").then(res => res.json()).then(data => callback(data.country_code)).catch(() => callback("sa"));
            },
            separateDialCode: true,
            showSelectedDialCode: true,
            // قائمة الدول المفضلة
            preferredCountries: ["sa", "eg", "ae", "kw", "jo"],
            // تفعيل خيار البحث (مهم جداً)
            customPlaceholder: function(selectedCountryPlaceholder, selectedCountryData) {
                return "مثال: " + selectedCountryPlaceholder;
            },
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js",
        });

        // إضافة ميزة البحث برمجياً داخل المكتبة
        // ملاحظة: الإصدار الجديد 18 يدعم البحث تلقائياً عند النقر على القائمة

        function send() {
            const number = phoneInput.getNumber();
            const msg = encodeURIComponent(document.querySelector("#message").value);
            
            if (!phoneInput.isValidNumber()) {
                alert("يرجى إدخال رقم هاتف صحيح للدولة المختارة");
                return;
            }

            // التوجه لواتساب
            const finalNumber = number.replace('+', '');
            window.open(`https://wa.me/${finalNumber}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
