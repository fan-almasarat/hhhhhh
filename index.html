<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct Ultra Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #0c1317; color: #e9edef; }
        .glass-effect { background: rgba(34, 45, 52, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .modal-slide { transition: transform 0.3s ease-out; transform: translateY(100%); }
        .modal-slide.active { transform: translateY(0); }
        .country-item { transition: 0.2s; border-bottom: 1px solid #222d34; cursor: pointer; }
        .country-item:hover { background: #2a3942; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .flag-badge { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div id="langOverlay" class="fixed inset-0 z-[200] bg-[#0c1317] flex items-center justify-center">
        <div class="text-center">
            <div class="w-20 h-20 bg-[#25D366] rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                <i class="fab fa-whatsapp text-white text-4xl"></i>
            </div>
            <h2 class="text-xl font-bold mb-6">اختر اللغة / Language</h2>
            <div class="flex gap-4">
                <button onclick="initApp('ar')" class="bg-[#25D366] text-black px-8 py-3 rounded-2xl font-bold">العربية</button>
                <button onclick="initApp('en')" class="border border-gray-600 px-8 py-3 rounded-2xl font-bold">English</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md glass-effect p-8 rounded-[2.5rem] shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleLang()" class="bg-[#202c33] px-4 py-2 rounded-full text-xs font-bold border border-white/5">
                <span id="langBtnLabel">English</span>
            </button>
            <i class="fab fa-whatsapp text-[#25D366] text-3xl"></i>
        </div>

        <div class="space-y-6">
            <button onclick="openModal()" class="w-full flex items-center justify-between p-5 bg-[#202c33] rounded-2xl border border-white/5 hover:border-green-500/30 transition-all">
                <div class="flex items-center gap-4">
                    <span id="curFlagMain" class="text-2xl">🇸🇦</span>
                    <div class="text-right">
                        <span id="curName" class="font-bold text-sm">السعودية</span>
                        <p id="curExample" class="text-[10px] text-gray-500 mt-1">مثال: 50xxxxxxx</p>
                    </div>
                </div>
                <i class="fas fa-chevron-down text-xs text-gray-500"></i>
            </button>

            <div class="flex gap-2" dir="ltr">
                <div class="relative w-32">
                    <span id="curFlagInput" class="flag-badge text-lg">🇸🇦</span>
                    <input type="text" id="dialCode" value="+966" class="w-full p-5 pl-10 rounded-2xl bg-[#202c33] border border-white/5 text-center font-bold text-lg outline-none focus:border-green-500">
                </div>
                <div class="flex-1 relative">
                    <input type="number" id="phoneNum" placeholder="50xxxxxxx" class="w-full p-5 rounded-2xl bg-[#202c33] border border-white/5 font-bold text-lg outline-none focus:border-green-500">
                </div>
            </div>

            <textarea id="msg" rows="2" class="w-full p-5 rounded-2xl bg-[#202c33] border border-white/5 text-sm outline-none focus:border-green-500 resize-none" placeholder="الرسالة..."></textarea>

            <button onclick="launch()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-[#0c1317] py-5 rounded-2xl font-bold text-xl active:scale-95 transition-all">
                <span id="txtBtn">إرسال</span>
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[300] bg-black/70 backdrop-blur-sm hidden flex-col justify-end">
        <div id="modalContent" class="modal-slide w-full max-w-md mx-auto bg-[#111b21] rounded-t-[3rem] h-[80vh] flex flex-col">
            <div class="p-6">
                <div class="w-12 h-1 bg-gray-700 rounded-full mx-auto mb-6"></div>
                <input type="text" id="searchBox" oninput="doSearch()" placeholder="بحث..." class="w-full p-4 bg-[#202c33] rounded-2xl border-none outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div id="countryList" class="flex-1 overflow-y-auto p-2"></div>
            <button onclick="closeModal()" class="p-6 text-gray-400 font-bold">إغلاق</button>
        </div>
    </div>

    <script>
        // قاعدة بيانات متكاملة تشمل الأعلام وطريقة كتابة الرقم (Example)
        const countries = [
            { nAr: "السعودية", nEn: "Saudi Arabia", c: "966", f: "🇸🇦", ex: "50xxxxxxx" },
            { nAr: "مصر", nEn: "Egypt", c: "20", f: "🇪🇬", ex: "1xxxxxxxxx" },
            { nAr: "الإمارات", nEn: "UAE", c: "971", f: "🇦🇪", ex: "5xxxxxxxx" },
            { nAr: "الكويت", nEn: "Kuwait", c: "965", f: "🇰🇼", ex: "xxxxxxx" },
            { nAr: "عمان", nEn: "Oman", c: "968", f: "🇴🇲", ex: "xxxxxxx" },
            { nAr: "البحرين", nEn: "Bahrain", c: "973", f: "🇧🇭", ex: "xxxxxxxx" },
            { nAr: "قطر", nEn: "Qatar", c: "974", f: "🇶🇦", ex: "xxxxxxxx" },
            { nAr: "الأردن", nEn: "Jordan", c: "962", f: "🇯🇴", ex: "7xxxxxxxx" },
            { nAr: "العراق", nEn: "Iraq", c: "964", f: "🇮🇶", ex: "7xxxxxxxxx" },
            { nAr: "المغرب", nEn: "Morocco", c: "212", f: "🇲🇦", ex: "6xxxxxxxx" },
            { nAr: "تركيا", nEn: "Turkey", c: "90", f: "🇹🇷", ex: "5xxxxxxxxx" }
        ];

        let lang = 'ar';
        const ui = {
            ar: { btn: "إرسال الآن", msg: "اكتب رسالتك هنا...", search: "ابحث عن دولة أو مفتاح...", example: "مثال: " },
            en: { btn: "Send Now", msg: "Type your message...", search: "Search country or code...", example: "Example: " }
        };

        function initApp(l) {
            lang = l;
            document.getElementById('langOverlay').style.display = 'none';
            updateUI();
            renderCountries(countries);
        }

        function updateUI() {
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('txtBtn').innerText = ui[lang].btn;
            document.getElementById('msg').placeholder = ui[lang].msg;
            document.getElementById('searchBox').placeholder = ui[lang].search;
            document.getElementById('langBtnLabel').innerText = lang === 'ar' ? 'English' : 'العربية';
        }

        function renderCountries(list) {
            document.getElementById('countryList').innerHTML = list.map(c => `
                <div onclick="select('${c.f}', '${lang === 'ar' ? c.nAr : c.nEn}', '${c.c}', '${c.ex}')" class="country-item flex items-center justify-between p-5">
                    <div class="flex items-center gap-4 text-start">
                        <span class="text-3xl">${c.f}</span>
                        <div>
                            <div class="font-bold text-sm">${lang === 'ar' ? c.nAr : c.nEn}</div>
                            <div class="text-[10px] text-gray-500">${ui[lang].example} ${c.ex}</div>
                        </div>
                    </div>
                    <span class="font-mono text-green-500">+${c.c}</span>
                </div>
            `).join('');
        }

        function select(f, n, c, ex) {
            document.getElementById('curFlagMain').innerText = f;
            document.getElementById('curFlagInput').innerText = f;
            document.getElementById('curName').innerText = n;
            document.getElementById('dialCode').value = '+' + c;
            document.getElementById('phoneNum').placeholder = ex;
            document.getElementById('curExample').innerText = ui[lang].example + ex;
            closeModal();
        }

        function doSearch() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            renderCountries(countries.filter(c => c.nAr.includes(q) || c.nEn.toLowerCase().includes(q) || c.c.includes(q)));
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => document.getElementById('modalContent').classList.add('active'), 10);
        }

        function closeModal() {
            document.getElementById('modalContent').classList.remove('active');
            setTimeout(() => document.getElementById('modal').style.display = 'none', 300);
        }

        function launch() {
            const dial = document.getElementById('dialCode').value.replace('+', '').trim();
            let num = document.getElementById('phoneNum').value.trim();
            const text = encodeURIComponent(document.getElementById('msg').value);
            if(!num) return alert(lang === 'ar' ? 'أدخل الرقم!' : 'Enter number!');
            if(num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${dial}${num}?text=${text}`, '_blank');
        }

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            updateUI();
            renderCountries(countries);
        }
    </script>
</body>
</html>
