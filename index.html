<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Professional Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b141a; font-family: sans-serif; }
        .iti { width: 100%; }
        .iti__flag-container { outline: none !important; }
        .iti__country-list { background-color: #111b21; border: 1px solid #2a3942; color: white; max-width: 300px; }
        .iti__country:hover { background-color: #2a3942; }
        input { background-color: #2a3942 !important; color: white !important; border: 1px solid #3b4a54 !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-8 rounded-3xl shadow-2xl border border-white/5 text-white">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold mb-2">واتساب المباشر</h1>
            <p class="text-gray-400 text-sm">أدخل الرقم وسنقوم بالباقي</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold mb-2 text-gray-500 uppercase">رقم الجوال</label>
                <input type="tel" id="phone" class="w-full p-4 rounded-xl outline-none focus:ring-2 focus:ring-green-500 transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold mb-2 text-gray-500 uppercase">الرسالة</label>
                <textarea id="message" rows="3" class="w-full p-4 rounded-xl outline-none focus:ring-2 focus:ring-green-500 transition-all resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="send()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-black py-4 rounded-xl font-bold text-lg transition-transform active:scale-95 shadow-lg">
                إرسال عبر واتساب
            </button>
        </div>
    </div>

    <script>
        // تشغيل المحرك الدولي للأرقام
        const phoneInputField = document.querySelector("#phone");
        const phoneInput = window.intlTelInput(phoneInputField, {
            preferredCountries: ["sa", "eg", "ae", "kw"], // الدول المفضلة في الأعلى
            separateDialCode: true, // إظهار المفتاح بجانب العلم بشكل منفصل
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        });

        function send() {
            const number = phoneInput.getNumber(); // يحصل على الرقم كامل مع مفتاح الدولة
            const msg = encodeURIComponent(document.querySelector("#message").value);
            
            if (!number) {
                alert("يرجى إدخال رقم صحيح");
                return;
            }

            // فتح واتساب مباشرة
            window.open(`https://wa.me/${number.replace('+', '')}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
