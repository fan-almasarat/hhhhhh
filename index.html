<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct - Auto Flag</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #0b141a; color: white; font-family: 'Tajawal', sans-serif; }
        
        /* تنسيق العلم ليكون جزءاً من التصميم */
        .iti { display: flex !important; align-items: center; }
        .iti__flag-container { position: relative !important; display: flex; align-items: center; padding: 0 10px !important; }
        .iti__selected-flag { background: transparent !important; padding: 0 !important; }
        
        /* القائمة المنسدلة للبحث */
        .iti__country-list { 
            background-color: #111b21 !important; 
            border: 1px solid #2a3942 !important; 
            border-radius: 15px; 
            z-index: 100;
        }
        .iti__search-input { background: #202c33 !important; color: white !important; border: 1px solid #3b4a54 !important; }

        /* الحاوية الرئيسية للحقول */
        .input-group { background: #2a3942; border: 1px solid #3b4a54; border-radius: 20px; transition: 0.3s; }
        .input-group:focus-within { border-color: #25D366; }
        input { background: transparent !important; outline: none; border: none; font-weight: bold; }
        
        /* منع الأسهم في حقل الأرقام */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl relative">
        
        <button onclick="toggleLanguage()" class="absolute top-6 left-6 bg-[#202c33] px-3 py-1 rounded-lg text-xs font-bold border border-white/10">
            <span id="lang-text">English</span>
        </button>

        <div class="text-center mb-8 pt-4">
            <h2 id="title" class="text-2xl font-bold">واتساب المباشر</h2>
            <p id="subtitle" class="text-gray-400 text-sm mt-1">اكتب المفتاح وسيتغير العلم تلقائياً</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2 text-right">
                <label id="label-phone" class="text-[11px] font-bold text-gray-500 uppercase mr-2 tracking-widest">رقم الهاتف</label>
                <div class="flex items-center input-group overflow-hidden p-1" dir="ltr">
                    
                    <div id="flag-box">
                        <input type="text" id="phone-hidden" class="hidden">
                    </div>

                    <div class="flex items-center text-[#25D366] font-mono font-bold border-r border-[#3b4a54] pr-2 ml-1">
                        <span class="pl-2">+</span>
                        <input type="number" id="manual-code" value="966" class="w-16 text-center text-lg p-0 m-0">
                    </div>

                    <input type="number" id="phone-main" placeholder="50xxxxxxx" class="flex-1 text-white text-lg p-4">
                </div>
            </div>

            <div class="space-y-2 text-right">
                <label id="label-msg" class="text-[11px] font-bold text-gray-500 uppercase mr-2 tracking-widest">الرسالة</label>
                <textarea id="message" rows="3" class="input-group w-full p-5 text-sm resize-none text-white outline-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="sendWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-black py-5 rounded-2xl font-bold text-xl transition-all active:scale-95">
                <span id="btn-text">بدء المحادثة</span>
            </button>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        const manualCode = document.getElementById("manual-code");
        const hiddenInput = document.getElementById("phone-hidden");
        const phoneMain = document.getElementById("phone-main");

        const arabicCountries = { 
            "sa": "السعودية", "eg": "مصر", "ae": "الإمارات", "sd": "السودان", 
            "kw": "الكويت", "qa": "قطر", "jo": "الأردن", "ps": "فلسطين", 
            "iq": "العراق", "ma": "المغرب", "dz": "الجزائر", "ye": "اليمن" 
        };

        // تهيئة المكتبة
        const iti = window.intlTelInput(hiddenInput, {
            initialCountry: "sa",
            countrySearch: true,
            i18n: { searchPlaceholder: "بحث عن دولة...", ...arabicCountries },
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        // دمج العلم مع الحاوية المخصصة
        document.getElementById("flag-box").appendChild(document.querySelector(".iti"));

        // 1. عند اختيار دولة من القائمة: حدّث رقم المفتاح
        hiddenInput.addEventListener("countrychange", function() {
            const data = iti.getSelectedCountryData();
            manualCode.value = data.dialCode;
        });

        // 2. الميزة المطلوبة: عند كتابة المفتاح يدوياً، يتغير العلم تلقائياً
        manualCode.addEventListener("input", function() {
            const val = this.value;
            const allCountries = iti.getCountryData();
            // البحث عن الدولة التي تطابق هذا المفتاح
            const country = allCountries.find(c => c.dialCode === val);
            if (country) {
                iti.setCountry(country.iso2); // سيقوم بتغيير العلم فوراً
            }
        });

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('html-tag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            const t = translations[currentLang];
            
            document.getElementById('title').innerText = t.title;
            document.getElementById('subtitle').innerText = t.subtitle;
            document.getElementById('label-phone').innerText = t.labelPhone;
            document.getElementById('label-msg').innerText = t.labelMsg;
            document.getElementById('message').placeholder = t.placeholderMsg;
            document.getElementById('btn-text').innerText = t.btn;
            document.getElementById('lang-text').innerText = t.langBtn;

            iti.setOptions({ i18n: currentLang === 'ar' ? { searchPlaceholder: "بحث...", ...arabicCountries } : { searchPlaceholder: "Search..." } });
        }

        const translations = {
            ar: { title: "واتساب المباشر", subtitle: "اكتب المفتاح وسيتغير العلم تلقائياً", labelPhone: "رقم الهاتف", labelMsg: "الرسالة (اختياري)", placeholderMsg: "اكتب رسالتك هنا...", btn: "بدء المحادثة", langBtn: "English" },
            en: { title: "Direct WhatsApp", subtitle: "Enter key, flag updates automatically", labelPhone: "Phone Number", labelMsg: "Message (Optional)", placeholderMsg: "Type message...", btn: "Start Chat", langBtn: "العربية" }
        };

        function sendWhatsApp() {
            const code = manualCode.value;
            let num = phoneMain.value.trim();
            const msg = encodeURIComponent(document.getElementById('message').value);
            if(!code || !num) return alert(currentLang === 'ar' ? "أدخل الكود والرقم" : "Enter code and number");
            if(num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${code}${num}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
