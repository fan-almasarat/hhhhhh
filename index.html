<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>واتساب المباشر | Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0b141a; color: white; }
        .glass { background: #111b21; border: 1px solid #222d34; }
        .modal-up { transition: 0.3s ease-out; transform: translateY(100%); }
        .modal-up.active { transform: translateY(0); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div id="splash" class="fixed inset-0 z-[1000] bg-[#0b141a] flex flex-col items-center justify-center">
        <div class="mb-10 text-center">
            <div class="w-20 h-20 bg-[#25D366] rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl animate-pulse">
                <i class="fab fa-whatsapp text-white text-5xl"></i>
            </div>
            <h1 class="text-2xl font-bold">مرحباً بك</h1>
        </div>
        <div class="flex flex-col gap-4 w-64">
            <button onclick="startApp('ar')" class="p-4 bg-[#25D366] text-black font-bold rounded-2xl">العربية</button>
            <button onclick="startApp('en')" class="p-4 border border-[#25D366] text-[#25D366] font-bold rounded-2xl">English</button>
        </div>
    </div>

    <div id="mainApp" class="w-full max-w-md glass p-8 rounded-[2.5rem] shadow-2xl hidden">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleLanguage()" class="bg-[#202c33] px-4 py-2 rounded-full text-xs font-bold border border-gray-700">
                <span id="langBtn">English</span>
            </button>
            <i class="fab fa-whatsapp text-[#25D366] text-3xl"></i>
        </div>

        <div class="space-y-6">
            <button onclick="openModal()" class="w-full flex items-center justify-between p-5 bg-[#202c33] rounded-2xl border border-gray-700">
                <div class="flex items-center gap-4 text-right">
                    <span id="curFlag" class="text-3xl">🇸🇦</span>
                    <div>
                        <span id="curName" class="font-bold text-sm block">السعودية</span>
                        <span id="curEx" class="text-[10px] text-gray-500">مثال: 50xxxxxxx</span>
                    </div>
                </div>
                <i class="fas fa-chevron-down text-xs text-gray-500"></i>
            </button>

            <div class="flex gap-2" dir="ltr">
                <div class="relative w-32">
                    <span id="inputFlag" class="absolute left-3 top-1/2 -translate-y-1/2 text-xl">🇸🇦</span>
                    <input type="text" id="dialCode" value="+966" class="w-full p-4 pl-10 bg-[#202c33] border border-gray-700 rounded-2xl text-center font-bold text-lg outline-none focus:border-[#25D366]">
                </div>
                <input type="number" id="phone" placeholder="50xxxxxxx" class="flex-1 p-4 bg-[#202c33] border border-gray-700 rounded-2xl font-bold text-lg outline-none focus:border-[#25D366]">
            </div>

            <textarea id="msg" rows="3" class="w-full p-4 bg-[#202c33] border border-gray-700 rounded-2xl text-sm outline-none focus:border-[#25D366] resize-none" placeholder="الرسالة..."></textarea>

            <button onclick="launch()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-black py-5 rounded-2xl font-bold text-xl active:scale-95 transition-all">
                <span id="btnTxt">إرسال المحادثة</span>
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[2000] bg-black/80 backdrop-blur-sm hidden flex-col justify-end">
        <div id="modalContent" class="modal-up w-full max-w-md mx-auto bg-[#111b21] rounded-t-[2.5rem] h-[85vh] flex flex-col">
            <div class="p-6">
                <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-6"></div>
                <input type="text" id="search" oninput="doSearch()" placeholder="بحث باسم الدولة أو المفتاح..." class="w-full p-4 bg-[#202c33] rounded-2xl border-none outline-none focus:ring-2 focus:ring-[#25D366]">
            </div>
            <div id="list" class="flex-1 overflow-y-auto px-4"></div>
            <button onclick="closeModal()" class="p-6 text-gray-400 font-bold">إغلاق</button>
        </div>
    </div>

    <script>
        // قاعدة بيانات كاملة ومدمجة (تعمل بدون إنترنت)
        const countries = [
            {nAr:"السعودية", nEn:"Saudi Arabia", c:"966", f:"🇸🇦", ex:"50xxxxxxx"},
            {nAr:"مصر", nEn:"Egypt", c:"20", f:"🇪🇬", ex:"1xxxxxxxxx"},
            {nAr:"الإمارات", nEn:"UAE", c:"971", f:"🇦🇪", ex:"5xxxxxxxx"},
            {nAr:"الكويت", nEn:"Kuwait", c:"965", f:"🇰🇼", ex:"xxxxxxxx"},
            {nAr:"قطر", nEn:"Qatar", c:"974", f:"🇶🇦", ex:"xxxxxxxx"},
            {nAr:"عمان", nEn:"Oman", c:"968", f:"🇴🇲", ex:"xxxxxxxx"},
            {nAr:"البحرين", nEn:"Bahrain", c:"973", f:"🇧🇭", ex:"xxxxxxxx"},
            {nAr:"الأردن", nEn:"Jordan", c:"962", f:"🇯🇴", ex:"7xxxxxxxx"},
            {nAr:"العراق", nEn:"Iraq", c:"964", f:"🇮🇶", ex:"7xxxxxxxxx"},
            {nAr:"اليمن", nEn:"Yemen", c:"967", f:"🇾🇪", ex:"7xxxxxxxx"},
            {nAr:"المغرب", nEn:"Morocco", c:"212", f:"🇲🇦", ex:"6xxxxxxxx"},
            {nAr:"الجزائر", nEn:"Algeria", c:"213", f:"🇩🇿", ex:"5xxxxxxxx"},
            {nAr:"تونس", nEn:"Tunisia", c:"216", f:"🇹🇳", ex:"xxxxxxxx"},
            {nAr:"ليبيا", nEn:"Libya", c:"218", f:"🇱🇾", ex:"xxxxxxxx"},
            {nAr:"تركيا", nEn:"Turkey", c:"90", f:"🇹🇷", ex:"5xxxxxxxxx"},
            {nAr:"أمريكا", nEn:"USA", c:"1", f:"🇺🇸", ex:"xxxxxxxxxx"},
            {nAr:"بريطانيا", nEn:"UK", c:"44", f:"🇬🇧", ex:"xxxxxxxxxx"}
            // تم إضافة أهم الدول، ويمكنك زيادة القائمة بنفس النمط
        ];

        let lang = 'ar';
        const ui = {
            ar: { btn: "إرسال الآن", msg: "الرسالة (اختياري)", search: "بحث باسم الدولة...", lang: "English", ex: "مثال: " },
            en: { btn: "Send Now", msg: "Message (Optional)", search: "Search country...", lang: "العربية", ex: "Example: " }
        };

        function startApp(l) {
            lang = l;
            document.getElementById('splash').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            updateUI();
            render(countries);
        }

        function updateUI() {
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('btnTxt').innerText = ui[lang].btn;
            document.getElementById('msg').placeholder = ui[lang].msg;
            document.getElementById('search').placeholder = ui[lang].search;
            document.getElementById('langBtn').innerText = ui[lang].lang;
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = data.map(c => `
                <div onclick="select('${c.f}','${lang==='ar'?c.nAr:c.nEn}','${c.c}','${c.ex}')" class="flex items-center justify-between p-5 border-b border-gray-800 hover:bg-[#202c33] cursor-pointer">
                    <div class="flex items-center gap-4 text-right">
                        <span class="text-3xl">${c.f}</span>
                        <div>
                            <div class="font-bold text-sm">${lang==='ar'?c.nAr:c.nEn}</div>
                            <div class="text-[10px] text-gray-500">${ui[lang].ex} ${c.ex}</div>
                        </div>
                    </div>
                    <span class="text-[#25D366] font-bold" dir="ltr">+${c.c}</span>
                </div>
            `).join('');
        }

        function select(f, n, c, ex) {
            document.getElementById('curFlag').innerText = f;
            document.getElementById('inputFlag').innerText = f;
            document.getElementById('curName').innerText = n;
            document.getElementById('dialCode').value = '+' + c;
            document.getElementById('phone').placeholder = ex;
            document.getElementById('curEx').innerText = ui[lang].ex + ex;
            closeModal();
        }

        function doSearch() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = countries.filter(c => c.nAr.includes(q) || c.nEn.toLowerCase().includes(q) || c.c.includes(q));
            render(filtered);
        }

        function toggleLanguage() {
            lang = lang === 'ar' ? 'en' : 'ar';
            updateUI();
            render(countries);
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => document.getElementById('modalContent').classList.add('active'), 10);
        }

        function closeModal() {
            document.getElementById('modalContent').classList.remove('active');
            setTimeout(() => document.getElementById('modal').style.display = 'none', 300);
        }

        function launch() {
            const dial = document.getElementById('dialCode').value.replace('+', '').trim();
            let num = document.getElementById('phone').value.trim();
            const txt = encodeURIComponent(document.getElementById('msg').value);
            if(!num) return alert(lang==='ar'?'يرجى إدخال الرقم':'Enter number');
            if(num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${dial}${num}?text=${txt}`, '_blank');
        }
    </script>
</body>
</html>
