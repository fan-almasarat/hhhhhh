<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة مباشرة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand: #00a884; --bg: #ffffff; --surface: #f0f2f5; --text: #111b21; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
        .app { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; position: relative; border: 1px solid #eee; }
        
        header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #eee; }
        .logo-box { display: flex; align-items: center; gap: 10px; color: var(--brand); }
        .logo-box i { font-size: 24px; background: var(--brand); color: white; padding: 5px; border-radius: 8px; }
        .logo-box h1 { font-size: 18px; font-weight: 900; color: var(--text); }
        
        .top-actions { display: flex; gap: 8px; }
        .btn-lang { background: var(--surface); border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        label { font-size: 12px; font-weight: bold; color: #667781; display: block; margin-bottom: 6px; }
        
        /* البحث والمدخلات */
        .search-row { position: relative; margin-bottom: 10px; }
        .input-text { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #e1e9eb; background: var(--surface); font-size: 15px; outline: none; }
        .results { position: absolute; top: 100%; left: 0; width: 100%; background: #fff; z-index: 100; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto; display: none; }
        .country-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }

        .phone-row { display: flex; gap: 8px; }
        .code-view { width: 90px; background: var(--surface); border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #e1e9eb; font-weight: bold; }

        /* اقتراحات الرسائل */
        .sug-list { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .sug-chip { background: #e7f8ef; color: #00a884; border: none; padding: 8px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; }

        .btn-send { background: var(--brand); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 900; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-qr { background: #111b21; color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; }

        /* كاميرا الباركود */
        #cam-modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame { position: absolute; inset: 0; margin: auto; width: 250px; height: 250px; border: 3px solid var(--brand); border-radius: 20px; box-shadow: 0 0 0 5000px rgba(0,0,0,0.5); }

        /* السجل المنبثق */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 4000; display: none; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 25px 25px 0 0; padding: 20px; max-height: 60%; overflow-y: auto; }
        .hist-row { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }

        footer { background: #fff; padding: 8px; border-top: 1px solid #eee; display: flex; justify-content: space-around; }
        .nav-link { border: none; background: none; color: #888; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; text-decoration: none; }
        .nav-link.active { color: var(--brand); }
        .nav-link i { font-size: 20px; }
        .nav-link span { font-size: 10px; font-weight: bold; }

        body.en { direction: ltr; }
    </style>
</head>
<body id="body">

<div id="cam-modal">
    <button onclick="stopQR()" style="position:absolute; top:30px; left:50%; transform:translateX(-50%); z-index:100; padding:10px 30px; border-radius:30px; background:red; color:white; border:none; font-weight:bold;">إلغاء</button>
    <video id="video" playsinline></video>
    <div class="scan-frame"></div>
</div>

<div class="app">
    <header>
        <div class="logo-box">
            <i class="fas fa-bolt"></i>
            <h1 id="t-title">دردشة مباشرة</h1>
        </div>
        <div class="top-actions">
            <button class="btn-lang" onclick="toggleL()" id="lBtn">English</button>
        </div>
    </header>

    <main>
        <div class="card">
            <label id="t-search">ابحث عن الدولة (عربي/En)</label>
            <div class="search-row">
                <input type="text" id="cInp" class="input-text" placeholder="السودان، السعودية، 249...">
                <div id="cRes" class="results"></div>
            </div>

            <label id="t-phone">رقم الهاتف</label>
            <div class="phone-row">
                <div class="code-view">
                    <span id="fIcon" class="flag-icon flag-icon-sd" style="margin-left:5px;"></span>
                    <span id="pCode">249</span>
                </div>
                <input type="tel" id="pNum" class="input-text" placeholder="ادخل الرقم" style="font-size:18px; font-weight:900;">
            </div>
        </div>

        <div class="card">
            <label id="t-msg">الرسالة</label>
            <textarea id="pMsg" class="input-text" style="height:70px; resize:none;">السلام عليكم</textarea>
            <div class="sug-list" id="sugBox"></div>
            
            <button class="btn-send" onclick="doChat()">
                <span id="t-send">بدء المراسلة</span> <i class="fas fa-paper-plane"></i>
            </button>
            
            <button class="btn-qr" onclick="startQR()">
                <i class="fas fa-qrcode"></i> <span id="t-qr">مسح باركود واتساب</span>
            </button>
        </div>
    </main>

    <div id="hModal" class="modal" onclick="closeH()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="text-align:center; margin-bottom:15px;" id="t-hTitle">آخر المراسلات</h3>
            <div id="hList"></div>
        </div>
    </div>

    <footer>
        <button class="nav-link active" onclick="location.reload()"><i class="fas fa-home"></i><span id="n1">الرئيسية</span></button>
        <button class="nav-link" onclick="openH()"><i class="fas fa-history"></i><span id="n2">السجل</span></button>
        <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="nav-link"><i class="fas fa-headset"></i><span id="n3">الدعم</span></a>
        <button class="nav-link" onclick="share()"><i class="fas fa-share-nodes"></i><span id="n4">مشاركة</span></button>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    let countries = [];
    let lang = 'ar';
    const reader = new ZXing.BrowserMultiFormatReader();

    async function init() {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,translations');
        const data = await res.json();
        countries = data.map(c => ({
            ar: c.translations.ara ? c.translations.ara.common : c.name.common,
            en: c.name.common,
            code: c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : ""),
            flag: c.cca2.toLowerCase()
        })).sort((a,b) => a.ar.localeCompare(b.ar));
        
        // اكتشاف تلقائي
        const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
        const my = countries.find(c => c.flag === geo.country.toLowerCase());
        if(my) setC(my);
        renderSugs();
    }

    document.getElementById('cInp').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        const div = document.getElementById('cRes');
        div.innerHTML = '';
        if(!v) { div.style.display='none'; return; }
        const fil = countries.filter(c => c.ar.includes(v) || c.en.toLowerCase().includes(v) || c.code.includes(v));
        if(fil.length > 0) {
            div.style.display='block';
            fil.forEach(c => {
                const item = document.createElement('div');
                item.className = 'country-item';
                item.innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span> ${lang=='ar'?c.ar:c.en} (${c.code})`;
                item.onclick = () => { setC(c); div.style.display='none'; document.getElementById('cInp').value=''; };
                div.appendChild(item);
            });
        }
    };

    function setC(c) {
        document.getElementById('pCode').innerText = c.code.replace('+','');
        document.getElementById('fIcon').className = `flag-icon flag-icon-${c.flag}`;
    }

    function toggleL() {
        lang = lang === 'ar' ? 'en' : 'ar';
        document.getElementById('body').className = lang;
        document.getElementById('body').dir = lang === 'ar' ? 'rtl' : 'ltr';
        const t = {
            ar: ["دردشة مباشرة", "ابحث عن الدولة (عربي/En)", "رقم الهاتف", "ادخل الرقم", "الرسالة", "بدء المراسلة", "مسح باركود واتساب", "آخر المراسلات", "الرئيسية", "السجل", "الدعم", "مشاركة", "English"],
            en: ["Direct Chat", "Search Country (Ar/En)", "Phone Number", "Enter Number", "Message", "Start Chat", "Scan WA QR", "Recent History", "Home", "History", "Support", "Share", "العربية"]
        };
        const c = t[lang];
        document.getElementById('t-title').innerText = c[0];
        document.getElementById('t-search').innerText = c[1];
        document.getElementById('t-phone').innerText = c[2];
        document.getElementById('pNum').placeholder = c[3];
        document.getElementById('t-msg').innerText = c[4];
        document.getElementById('t-send').innerText = c[5];
        document.getElementById('t-qr').innerText = c[6];
        document.getElementById('t-hTitle').innerText = c[7];
        document.getElementById('n1').innerText = c[8];
        document.getElementById('n2').innerText = c[9];
        document.getElementById('n3').innerText = c[10];
        document.getElementById('n4').innerText = c[11];
        document.getElementById('lBtn').innerText = c[12];
        renderSugs();
    }

    function renderSugs() {
        const s = lang === 'ar' ? ["السلام عليكم", "بكم السعر؟", "أرسل الموقع", "شكراً لك"] : ["Hello", "Price?", "Location", "Thank you"];
        const b = document.getElementById('sugBox');
        b.innerHTML = '';
        s.forEach(txt => {
            const btn = document.createElement('button');
            btn.className = 'sug-chip'; btn.innerText = txt;
            btn.onclick = () => document.getElementById('pMsg').value = txt;
            b.appendChild(btn);
        });
    }

    function doChat() {
        const full = document.getElementById('pCode').innerText + document.getElementById('pNum').value.replace(/\D/g,'');
        const msg = encodeURIComponent(document.getElementById('pMsg').value);
        if(full.length > 5) {
            let h = JSON.parse(localStorage.getItem('zh_v3') || '[]');
            if(!h.includes(full)) { h.unshift(full); localStorage.setItem('zh_v3', JSON.stringify(h.slice(0,10))); }
            window.location.href = `https://wa.me/${full}?text=${msg}`;
        }
    }

    async function startQR() {
        document.getElementById('cam-modal').style.display='flex';
        try {
            const devs = await reader.listVideoInputDevices();
            const back = devs.find(d => d.label.toLowerCase().includes('back')) || devs[0];
            reader.decodeFromVideoDevice(back.deviceId, 'video', (res) => {
                if(res) {
                    stopQR();
                    if(res.text.includes('wa.me')) window.location.href = res.text;
                    else { document.getElementById('pNum').value = res.text.replace(/\D/g,''); doChat(); }
                }
            });
        } catch(e) { stopQR(); alert("Error"); }
    }
    function stopQR() { reader.reset(); document.getElementById('cam-modal').style.display='none'; }

    function openH() {
        const l = document.getElementById('hList'); l.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('zh_v3') || '[]');
        h.forEach(n => {
            const d = document.createElement('div');
            d.className = 'hist-row';
            d.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:#25d366"></i>`;
            d.onclick = () => { document.getElementById('pNum').value = n.replace(document.getElementById('pCode').innerText, ''); closeH(); };
            l.appendChild(d);
        });
        document.getElementById('hModal').style.display='flex';
    }
    function closeH() { document.getElementById('hModal').style.display='none'; }
    function share() { navigator.share({title: 'Direct Chat', url: location.href}); }
    
    window.onload = init;
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
