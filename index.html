<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة مباشرة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand: #00a884; --bg: #ffffff; --surface: #f0f2f5; --text: #111b21; --accent: #0072ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
        .app-shell { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: var(--bg); position: relative; }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: #fff; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
        .logo-box h1 { font-size: 18px; font-weight: 800; }
        
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        .phone-row { display: flex; gap: 10px; align-items: center; width: 100%; }
        .code-box { display: flex; align-items: center; background: var(--surface); border-radius: 15px; padding: 0 12px; width: 125px; height: 60px; flex-shrink: 0; }
        .code-input { width: 100%; border: none; background: transparent; font-weight: 800; font-size: 18px; text-align: center; outline: none; }
        .phone-input { flex: 1; height: 60px; padding: 0 15px; background: var(--surface); border-radius: 15px; border: none; font-size: 20px; font-weight: 800; outline: none; min-width: 0; }

        .btn-large { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-dark { background: var(--text); color: #fff; }
        .btn-install { background: linear-gradient(45deg, var(--accent), #00d2ff); color: white; display: none; animation: pulse 2s infinite; margin-top: 5px; }

        /* نافذة السجل */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; }
        .modal-body { width: 100%; background: #fff; border-radius: 25px 25px 0 0; padding: 20px; max-height: 70%; overflow-y: auto; transform: translateY(100%); transition: 0.3s; }
        .modal-body.show { transform: translateY(0); }
        .history-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }

        /* الكاميرا */
        #scanner-container { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: cover; }

        footer { background: #fff; padding: 12px; border-top: 1px solid #eee; display: flex; justify-content: space-around; }
        .nav-item { border: none; background: none; color: #667781; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--brand); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="scanner-container">
    <button onclick="stopScanner()" style="position:absolute; top:30px; left:20px; z-index:100; padding:10px 20px; background:red; color:white; border:none; border-radius:10px;">إغلاق</button>
    <video id="video"></video>
</div>

<div class="app-shell">
    <header>
        <div class="logo-box">
            <img src="whatsapp-icon.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968841.png'">
            <h1>دردشة مباشرة</h1>
        </div>
        <button class="btn-lang" onclick="alert('اللغة العربية هي الافتراضية')">العربية</button>
    </header>

    <main>
        <div class="phone-row">
            <div class="code-box">
                <span id="flagIcon" class="flag-icon flag-icon-sd"></span>
                <span style="font-weight:900; margin:0 5px;">+</span>
                <input type="tel" id="dialCode" class="code-input" value="249">
            </div>
            <input type="tel" id="phoneNumber" class="phone-input" placeholder="رقم الجوال">
        </div>

        <textarea id="messageText" style="width:100%; padding:15px; background:var(--surface); border-radius:15px; border:none; min-height:100px;" placeholder="اكتب رسالتك..."></textarea>

        <button class="btn-large btn-primary" onclick="openWA()">بدء المراسلة <i class="fas fa-paper-plane"></i></button>
        <button class="btn-large btn-dark" onclick="startScanner()">مسح باركود <i class="fas fa-qrcode"></i></button>
        <button id="pwaBtn" class="btn-large btn-install" onclick="installApp()">تثبيت التطبيق <i class="fas fa-download"></i></button>
    </main>

    <div id="historyModal" class="modal" onclick="closeHistory()">
        <div class="modal-body" id="mBody" onclick="event.stopPropagation()">
            <h2 style="text-align:center; margin-bottom:15px;">آخر المراسلات</h2>
            <div id="historyList"></div>
            <button onclick="closeHistory()" style="width:100%; padding:15px; margin-top:10px; border:none; border-radius:10px;">إغلاق</button>
        </div>
    </div>

    <footer>
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-house"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="openHistory()"><i class="fas fa-clock-rotate-left"></i><span>السجل</span></div>
        <div class="nav-item" onclick="navigator.share({url: location.href})"><i class="fas fa-share-nodes"></i><span>مشاركة</span></div>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let countries = [];

    // 1. تحديد الدولة تلقائياً + ربط العلم
    async function init() {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,cca2');
        countries = await res.json();
        
        try {
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            document.getElementById('dialCode').value = geo.country_calling_code.replace('+', '');
            document.getElementById('flagIcon').className = `flag-icon flag-icon-${geo.country_code.toLowerCase()}`;
        } catch(e) {}

        document.getElementById('dialCode').oninput = (e) => {
            const val = e.target.value.replace('+', '');
            const found = countries.find(c => (c.idd.root + (c.idd.suffixes?.[0] || '')).replace('+', '') === val);
            if(found) document.getElementById('flagIcon').className = `flag-icon flag-icon-${found.cca2.toLowerCase()}`;
        };
    }

    // 2. السجل (History)
    function openWA() {
        const full = document.getElementById('dialCode').value + document.getElementById('phoneNumber').value;
        if(full.length < 5) return;
        
        let h = JSON.parse(localStorage.getItem('wa_history') || '[]');
        if(!h.includes(full)) { h.unshift(full); localStorage.setItem('wa_history', JSON.stringify(h.slice(0,10))); }
        
        window.location.href = `https://wa.me/${full}?text=${encodeURIComponent(document.getElementById('messageText').value)}`;
    }

    function openHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('wa_history') || '[]');
        h.forEach(num => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>+${num}</span><i class="fab fa-whatsapp" style="color:green"></i>`;
            div.onclick = () => { document.getElementById('phoneNumber').value = num; closeHistory(); };
            list.appendChild(div);
        });
        document.getElementById('historyModal').style.display = 'flex';
        setTimeout(() => document.getElementById('mBody').classList.add('show'), 10);
    }
    function closeHistory() {
        document.getElementById('mBody').classList.remove('show');
        setTimeout(() => document.getElementById('historyModal').style.display = 'none', 300);
    }

    // 3. مسح الباركود
    function startScanner() {
        document.getElementById('scanner-container').style.display = 'flex';
        codeReader.decodeFromVideoDevice(null, 'video', (result) => {
            if (result) {
                document.getElementById('phoneNumber').value = result.text.replace(/\D/g, '');
                stopScanner();
            }
        });
    }
    function stopScanner() { codeReader.reset(); document.getElementById('scanner-container').style.display = 'none'; }

    // 4. التثبيت (PWA)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('pwaBtn').style.display = 'flex';
    });
    function installApp() {
        if(deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('pwaBtn').style.display = 'none'; });
        }
    }

    window.onload = init;
</script>
</body>
</html>
