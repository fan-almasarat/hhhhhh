<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب برو المباشر</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #111b21 0%, #0b141a 100%); min-height: 100vh; color: white; }
        
        /* تعديلات مكتبة الأعلام لتناسب التصميم */
        .iti { width: 100%; direction: ltr; }
        .iti__country-list { background-color: #2a3942; color: white; border: 1px solid #374151; max-width: 300px; }
        .iti__country:hover { background-color: #202c33; }
        .iti__selected-flag { background-color: #2a3942; border-radius: 12px 0 0 12px; }
        
        .glass-card {
            background: rgba(30, 42, 50, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        input, textarea {
            background: #2a3942 !important;
            border: 1px solid #374151 !important;
            color: white !important;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <div class="bg-[#25D366] w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 rotate-3 shadow-[0_0_20px_rgba(37,211,102,0.4)]">
                <i class="fab fa-whatsapp text-white text-5xl"></i>
            </div>
            <h1 class="text-2xl font-bold">مراسلة سريعة</h1>
            <p class="text-gray-400 text-sm mt-2">تحديد تلقائي للدولة والرمز</p>
        </div>

        <div class="space-y-6">
            <div class="text-left">
                <label class="block text-right text-xs mb-2 mr-2 text-gray-400">رقم الجوال</label>
                <input type="tel" id="phone" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-[#25D366] text-xl font-bold tracking-widest">
            </div>

            <div>
                <label class="block text-right text-xs mb-2 mr-2 text-gray-400">الرسالة (اختياري)</label>
                <textarea id="message" rows="3" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-[#25D366] text-right" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="launchWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-white py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 transition-all transform active:scale-95 shadow-xl">
                <i class="fas fa-paper-plane text-sm"></i> ابدأ المحادثة الآن
            </button>
        </div>

        <button id="installBtn" class="hidden mt-8 w-full py-3 border-2 border-dashed border-gray-600 text-gray-400 rounded-2xl text-sm font-medium hover:text-[#25D366] hover:border-[#25D366] transition-colors">
            <i class="fas fa-mobile-alt ml-2"></i> تثبيت التطبيق على جوالك
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script>
        const phoneInput = document.querySelector("#phone");
        
        // تشغيل مكتبة الأعلام والتحديد التلقائي
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "auto", // تحديد تلقائي للدولة
            geoIpLookup: function(success, failure) {
                fetch("https://ipapi.co/json") // خدمة لمعرفة موقع الـ IP
                    .then(res => res.json())
                    .then(data => success(data.country_code))
                    .catch(() => success("SA")); // افتراضياً السعودية إذا فشل التحديد
            },
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
            separateDialCode: true, // فصل مفتاح الدولة عن الرقم
            preferredCountries: ["sa", "eg", "ae", "kw", "qa"], // دول تظهر في البداية
        });

        function launchWhatsApp() {
            const fullNumber = iti.getNumber().replace('+', ''); // الحصول على الرقم كامل مع المفتاح
            const msg = encodeURIComponent(document.getElementById('message').value);
            
            if (!iti.isValidNumber()) {
                alert("يرجى إدخال رقم هاتف صحيح");
                return;
            }

            window.open(`https://wa.me/${fullNumber}?text=${msg}`, '_blank');
        }

        // كود التثبيت PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        document.getElementById('installBtn').onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        };
    </script>
</body>
</html>
