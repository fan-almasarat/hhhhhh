<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة مباشرة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand: #00a884; --bg: #ffffff; --surface: #f0f2f5; --text: #111b21; --gray: #667781; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
        .app-shell { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: var(--bg); position: relative; }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo-box { display: flex; align-items: center; gap: 10px; color: var(--brand); }
        .logo-box i { font-size: 26px; }
        .logo-box h1 { font-size: 20px; font-weight: 800; }
        
        .btn-lang { background: var(--brand); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .section { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; font-weight: 700; color: var(--gray); margin-right: 5px; }

        /* البحث والمدخلات */
        .input-group { background: var(--surface); border-radius: 15px; border: 2px solid transparent; transition: 0.3s; }
        .input-group:focus-within { border-color: var(--brand); background: #fff; }
        
        .search-field { width: 100%; padding: 16px; border: none; background: transparent; font-size: 16px; outline: none; }
        .results-panel { background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto; display: none; margin-top: 5px; }
        .c-item { padding: 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }

        .phone-row { display: flex; gap: 10px; }
        .code-box { width: 100px; background: var(--surface); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; }
        .phone-input { flex: 1; padding: 18px; background: var(--surface); border-radius: 15px; border: none; font-size: 20px; font-weight: 900; outline: none; }

        .message-box { width: 100%; padding: 15px; background: var(--surface); border-radius: 15px; border: none; font-size: 16px; resize: none; outline: none; min-height: 100px; }

        /* الاقتراحات */
        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .suggestions::-webkit-scrollbar { display: none; }
        .chip { background: #e7f8ef; color: var(--brand); border: none; padding: 10px 18px; border-radius: 25px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }

        /* أزرار ضخمة */
        .btn-large { width: 100%; padding: 20px; border-radius: 18px; border: none; font-size: 18px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: transform 0.1s; }
        .btn-large:active { transform: scale(0.98); }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-secondary { background: var(--text); color: #fff; margin-top: 5px; }

        /* مودال السجل الحديث */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 5000; display: none; align-items: flex-end; }
        .modal-sheet { background: #fff; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 80%; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease-out; }
        .modal-sheet.open { transform: translateY(0); }
        .modal-handle { width: 40px; height: 5px; background: #ddd; margin: 0 auto 20px; border-radius: 10px; }
        
        .h-row { padding: 18px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-radius: 12px; }
        .h-row:active { background: var(--surface); }

        footer { background: #fff; padding: 15px 5px; border-top: 1px solid #eee; display: flex; justify-content: space-around; }
        .nav-item { border: none; background: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--brand); }
        .nav-item i { font-size: 24px; }
        .nav-item span { font-size: 11px; font-weight: 800; }

        /* كاميرا الباركود */
        #qr-screen { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; }
        #v-stream { width: 100%; height: 100%; object-fit: cover; }
        .v-overlay { position: absolute; inset: 0; margin: auto; width: 280px; height: 280px; border: 4px solid var(--brand); border-radius: 30px; box-shadow: 0 0 0 5000px rgba(0,0,0,0.6); }

        body.en { direction: ltr; }
    </style>
</head>
<body id="app-body">

<div id="qr-screen">
    <button onclick="closeQR()" style="position:absolute; top:40px; left:50%; transform:translateX(-50%); z-index:100; padding:12px 35px; border-radius:30px; background:#ff3b30; color:white; border:none; font-weight:bold;">إلغاء المسح</button>
    <video id="v-stream" playsinline></video>
    <div class="v-overlay"></div>
</div>

<div class="app-shell">
    <header>
        <div class="logo-box">
            <i class="fas fa-comment-dots"></i>
            <h1 id="txt-title">دردشة مباشرة</h1>
        </div>
        <button class="btn-lang" onclick="changeLang()" id="lang-btn">English</button>
    </header>

    <main>
        <div class="section">
            <label id="txt-search">البحث عن الدولة</label>
            <div class="input-group">
                <input type="text" id="countryInput" class="search-field" placeholder="السودان، مصر، 249...">
            </div>
            <div id="countryResults" class="results-panel"></div>
        </div>

        <div class="section">
            <label id="txt-phone">رقم الجوال</label>
            <div class="phone-row">
                <div class="code-box">
                    <span id="flagIcon" class="flag-icon flag-icon-sd"></span>
                    <span id="dialCode" style="margin-right:5px;">249</span>
                </div>
                <input type="tel" id="phoneNumber" class="phone-input" placeholder="ادخل الرقم">
            </div>
        </div>

        <div class="section">
            <label id="txt-msg">الرسالة</label>
            <textarea id="messageText" class="message-box">السلام عليكم</textarea>
            <div class="suggestions" id="suggestionsBox"></div>
        </div>

        <button class="btn-large btn-primary" onclick="openWhatsApp()">
            <span id="txt-btn-send">بدء المراسلة الآن</span> <i class="fas fa-paper-plane"></i>
        </button>

        <button class="btn-large btn-secondary" onclick="openQR()">
            <i class="fas fa-qrcode"></i> <span id="txt-btn-qr">مسح باركود واتساب</span>
        </button>
    </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeHistory()">
        <div class="modal-sheet" id="modalSheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <h2 style="text-align:center; margin-bottom:20px;" id="txt-hist-title">آخر المراسلات</h2>
            <div id="historyContent"></div>
            <button onclick="closeHistory()" style="width:100%; padding:15px; margin-top:20px; border:none; border-radius:15px; background:var(--surface); font-weight:bold; color:var(--text);">إغلاق</button>
        </div>
    </div>

    <footer>
        <button class="nav-item active" onclick="location.reload()"><i class="fas fa-house"></i><span id="n1">الرئيسية</span></button>
        <button class="nav-item" onclick="openHistory()"><i class="fas fa-clock-rotate-left"></i><span id="n2">السجل</span></button>
        <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="nav-item"><i class="fas fa-circle-question"></i><span id="n3">الدعم</span></a>
        <button class="nav-item" onclick="shareMe()"><i class="fas fa-share-nodes"></i><span id="n4">مشاركة</span></button>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    let countries = [];
    let currentLang = 'ar';
    const qrReader = new ZXing.BrowserMultiFormatReader();

    async function setup() {
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,translations');
            const data = await res.json();
            countries = data.map(c => ({
                ar: c.translations.ara ? c.translations.ara.common : c.name.common,
                en: c.name.common,
                code: c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : ""),
                flag: c.cca2.toLowerCase()
            })).sort((a,b) => a.ar.localeCompare(b.ar));
            
            // تحديد الموقع
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            const found = countries.find(c => c.flag === geo.country.toLowerCase());
            if(found) setCountry(found);
            
            renderSugs(); // استدعاء فوري عند التحميل
        } catch(e) { console.error("Init Error"); }
    }

    document.getElementById('countryInput').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        const resDiv = document.getElementById('countryResults');
        resDiv.innerHTML = '';
        if(!v) { resDiv.style.display='none'; return; }
        const filter = countries.filter(c => c.ar.includes(v) || c.en.toLowerCase().includes(v) || c.code.includes(v));
        if(filter.length > 0) {
            resDiv.style.display='block';
            filter.forEach(c => {
                const div = document.createElement('div');
                div.className = 'c-item';
                div.innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span> ${currentLang=='ar'?c.ar:c.en} (${c.code})`;
                div.onclick = () => { setCountry(c); resDiv.style.display='none'; document.getElementById('countryInput').value=''; };
                resDiv.appendChild(div);
            });
        }
    };

    function setCountry(c) {
        document.getElementById('dialCode').innerText = c.code.replace('+','');
        document.getElementById('flagIcon').className = `flag-icon flag-icon-${c.flag}`;
    }

    function changeLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('app-body').className = currentLang;
        document.getElementById('app-body').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        
        const UI = {
            ar: ["دردشة مباشرة", "البحث عن الدولة", "رقم الجوال", "ادخل الرقم", "الرسالة", "بدء المراسلة الآن", "مسح باركود واتساب", "آخر المراسلات", "الرئيسية", "السجل", "الدعم", "مشاركة", "English"],
            en: ["Direct Chat", "Search Country", "Phone Number", "Enter Number", "Message", "Start Messaging Now", "Scan WA QR Code", "Recent History", "Home", "History", "Support", "Share", "العربية"]
        };
        const L = UI[currentLang];
        document.getElementById('txt-title').innerText = L[0];
        document.getElementById('txt-search').innerText = L[1];
        document.getElementById('txt-phone').innerText = L[2];
        document.getElementById('phoneNumber').placeholder = L[3];
        document.getElementById('txt-msg').innerText = L[4];
        document.getElementById('txt-btn-send').innerText = L[5];
        document.getElementById('txt-btn-qr').innerText = L[6];
        document.getElementById('txt-hist-title').innerText = L[7];
        document.getElementById('n1').innerText = L[8];
        document.getElementById('n2').innerText = L[9];
        document.getElementById('n3').innerText = L[10];
        document.getElementById('n4').innerText = L[11];
        document.getElementById('lang-btn').innerText = L[12];
        renderSugs();
    }

    function renderSugs() {
        const s = currentLang === 'ar' ? ["السلام عليكم", "بكم السعر؟", "أرسل لي الموقع", "متى يوصل؟"] : ["Hello", "How much?", "Send Location", "When arrive?"];
        const box = document.getElementById('suggestionsBox');
        box.innerHTML = '';
        s.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'chip'; btn.innerText = t;
            btn.onclick = () => document.getElementById('messageText').value = t;
            box.appendChild(btn);
        });
    }

    function openWhatsApp() {
        const full = document.getElementById('dialCode').innerText + document.getElementById('phoneNumber').value.replace(/\D/g,'');
        const msg = encodeURIComponent(document.getElementById('messageText').value);
        if(full.length > 7) {
            let h = JSON.parse(localStorage.getItem('zh_v4') || '[]');
            if(!h.includes(full)) { h.unshift(full); localStorage.setItem('zh_v4', JSON.stringify(h.slice(0,15))); }
            window.location.href = `https://wa.me/${full}?text=${msg}`;
        }
    }

    async function openQR() {
        document.getElementById('qr-screen').style.display='block';
        try {
            const devs = await qrReader.listVideoInputDevices();
            const back = devs.find(d => d.label.toLowerCase().includes('back')) || devs[0];
            qrReader.decodeFromVideoDevice(back.deviceId, 'v-stream', (res) => {
                if(res) {
                    closeQR();
                    if(res.text.includes('wa.me')) window.location.href = res.text;
                    else { document.getElementById('phoneNumber').value = res.text.replace(/\D/g,''); openWhatsApp(); }
                }
            });
        } catch(e) { closeQR(); alert("Camera Error"); }
    }
    function closeQR() { qrReader.reset(); document.getElementById('qr-screen').style.display='none'; }

    function openHistory() {
        const list = document.getElementById('historyContent'); list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('zh_v4') || '[]');
        if(h.length === 0) list.innerHTML = '<p style="text-align:center; padding:30px; color:#aaa;">السجل فارغ</p>';
        h.forEach(n => {
            const row = document.createElement('div');
            row.className = 'h-row';
            row.innerHTML = `<span><i class="fab fa-whatsapp" style="color:#25d366; margin-left:10px;"></i> <b>+${n}</b></span> <i class="fas fa-chevron-left" style="color:#ddd"></i>`;
            row.onclick = () => { document.getElementById('phoneNumber').value = n.replace(document.getElementById('dialCode').innerText, ''); closeHistory(); };
            list.appendChild(row);
        });
        document.getElementById('modalOverlay').style.display='flex';
        setTimeout(() => document.getElementById('modalSheet').classList.add('open'), 10);
    }
    function closeHistory() {
        document.getElementById('modalSheet').classList.remove('open');
        setTimeout(() => document.getElementById('modalOverlay').style.display='none', 300);
    }
    function shareMe() { navigator.share({title: 'Direct Chat', url: window.location.href}); }
    
    window.onload = setup;
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
