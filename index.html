<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة مباشرة | الذكاء التفاعلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #f0f7f2; font-family: 'Tajawal', sans-serif; color: #1c1e21; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .input-box { border: 1.5px solid #e1e4e8; border-radius: 12px; padding: 14px; transition: 0.3s; outline: none; width: 100%; text-align: center; font-weight: bold; }
        .input-box:focus { border-color: #25D366; box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.1); }
        .iti { width: 100%; }
        .iti__selected-flag { background: #f8f9fa !important; border-radius: 12px !important; border: 1.5px solid #e1e4e8 !important; pointer-events: none; }
        .iti__country-list { background: white !important; border-radius: 15px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.15); z-index: 1000; }
        .install-float { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a73e8; color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3); display: flex; align-items: center; gap: 10px; transition: 0.3s; z-index: 100; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 pb-24">

    <button class="install-float" id="btn-install-app">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span id="txt-install">تثبيت التطبيق الحديث</span>
    </button>

    <div class="w-full max-w-lg card p-8 space-y-8 relative">
        <button onclick="toggleLang()" class="absolute top-4 left-4 text-sm font-bold text-blue-600 px-3 py-1 rounded-lg transition" id="lang-btn">English</button>

        <div class="text-center">
            <h1 id="txt-header" class="text-3xl font-bold text-[#128c7e]">دردشة مباشرة</h1>
            <p id="txt-sub" class="text-gray-500 text-sm mt-3">اكتب المفتاح وسنتعرف على الدولة تلقائياً.</p>
        </div>

        <div class="space-y-5">
            <div>
                <label id="txt-label-select" class="text-xs font-bold text-gray-400 mb-2 block mr-1 uppercase">الدولة المختارة:</label>
                <div dir="ltr">
                    <input type="tel" id="country-search" class="input-box text-blue-600 cursor-default" readonly>
                </div>
            </div>

            <div class="flex gap-3" dir="ltr">
                <div class="w-1/3">
                    <label id="txt-label-code" class="text-right text-[10px] font-bold text-gray-400 mb-2 block mr-1" dir="rtl">المفتاح:</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-3 text-green-600 font-bold">+</span>
                        <input type="number" id="manual-code" value="966" class="input-box pl-7 pr-2 border-green-200 bg-green-50/50 text-green-700">
                    </div>
                </div>
                <div class="w-2/3">
                    <label id="txt-label-num" class="text-right text-[10px] font-bold text-gray-400 mb-2 block mr-1" dir="rtl">الرقم المحلي:</label>
                    <input type="number" id="phone-main" placeholder="50xxxxxxx" class="input-box">
                </div>
            </div>

            <button onclick="startChat()" class="w-full bg-[#25D366] text-white py-5 rounded-2xl font-bold text-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                <span id="txt-start">بدء المحادثة الآن</span>
            </button>
        </div>

        <div class="pt-6 border-t border-gray-100 flex gap-2 justify-center">
            <div class="w-8 h-8 rounded-full bg-[#25D366]/10 flex items-center justify-center">🟢</div>
            <p class="text-[10px] text-gray-400 self-center">نظام ذكي متصل بقاعدة بيانات الدول 2026</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script>
        const countryInput = document.querySelector("#country-search");
        const manualCode = document.querySelector("#manual-code");
        const phoneMain = document.getElementById("phone-main");
        const htmlTag = document.getElementById("main-html");

        let currentLang = 'ar';
        const arCountries = { "sa": "المملكة العربية السعودية", "eg": "مصر", "sd": "السودان", "ae": "الإمارات", "kw": "الكويت", "qa": "قطر", "jo": "الأردن" };

        const iti = window.intlTelInput(countryInput, {
            initialCountry: "sa",
            separateDialCode: true,
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        // ميزة "الربط العكسي": كتابة المفتاح تغير الدولة المختارة والاسم والعلم
        manualCode.addEventListener("input", function() {
            const val = this.value;
            const allCountries = iti.getCountryData();
            
            // البحث عن الدولة التي تملك هذا الرمز
            const found = allCountries.find(c => c.dialCode === val);
            
            if (found) {
                iti.setCountry(found.iso2); // تغيير العلم الصغير
                const countryName = currentLang === 'ar' ? (arCountries[found.iso2] || found.name) : found.name;
                countryInput.value = `${countryName} (+${found.dialCode})`; // تحديث حقل الاسم
            }
        });

        // تحديث أولي عند التشغيل
        function updateDisplay() {
            const data = iti.getSelectedCountryData();
            const countryName = currentLang === 'ar' ? (arCountries[data.iso2] || data.name) : data.name;
            countryInput.value = `${countryName} (+${data.dialCode})`;
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            htmlTag.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').innerText = currentLang === 'ar' ? 'English' : 'العربية';
            updateDisplay();
        }

        function startChat() {
            const code = manualCode.value;
            let num = phoneMain.value;
            if (!code || !num) return alert(currentLang === 'ar' ? "أكمل البيانات يا زول!" : "Please complete data!");
            if (num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${code}${num}`, '_blank');
        }

        window.onload = updateDisplay;
    </script>
</body>
</html>
