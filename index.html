<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة مباشرة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="page-wrapper">
        <nav class="top-nav">
            <button id="langToggle" onclick="toggleLanguage()" class="nav-btn">English</button>
            <button id="installButton" class="install-btn" style="display:none;"><i class="fas fa-download"></i> <span id="txtInstall">تثبيت</span></button>
        </nav>

        <header class="app-header">
            <img src="whatsapp-icon.png" alt="Logo" class="main-logo">
            <h1 id="txtTitle" class="app-heading">دردشة مباشرة</h1>
            <p id="txtDesc" class="description">مراسلة فورية عالمية دون حفظ الرقم.</p>
        </header>

        <main class="main-form">
            <div class="input-group">
                <label id="lblCountry">اختر الدولة:</label>
                <input type="text" id="countryInput" list="countriesList" oninput="handleCountrySelection(this.value)" autocomplete="off">
                <datalist id="countriesList"></datalist>
            </div>

            <div class="phone-row">
                <div class="country-box">
                    <span id="currentFlag" class="flag-icon flag-icon-sa"></span>
                    <input type="text" id="codeInput" value="+966" readonly>
                </div>
                <input type="tel" id="phoneInput" placeholder="رقم الهاتف" inputmode="numeric">
            </div>

            <div class="input-group">
                <label id="lblMsg">الرسالة:</label>
                <textarea id="messageInput">السلام عليكم</textarea>
            </div>

            <button class="btn-primary" onclick="openWhatsApp()">
                <i class="fab fa-whatsapp"></i> <span id="btnChat">بدء المحادثة</span>
            </button>
            
            <button class="btn-secondary" onclick="startQRScanner()">
                <i class="fas fa-qrcode"></i> <span id="btnQR">مسح باركود واتساب</span>
            </button>
        </main>

        <div class="share-section">
            <p id="txtShare" class="share-title">شارك التطبيق:</p>
            <div class="share-grid">
                <button class="share-card main-share" onclick="handleNativeShare()"><i class="fas fa-share-alt"></i></button>
                <button class="share-card wa" onclick="socialShare('wa')"><i class="fab fa-whatsapp"></i></button>
                <button class="share-card fb" onclick="socialShare('fb')"><i class="fab fa-facebook-f"></i></button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="qr-modal">
        <div class="qr-content">
            <div id="reader"></div>
            <button onclick="stopQRScanner()" class="close-qr">إغلاق</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js"></script>
</body>
</html>
