<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ZOL CHAT PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #25D366; --dark-green: #075E54; --bg: #f0f2f5;
            --white: #ffffff; --text: #111b21; --gray: #667781;
            --radius: 18px;
        }

        [data-theme="dark"] {
            --bg: #0b141a; --white: #111b21; --text: #e9edef; --gray: #8696a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); font-family: 'Cairo', sans-serif; color: var(--text);
        }

        .app-wrapper {
            max-width: 500px; margin: 0 auto; height: 100%;
            background: var(--white); display: flex; flex-direction: column;
            position: relative; transition: 0.3s;
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-section i { color: var(--primary); font-size: 1.8rem; }
        .logo-section h1 { font-size: 1.2rem; font-weight: 900; }

        .top-btns { display: flex; gap: 8px; }
        .t-btn {
            background: var(--bg); border: none; padding: 8px 12px;
            border-radius: 50px; cursor: pointer; color: var(--text);
            font-size: 0.8rem; font-weight: 800;
        }

        main {
            flex: 1; padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
        }

        .main-card {
            background: var(--white); border: 1px solid rgba(0,0,0,0.05);
            padding: 20px; border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .input-box { margin-bottom: 15px; }
        .input-box label { display: block; font-size: 0.8rem; font-weight: 800; margin-bottom: 6px; color: var(--gray); }

        /* البحث عن الدول */
        .search-container { position: relative; }
        .search-input {
            width: 100%; padding: 12px 40px; border-radius: 12px;
            border: 2px solid var(--bg); background: var(--bg); color: var(--text);
            font-weight: 700; outline: none;
        }
        .search-container i { position: absolute; right: 12px; top: 14px; color: var(--gray); }

        .country-list {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: var(--white); border-radius: 12px; max-height: 200px;
            overflow-y: auto; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none; border: 1px solid #eee;
        }

        .country-item {
            padding: 12px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* حقل الهاتف والمفتاح */
        .phone-group { display: flex; gap: 8px; }
        .code-input-box {
            width: 95px; background: var(--bg); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            border: 2px solid var(--bg);
        }
        .code-input-box input {
            width: 45px; background: none; border: none; outline: none;
            color: var(--text); font-weight: 900; font-size: 1rem; text-align: center;
        }

        .phone-field {
            flex: 1; padding: 15px; border-radius: 12px;
            border: 2px solid var(--bg); background: var(--bg);
            color: var(--text); font-size: 1.1rem; font-weight: 800; outline: none;
        }

        .msg-field {
            width: 100%; height: 80px; padding: 12px; border-radius: 12px;
            border: 2px solid var(--bg); background: var(--bg);
            color: var(--text); resize: none; outline: none; font-size: 0.95rem;
        }

        /* اقتراحات الرسائل */
        .suggestions { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; margin-top: 5px; }
        .suggestion-chip {
            white-space: nowrap; padding: 6px 15px; background: #e7f8ef;
            color: var(--dark-green); border-radius: 50px; font-size: 0.75rem;
            font-weight: 700; border: none; cursor: pointer;
        }

        .btn-action {
            width: 100%; padding: 16px; border-radius: 15px;
            border: none; background: var(--primary); color: white;
            font-size: 1.1rem; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .qr-card {
            background: #111b21; color: white; padding: 15px;
            border-radius: var(--radius); display: flex; align-items: center;
            justify-content: space-between; cursor: pointer;
        }

        /* النوافذ المنبثقة */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--white); width: 100%; max-width: 400px;
            border-radius: 25px; padding: 20px; position: relative;
        }
        .history-list { max-height: 300px; overflow-y: auto; }
        .history-item {
            padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }

        /* الكاميرا */
        .camera-overlay {
            position: fixed; inset: 0; background: black; z-index: 6000;
            display: none; flex-direction: column;
        }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame {
            position: absolute; inset: 0; margin: auto; width: 250px; height: 250px;
            border: 4px solid var(--primary); border-radius: 30px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
        }

        footer {
            height: 75px; border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-link {
            background: none; border: none; color: var(--gray);
            display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
        }
        .nav-link.active { color: var(--primary); }
        .nav-link span { font-size: 0.7rem; font-weight: 800; }

        body.en { direction: ltr; font-family: 'Poppins', sans-serif; }
        body.en .search-container i { right: auto; left: 12px; }
    </style>
</head>
<body id="app">

    <div id="camView" class="camera-overlay">
        <div style="padding:20px; text-align:center; position:absolute; width:100%; top:0; z-index:10;">
            <button onclick="stopScan()" style="background:var(--primary); color:white; border:none; padding:10px 30px; border-radius:50px; font-weight:900;">إغلاق</button>
        </div>
        <video id="video-preview" playsinline></video>
        <div class="scan-frame"></div>
    </div>

    <div id="histView" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="histTitle" style="margin-bottom:15px;">الأرقام الأخيرة</h3>
            <div id="hList" class="history-list"></div>
        </div>
    </div>

    <div class="app-wrapper">
        <header>
            <div class="logo-section">
                <i class="fab fa-whatsapp"></i>
                <h1>ZOL CHAT</h1>
            </div>
            <div class="top-btns">
                <button class="t-btn" onclick="swapLang()" id="langBtn">English</button>
                <button class="t-btn" onclick="toggleDark()"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <main>
            <div class="main-card">
                <div class="input-box">
                    <label id="lblSearch">ابحث عن الدولة</label>
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="cSearch" class="search-input" placeholder="السودان، السعودية...">
                        <div id="cDrop" class="country-list"></div>
                    </div>
                </div>

                <div class="input-box">
                    <label id="lblPhone">رقم الجوال</label>
                    <div class="phone-group">
                        <div class="code-input-box">
                            <span id="fIcon" class="flag-icon flag-icon-sd"></span>
                            <input type="tel" id="pCode" value="249">
                        </div>
                        <input type="tel" id="pNum" class="phone-field" placeholder="ادخل الرقم" inputmode="numeric">
                    </div>
                </div>

                <div class="input-box">
                    <label id="lblMsg">الرسالة</label>
                    <textarea id="msgBody" class="msg-field">السلام عليكم</textarea>
                    <div class="suggestions" id="sugList"></div>
                </div>

                <button class="btn-action" onclick="send()">
                    <span id="btnSend">فتح محادثة</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <div class="qr-card" onclick="startScan()">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="background:var(--primary); padding:10px; border-radius:10px;"><i class="fas fa-qrcode"></i></div>
                    <div>
                        <b id="qrTitle">مسح باركود</b>
                        <p id="qrSub" style="font-size:0.7rem; color:#8696a0;">قراءة الرقم بالكاميرا</p>
                    </div>
                </div>
                <i class="fas fa-chevron-left" id="arr"></i>
            </div>

            <button class="btn-action" style="background:#0056b3;" onclick="showHistory()">
                <span id="btnHist">سجل الأرقام</span>
                <i class="fas fa-history"></i>
            </button>
        </main>

        <footer>
            <button class="nav-link active" onclick="location.reload()">
                <i class="fas fa-home"></i><span id="n1">الرئيسية</span>
            </button>
            <button class="nav-link" onclick="share()">
                <i class="fas fa-share-nodes"></i><span id="n2">مشاركة</span>
            </button>
            <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="nav-link" style="text-decoration:none;">
                <i class="fas fa-id-card"></i><span id="n3">المطور</span>
            </a>
        </footer>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script>
        const DB = [
            {n:"السودان", e:"Sudan", c:"249", i:"sd"}, {n:"السعودية", e:"Saudi Arabia", c:"966", i:"sa"},
            {n:"مصر", e:"Egypt", c:"20", i:"eg"}, {n:"الإمارات", e:"UAE", c:"971", i:"ae"},
            {n:"الكويت", e:"Kuwait", c:"965", i:"kw"}, {n:"قطر", e:"Qatar", c:"974", i:"qa"},
            {n:"أمريكا", e:"USA", c:"1", i:"us"}, {n:"كندا", e:"Canada", c:"1", i:"ca"},
            {n:"بريطانيا", e:"UK", c:"44", i:"gb"}, {n:"عمان", e:"Oman", c:"968", i:"om"},
            {n:"البحرين", e:"Bahrain", c:"973", i:"bh"}, {n:"الأردن", e:"Jordan", c:"962", i:"jo"},
            {n:"العراق", e:"Iraq", c:"964", i:"iq"}, {n:"المغرب", e:"Morocco", c:"212", i:"ma"},
            {n:"تركيا", e:"Turkey", c:"90", i:"tr"}, {n:"فرنسا", e:"France", c:"33", i:"fr"}
        ];

        const SUGS = {
            ar: ["السلام عليكم", "أرسل لي الموقع", "كم السعر؟", "شكراً لك"],
            en: ["Hello", "Send Location", "How much?", "Thank you"]
        };

        let lang = 'ar';
        const reader = new ZXing.BrowserMultiFormatReader();

        function swapLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.getElementById('app').className = lang;
            document.getElementById('app').dir = lang === 'ar' ? 'rtl' : 'ltr';
            updateUI();
        }

        function updateUI() {
            const t = {
                ar: { s:"ابحث عن الدولة", p:"رقم الجوال", m:"الرسالة", b:"فتح محادثة", q:"مسح باركود", qs:"قراءة الرقم بالكاميرا", h:"سجل الأرقام", n1:"الرئيسية", n2:"مشاركة", n3:"المطور", ht:"الأرقام الأخيرة", ph:"ادخل الرقم", lb:"English" },
                en: { s:"Search Country", p:"Phone Number", m:"Message", b:"Open Chat", q:"Scan QR", qs:"Read number via camera", h:"Recent History", n1:"Home", n2:"Share", n3:"Dev", ht:"Recent Numbers", ph:"Enter Number", lb:"العربية" }
            };
            const c = t[lang];
            document.getElementById('lblSearch').innerText = c.s;
            document.getElementById('lblPhone').innerText = c.p;
            document.getElementById('lblMsg').innerText = c.m;
            document.getElementById('btnSend').innerText = c.b;
            document.getElementById('qrTitle').innerText = c.q;
            document.getElementById('qrSub').innerText = c.qs;
            document.getElementById('btnHist').innerText = c.h;
            document.getElementById('n1').innerText = c.n1;
            document.getElementById('n2').innerText = c.n2;
            document.getElementById('n3').innerText = c.n3;
            document.getElementById('histTitle').innerText = c.ht;
            document.getElementById('pNum').placeholder = c.ph;
            document.getElementById('langBtn').innerText = c.lb;
            document.getElementById('arr').className = lang === 'ar' ? 'fas fa-chevron-left' : 'fas fa-chevron-right';
            
            renderSugs();
        }

        function renderSugs() {
            const container = document.getElementById('sugList');
            container.innerHTML = '';
            SUGS[lang].forEach(s => {
                const b = document.createElement('button');
                b.className = 'suggestion-chip';
                b.innerText = s;
                b.onclick = () => document.getElementById('msgBody').value = s;
                container.appendChild(b);
            });
        }

        document.getElementById('cSearch').addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase();
            const d = document.getElementById('cDrop');
            d.innerHTML = '';
            if(!v) { d.style.display='none'; return; }
            const fil = DB.filter(x => x.n.includes(v) || x.e.toLowerCase().includes(v) || x.c.includes(v));
            if(fil.length > 0) {
                d.style.display='block';
                fil.forEach(x => {
                    const i = document.createElement('div');
                    i.className = 'country-item';
                    i.innerHTML = `<span class="flag-icon flag-icon-${x.i}"></span> ${lang=='ar'?x.n:x.e} (+${x.c})`;
                    i.onclick = () => {
                        document.getElementById('pCode').value = x.c;
                        document.getElementById('fIcon').className = `flag-icon flag-icon-${x.i}`;
                        d.style.display='none';
                    };
                    d.appendChild(i);
                });
            }
        });

        document.getElementById('pCode').addEventListener('input', (e) => {
            const found = DB.find(x => x.c === e.target.value);
            if(found) document.getElementById('fIcon').className = `flag-icon flag-icon-${found.i}`;
        });

        function send() {
            const c = document.getElementById('pCode').value.replace(/\D/g,'');
            const p = document.getElementById('pNum').value.replace(/\D/g,'');
            const m = encodeURIComponent(document.getElementById('msgBody').value);
            if(p.length > 5) {
                const full = c + p;
                save(full);
                window.open(`https://wa.me/${full}?text=${m}`, '_blank');
            }
        }

        function save(n) {
            let h = JSON.parse(localStorage.getItem('zh') || '[]');
            if(!h.includes(n)) { h.unshift(n); if(h.length>15) h.pop(); localStorage.setItem('zh', JSON.stringify(h)); }
        }

        function showHistory() {
            const l = document.getElementById('hList');
            l.innerHTML = '';
            const h = JSON.parse(localStorage.getItem('zh') || '[]');
            h.forEach(n => {
                const d = document.createElement('div');
                d.className = 'history-item';
                d.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:#25d366"></i>`;
                d.onclick = () => { document.getElementById('pNum').value = n; document.getElementById('histView').style.display='none'; };
                l.appendChild(d);
            });
            document.getElementById('histView').style.display='flex';
        }

        async function startScan() {
            document.getElementById('camView').style.display='flex';
            try {
                const devs = await reader.listVideoInputDevices();
                const back = devs.find(d => d.label.toLowerCase().includes('back')) || devs[0];
                reader.decodeFromVideoDevice(back.deviceId, 'video-preview', (res) => {
                    if(res) { document.getElementById('pNum').value = res.text.replace(/\D/g,''); stopScan(); }
                });
            } catch(e) { stopScan(); }
        }

        function stopScan() { reader.reset(); document.getElementById('camView').style.display='none'; }

        function toggleDark() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function share() {
            if(navigator.share) navigator.share({title:'Zol Chat', url:location.href});
            else { navigator.clipboard.writeText(location.href); alert("Copied!"); }
        }

        window.onload = renderSugs;
    </script>
</body>
</html>
