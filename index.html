<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct - Manual Key</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #0b141a; color: white; font-family: 'Tajawal', sans-serif; }
        
        .iti { width: auto; }
        .iti__country-list { 
            background-color: #111b21 !important; 
            border: 1px solid #2a3942 !important; 
            border-radius: 20px;
            max-width: 300px;
            z-index: 100;
        }
        .iti__search-input { background-color: #202c33 !important; color: white !important; border: 1px solid #3b4a54 !important; padding: 10px !important; }
        .iti__selected-flag { background-color: transparent !important; border-radius: 15px !important; }

        /* تنسيق الحقول */
        .input-box { background: #2a3942; border: 1px solid #3b4a54; color: white; border-radius: 18px; outline: none; }
        .input-box:focus { border-color: #25D366; }
        .btn-green { background: #25D366; color: black; transition: 0.3s; font-weight: bold; }
        .btn-green:active { transform: scale(0.98); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl relative">
        
        <button onclick="toggleLanguage()" class="absolute top-6 left-6 bg-[#202c33] px-4 py-2 rounded-full text-xs font-bold border border-white/10">
            <span id="lang-text">English</span>
        </button>

        <div class="text-center mb-10 pt-4">
            <h2 id="title" class="text-2xl font-bold">واتساب المباشر</h2>
            <p id="subtitle" class="text-gray-400 text-sm mt-2">اكتب المفتاح يدوياً أو اختر الدولة</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label id="label-phone" class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mr-2">رقم الهاتف</label>
                <div class="flex gap-2" dir="ltr">
                    <div class="relative flex items-center bg-[#2a3942] border border-[#3b4a54] rounded-[18px] px-3 w-32">
                        <input type="text" id="flag-trigger" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                        <div id="selected-flag-icon" class="mr-1"></div>
                        <span class="text-[#25D366] font-bold mr-1">+</span>
                        <input type="number" id="manual-code" value="966" class="bg-transparent w-full text-white font-bold outline-none no-spinner text-center">
                    </div>
                    <input type="number" id="phone-main" placeholder="50xxxxxxx" class="input-box flex-1 p-5 font-bold text-lg">
                </div>
            </div>

            <div class="text-right">
                <label id="label-msg" class="block text-[11px] font-bold mb-2 text-gray-500 uppercase mr-2">الرسالة (اختياري)</label>
                <textarea id="message" rows="3" class="input-box w-full p-5 text-sm resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="sendWhatsApp()" class="w-full btn-green py-5 rounded-2xl text-xl shadow-lg">
                <span id="btn-text">إرسال الآن</span>
            </button>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        const flagTrigger = document.querySelector("#flag-trigger");
        const manualCodeInput = document.querySelector("#manual-code");
        const phoneInput = document.querySelector("#phone-main");

        const arabicCountries = { "sa": "السعودية", "eg": "مصر", "ae": "الإمارات", "sd": "السودان", "kw": "الكويت", "qa": "قطر", "jo": "الأردن", "ps": "فلسطين", "iq": "العراق", "ye": "اليمن" };

        // تهيئة المكتبة على الحقل المخفي فقط لتوفير القائمة
        const iti = window.intlTelInput(flagTrigger, {
            initialCountry: "sa",
            countrySearch: true,
            i18n: { searchPlaceholder: "بحث عن دولة...", ...arabicCountries },
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        // تحديث المفتاح عند اختيار دولة من القائمة
        flagTrigger.addEventListener("countrychange", function() {
            const countryData = iti.getSelectedCountryData();
            manualCodeInput.value = countryData.dialCode;
            updateFlagIcon();
        });

        // تحديث العلم تلقائياً عند كتابة المفتاح يدوياً
        manualCodeInput.addEventListener("input", function() {
            const val = this.value;
            // محاولة البحث عن الدولة التي تملك هذا المفتاح
            const allCountries = iti.getCountryData();
            const country = allCountries.find(c => c.dialCode === val);
            if (country) {
                iti.setCountry(country.iso2);
                updateFlagIcon();
            }
        });

        function updateFlagIcon() {
            const activeFlag = document.querySelector(".iti__flag-container .iti__selected-flag .iti__flag");
            const iconContainer = document.querySelector("#selected-flag-icon");
            if (activeFlag) {
                iconContainer.innerHTML = activeFlag.outerHTML;
            }
        }

        const translations = {
            ar: { title: "واتساب المباشر", subtitle: "اكتب المفتاح يدوياً أو اختر الدولة", labelPhone: "رقم الهاتف", labelMsg: "الرسالة (اختياري)", placeholderMsg: "اكتب رسالتك هنا...", btn: "إرسال الآن", langBtn: "English" },
            en: { title: "Direct WhatsApp", subtitle: "Enter key manually or select country", labelPhone: "Phone Number", labelMsg: "Message (Optional)", placeholderMsg: "Type message...", btn: "Send Now", langBtn: "العربية" }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('html-tag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            const t = translations[currentLang];
            document.getElementById('title').innerText = t.title;
            document.getElementById('subtitle').innerText = t.subtitle;
            document.getElementById('label-phone').innerText = t.labelPhone;
            document.getElementById('label-msg').innerText = t.labelMsg;
            document.getElementById('message').placeholder = t.placeholderMsg;
            document.getElementById('btn-text').innerText = t.btn;
            document.getElementById('lang-text').innerText = t.langBtn;
            
            iti.setOptions({ i18n: currentLang === 'ar' ? { searchPlaceholder: "بحث...", ...arabicCountries } : { searchPlaceholder: "Search..." } });
        }

        function sendWhatsApp() {
            const code = manualCodeInput.value;
            let phone = phoneInput.value;
            const msg = encodeURIComponent(document.getElementById('message').value);
            
            if (!code || !phone) return alert(currentLang === 'ar' ? 'أدخل الكود والرقم' : 'Enter code and number');
            
            if (phone.startsWith('0')) phone = phone.substring(1);
            window.open(`https://wa.me/${code}${phone}?text=${msg}`, '_blank');
        }

        window.onload = updateFlagIcon;
    </script>
    <style> .no-spinner::-webkit-inner-spin-button, .no-spinner::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; } </style>
</body>
</html>
