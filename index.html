<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة فورية | تواصل بذكاء</title>
    
    <link rel="stylesheet" href="style.css?v=2026">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="manifest" href="manifest.json?v=2026">
    <link rel="shortcut icon" href="whatsapp-icon.png" type="image/png">
</head>
<body>
    
    <div class="app-container" id="pageWrapper"> 
        <header class="app-header">
            <div class="logo-area">
                <img src="whatsapp-icon.png" alt="Logo" class="main-logo">
            </div>
            <h1 class="app-title">دردشة مباشرة</h1>
            <p class="app-subtitle">راسل أي رقم على واتساب دون عناء حفظه</p>
        </header>

        <button id="installButton" class="btn-install" style="display: none;">
            <i class="fas fa-download"></i> تثبيت التطبيق على جهازك
        </button>
        
        <main class="card">
            <div class="input-field">
                <label for="countryInput"><i class="fas fa-globe-africa"></i> اختر الدولة</label>
                <input 
                    list="country-options" 
                    id="countryInput" 
                    placeholder="ابحث عن دولتك..." 
                    value="السودان (+249)"
                    onchange="updateCodeFromCountry(this.value)"
                    onclick="this.value = '';"
                    onblur="restoreCountryValue()"
                >
                <datalist id="country-options"></datalist>
            </div>

            <div class="phone-row">
                <div class="code-box">
                    <span id="currentFlag" class="flag-icon flag-icon-sd"></span>
                    <input type="tel" id="codeInput" value="+249" oninput="updateCountryFromCode(this.value)">
                </div>
                <div class="number-box">
                    <input type="tel" id="phoneInput" placeholder="أدخل رقم الهاتف" inputmode="numeric">
                </div>
            </div>

            <button id="whatsappButton" class="btn-primary" onclick="openWhatsApp()">
                <span>بدء المحادثة</span>
                <i class="fab fa-whatsapp"></i>
            </button>
        </main>

        <section class="social-share">
            <p>انشر الفائدة مع أصدقائك</p>
            <div class="share-grid">
                <button class="s-btn fb" onclick="shareApp('facebook')"><i class="fab fa-facebook-f"></i></button>
                <button class="s-btn ms" onclick="shareContentInSamePage()"><i class="fas fa-share-nodes"></i></button>
                <button class="s-btn wa" onclick="shareApp('whatsapp')"><i class="fab fa-whatsapp"></i></button>
            </div>
        </section>
        
        <footer class="app-footer">
            <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="dev-link">المطور: Abdulaziz Khalifa</a>
            <p class="copy">© 2026 جميع الحقوق محفوظة</p>
        </footer>
    </div>
    
    <script src="script.js?v=2026"></script>
</body>
</html>
