<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة زول | المساعد الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="logo-box">
                <img src="whatsapp-icon.png" alt="logo">
            </div>
            <h1>دردشة فورية</h1>
            <p>أدخل الرقم وابدأ التواصل مباشرة</p>
        </header>

        <div class="input-card">
            <div class="field-group">
                <label>الدولة / المنطقة</label>
                <div class="search-input">
                    <i class="fas fa-search"></i>
                    <input list="countries-list" id="countrySearch" placeholder="ابحث عن اسم الدولة..." oninput="handleCountrySelection(this.value)">
                    <datalist id="countries-list"></datalist>
                </div>
            </div>

            <div class="phone-fields">
                <div class="code-box">
                    <span id="flagIcon" class="flag-icon flag-icon-sd"></span>
                    <span class="plus-text">+</span>
                    <input type="tel" id="countryCode" value="249" oninput="handleCodeInput(this.value)" maxlength="4">
                </div>
                <div class="number-box">
                    <input type="tel" id="phoneInput" placeholder="رقم الهاتف" inputmode="numeric">
                </div>
            </div>

            <button class="btn-whatsapp" onclick="launchWhatsApp()">
                <span>فتح المحادثة الآن</span>
                <i class="fab fa-whatsapp"></i>
            </button>
        </div>

        <div id="historySection" class="history-area" style="display:none;">
            <div class="history-label">آخر المراسلات</div>
            <div id="historyItems" class="history-grid"></div>
        </div>

        <footer class="app-footer">
            <div class="share-links">
                <button onclick="shareApp('whatsapp')"><i class="fab fa-whatsapp"></i></button>
                <button onclick="shareApp('facebook')"><i class="fab fa-facebook-f"></i></button>
            </div>
            <p>© 2026 تم التطوير بواسطة <b>Abdulaziz</b></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
