<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #0b141a; color: white; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111b21; margin: 10% auto; width: 90%; max-width: 500px; border-radius: 20px; border: 1px solid #2a3942; height: 70vh; display: flex; flex-direction: column; }
        .country-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #2a3942; cursor: pointer; }
        .country-item:hover { background: #2a3942; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-6 rounded-[2rem] shadow-2xl border border-[#2a3942]">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold mb-1">واتساب المباشر</h1>
            <p class="text-gray-400 text-xs">أدخل الرقم وابدأ المحادثة فوراً</p>
        </div>

        <div class="space-y-4">
            <button onclick="openModal()" class="w-full flex items-center justify-between p-4 bg-[#2a3942] rounded-2xl border border-[#374151]">
                <div class="flex items-center gap-3">
                    <span id="selectedFlag" class="text-2xl">🇸🇦</span>
                    <span id="selectedCountryName" class="font-bold text-sm">السعودية (Saudi Arabia)</span>
                </div>
                <i class="fas fa-chevron-down text-gray-500"></i>
            </button>

            <div class="flex gap-2" dir="ltr">
                <div class="w-1/4">
                    <input type="text" id="dialCode" value="+966" class="w-full p-4 rounded-2xl bg-[#2a3942] border border-[#374151] text-center font-bold text-white focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div class="w-3/4">
                    <input type="tel" id="phoneNumber" placeholder="50XXX..." class="w-full p-4 rounded-2xl bg-[#2a3942] border border-[#374151] font-bold text-white focus:ring-2 focus:ring-green-500 outline-none">
                </div>
            </div>

            <textarea id="message" rows="3" class="w-full p-4 rounded-2xl bg-[#2a3942] border border-[#374151] text-right text-sm outline-none focus:ring-2 focus:ring-green-500" placeholder="اكتب رسالتك هنا (اختياري)..."></textarea>

            <button onclick="sendMessage()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-[#0b141a] py-4 rounded-2xl font-bold text-lg transition-transform active:scale-95 shadow-lg">
                فتح في واتساب
            </button>
        </div>
    </div>

    <div id="countryModal" class="modal">
        <div class="modal-content">
            <div class="p-4 border-bottom border-[#2a3942]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">اختر الدولة</h2>
                    <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
                </div>
                <input type="text" id="searchCountry" onkeyup="filterCountries()" placeholder="بحث باسم الدولة (بالعربي أو الإنجليزي)..." class="w-full p-3 rounded-xl bg-[#2a3942] border border-[#374151] outline-none">
            </div>
            <div id="countryList" class="flex-1 overflow-y-auto">
                </div>
        </div>
    </div>

    <script>
        // قائمة الدول (مثال مختصر - يمكنك زيادتها)
        const countries = [
            { nameAr: "السعودية", nameEn: "Saudi Arabia", code: "+966", flag: "🇸🇦", search: "السعودية saudi arabia 966" },
            { nameAr: "مصر", nameEn: "Egypt", code: "+20", flag: "🇪🇬", search: "مصر egypt 20" },
            { nameAr: "الإمارات", nameEn: "UAE", code: "+971", flag: "🇦🇪", search: "الامارات uae 971" },
            { nameAr: "الكويت", nameEn: "Kuwait", code: "+965", flag: "🇰🇼", search: "الكويت kuwait 965" },
            { nameAr: "الأردن", nameEn: "Jordan", code: "+962", flag: "🇯🇴", search: "الاردن jordan 962" }
        ];

        function renderCountries() {
            const list = document.getElementById('countryList');
            list.innerHTML = countries.map(c => `
                <div class="country-item" onclick="selectCountry('${c.nameAr}', '${c.nameEn}', '${c.code}', '${c.flag}')">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${c.flag}</span>
                        <div class="text-right">
                            <p class="font-bold text-sm">${c.nameAr}</p>
                            <p class="text-xs text-gray-400">${c.nameEn}</p>
                        </div>
                    </div>
                    <span class="text-green-500 font-bold" dir="ltr">${c.code}</span>
                </div>
            `).join('');
        }

        function filterCountries() {
            const term = document.getElementById('searchCountry').value.toLowerCase();
            const items = document.getElementsByClassName('country-item');
            countries.forEach((c, index) => {
                items[index].style.display = c.search.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        }

        function selectCountry(ar, en, code, flag) {
            document.getElementById('selectedCountryName').innerText = `${ar} (${en})`;
            document.getElementById('selectedFlag').innerText = flag;
            document.getElementById('dialCode').value = code;
            closeModal();
        }

        function openModal() { document.getElementById('countryModal').style.display = 'block'; }
        function closeModal() { document.getElementById('countryModal').style.display = 'none'; }

        function sendMessage() {
            let code = document.getElementById('dialCode').value.replace('+', '').trim();
            let phone = document.getElementById('phoneNumber').value.trim();
            let msg = encodeURIComponent(document.getElementById('message').value);
            
            if(!phone) return alert("أدخل الرقم");
            if(phone.startsWith('0')) phone = phone.substring(1);
            
            window.open(`https://wa.me/${code}${phone}?text=${msg}`, '_blank');
        }

        // تحديد الدولة تلقائياً حسب IP (تبسيط)
        window.onload = () => {
            renderCountries();
            fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
                const found = countries.find(c => c.code.includes(data.country_calling_code));
                if(found) selectCountry(found.nameAr, found.nameEn, found.code, found.flag);
            });
        };
    </script>
</body>
</html>
