<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة مباشرة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand: #00a884; --bg: #ffffff; --surface: #f0f2f5; --text: #111b21; --accent: #0072ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
        .app-container { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: var(--bg); }

        /* الهيدر المحسن */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #eee; }
        .brand-info { display: flex; align-items: center; gap: 10px; }
        .brand-info img { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; }
        .brand-info h1 { font-size: 18px; font-weight: 800; }
        
        .lang-switch { background: var(--surface); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; }

        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        /* البحث والحقول */
        .field-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: 700; color: #667781; }

        .search-box { position: relative; }
        .search-box input { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--surface); font-size: 16px; outline: none; }
        .search-results { position: absolute; top: 60px; width: 100%; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .country-item { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }

        /* خانة الرقم والمفتاح */
        .phone-input-row { display: flex; gap: 10px; align-items: stretch; height: 60px; }
        .dial-wrap { display: flex; align-items: center; background: var(--surface); border-radius: 15px; padding: 0 12px; min-width: 120px; border: 2px solid transparent; }
        .dial-wrap:focus-within { border-color: var(--brand); }
        .dial-wrap input { width: 100%; border: none; background: transparent; font-size: 18px; font-weight: 800; text-align: center; outline: none; }
        .flag-box { font-size: 24px; display: flex; align-items: center; }

        .number-wrap { flex: 1; position: relative; }
        .number-wrap input { width: 100%; height: 100%; border-radius: 15px; border: 2px solid transparent; background: var(--surface); padding: 0 15px; font-size: 22px; font-weight: 800; outline: none; }
        .number-wrap input:focus { border-color: var(--brand); background: #fff; }

        /* الرسالة والاقتراحات */
        textarea { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--surface); font-size: 16px; min-height: 100px; resize: none; outline: none; }
        .chips { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { background: #e7f8ef; color: var(--brand); border: none; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }

        /* الأزرار الضخمة */
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-dark { background: var(--text); color: #fff; }

        /* زر التثبيت النبضي */
        .btn-install { 
            background: linear-gradient(45deg, var(--accent), #00d2ff); 
            color: #fff; display: none; /* سيظهر فقط عند الجاهزية */
            animation: pulse-ring 2s infinite; margin-top: 5px;
        }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(0, 114, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 114, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 114, 255, 0); } }

        /* فوتر التنقل */
        footer { padding: 10px; display: flex; background: #fff; border-top: 1px solid #eee; }
        .nav-link { flex: 1; border: none; background: none; color: #667781; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-link.active { color: var(--brand); }
        .nav-link i { font-size: 22px; }
        .nav-link span { font-size: 11px; font-weight: 800; }

        /* نافذة السجل المنبثقة */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; }
        .sheet { width: 100%; background: #fff; border-radius: 25px 25px 0 0; padding: 25px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sheet.open { transform: translateY(0); }
        .history-item { padding: 15px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; }

        /* كاميرا الباركود */
        #qr-view { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .qr-frame { position: absolute; inset: 0; margin: auto; width: 250px; height: 250px; border: 4px solid var(--brand); border-radius: 30px; box-shadow: 0 0 0 5000px rgba(0,0,0,0.6); }

        body.en { direction: ltr; }
    </style>
</head>
<body id="app-body">

<div id="qr-view">
    <button onclick="stopQR()" style="position:absolute; top:40px; left:20px; z-index:100; padding:10px 25px; border-radius:20px; background:red; color:white; border:none; font-weight:bold;">إغلاق</button>
    <video id="video"></video>
    <div class="qr-frame"></div>
</div>

<div class="app-container">
    <header>
        <div class="brand-info">
            <img src="whatsapp-icon.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968841.png'">
            <h1 id="lbl-title">دردشة مباشرة</h1>
        </div>
        <button class="lang-switch" onclick="toggleLanguage()" id="lbl-lang-btn">English</button>
    </header>

    <main>
        <div class="field-group">
            <label id="lbl-search">البحث عن الدولة</label>
            <div class="search-box">
                <input type="text" id="countryInput" placeholder="اكتب اسم الدولة أو المفتاح...">
                <div id="resultsBox" class="search-results"></div>
            </div>
        </div>

        <div class="field-group">
            <label id="lbl-phone">رقم الجوال</label>
            <div class="phone-input-row">
                <div class="dial-wrap">
                    <div class="flag-box" id="flagDisplay"><span class="flag-icon flag-icon-sd"></span></div>
                    <span style="font-weight:900; margin: 0 5px;">+</span>
                    <input type="tel" id="dialCode" value="249">
                </div>
                <div class="number-wrap">
                    <input type="tel" id="phoneNumber" placeholder="500000000">
                </div>
            </div>
        </div>

        <div class="field-group">
            <label id="lbl-msg">الرسالة</label>
            <textarea id="messageText" placeholder="اكتب رسالتك هنا..."></textarea>
            <div class="chips" id="sugBox"></div>
        </div>

        <button class="btn btn-primary" onclick="launchWhatsApp()">
            <span id="lbl-btn-send">بدء المراسلة الآن</span> <i class="fas fa-paper-plane"></i>
        </button>

        <button class="btn btn-dark" onclick="startQR()">
            <i class="fas fa-qrcode"></i> <span id="lbl-btn-qr">مسح باركود واتساب</span>
        </button>

        <button id="installBtn" class="btn btn-install">
            <i class="fas fa-download"></i> <span id="lbl-btn-install">تثبيت التطبيق على الهاتف</span>
        </button>
    </main>

    <div id="historyOverlay" class="overlay" onclick="closeHistory()">
        <div class="sheet" id="historySheet" onclick="event.stopPropagation()">
            <div style="width:40px; height:5px; background:#ddd; margin:0 auto 20px; border-radius:10px;"></div>
            <h2 id="lbl-hist-title" style="text-align:center; margin-bottom:20px;">آخر المراسلات</h2>
            <div id="historyList"></div>
            <button onclick="closeHistory()" style="width:100%; padding:15px; margin-top:20px; border:none; border-radius:15px; background:var(--surface); font-weight:bold;">إغلاق</button>
        </div>
    </div>

    <footer>
        <button class="nav-link active" onclick="location.reload()"><i class="fas fa-house"></i><span id="lbl-n1">الرئيسية</span></button>
        <button class="nav-link" onclick="openHistory()"><i class="fas fa-clock-rotate-left"></i><span id="lbl-n2">السجل</span></button>
        <a href="https://linktr.ee/abdul3ziz95" class="nav-link" style="text-decoration:none;"><i class="fas fa-headset"></i><span id="lbl-n3">الدعم</span></a>
        <button class="nav-link" onclick="shareMe()"><i class="fas fa-share-nodes"></i><span id="lbl-n4">مشاركة</span></button>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    let countries = [];
    let currentLang = 'ar';
    const codeReader = new ZXing.BrowserMultiFormatReader();

    async function initApp() {
        // 1. جلب بيانات الدول
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,translations');
        const data = await res.json();
        countries = data.map(c => ({
            ar: c.translations.ara ? c.translations.ara.common : c.name.common,
            en: c.name.common,
            code: c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : ""),
            flag: c.cca2.toLowerCase()
        })).sort((a,b) => a.ar.localeCompare(b.ar));

        // 2. تحديد الموقع التلقائي
        try {
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            const found = countries.find(c => c.flag === geo.country.toLowerCase());
            if(found) setCountry(found);
        } catch(e) { console.log("Geo Error"); }

        // 3. تحديث النصوص والرسائل فوراً
        updateTexts();
        
        // 4. مراقبة تغيير المفتاح يدوياً لتغيير العلم
        document.getElementById('dialCode').oninput = (e) => {
            const val = e.target.value.replace('+', '');
            const found = countries.find(c => c.code.replace('+', '') === val);
            if(found) document.getElementById('flagDisplay').innerHTML = `<span class="flag-icon flag-icon-${found.flag}"></span>`;
        };
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('app-body').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('app-body').className = currentLang;
        updateTexts();
    }

    function updateTexts() {
        const UI = {
            ar: ["دردشة مباشرة", "البحث عن الدولة", "رقم الجوال", "الرسالة", "بدء المراسلة الآن", "مسح باركود واتساب", "آخر المراسلات", "الرئيسية", "السجل", "الدعم", "مشاركة", "English", "تثبيت التطبيق على الهاتف", "السلام عليكم"],
            en: ["Direct Chat", "Search Country", "Phone Number", "Message", "Start Messaging Now", "Scan QR Code", "Recent History", "Home", "History", "Support", "Share", "العربية", "Install App on Phone", "Hello there!"]
        };
        const L = UI[currentLang];
        document.getElementById('lbl-title').innerText = L[0];
        document.getElementById('lbl-search').innerText = L[1];
        document.getElementById('lbl-phone').innerText = L[2];
        document.getElementById('lbl-msg').innerText = L[3];
        document.getElementById('lbl-btn-send').innerText = L[4];
        document.getElementById('lbl-btn-qr').innerText = L[5];
        document.getElementById('lbl-hist-title').innerText = L[6];
        document.getElementById('lbl-n1').innerText = L[7];
        document.getElementById('lbl-n2').innerText = L[8];
        document.getElementById('lbl-n3').innerText = L[9];
        document.getElementById('lbl-n4').innerText = L[10];
        document.getElementById('lbl-lang-btn').innerText = L[11];
        document.getElementById('lbl-btn-install').innerText = L[12];
        document.getElementById('messageText').value = L[13];

        // تحديث الاقتراحات
        const sBox = document.getElementById('sugBox');
        sBox.innerHTML = '';
        const sugs = currentLang === 'ar' ? ["السلام عليكم", "بكم السعر؟", "ممكن الموقع؟"] : ["Hi", "Price?", "Location?"];
        sugs.forEach(s => {
            const b = document.createElement('button'); b.className = 'chip'; b.innerText = s;
            b.onclick = () => document.getElementById('messageText').value = s;
            sBox.appendChild(b);
        });
    }

    // منطق البحث
    document.getElementById('countryInput').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        const box = document.getElementById('resultsBox');
        box.innerHTML = '';
        if(!v) { box.style.display='none'; return; }
        const filter = countries.filter(c => c.ar.includes(v) || c.en.toLowerCase().includes(v) || c.code.includes(v));
        if(filter.length > 0) {
            box.style.display='block';
            filter.forEach(c => {
                const d = document.createElement('div'); d.className = 'country-item';
                d.innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span> ${currentLang=='ar'?c.ar:c.en} (+${c.code.replace('+','')})`;
                d.onclick = () => { setCountry(c); box.style.display='none'; document.getElementById('countryInput').value=''; };
                box.appendChild(d);
            });
        }
    };

    function setCountry(c) {
        document.getElementById('dialCode').value = c.code.replace('+','');
        document.getElementById('flagDisplay').innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span>`;
    }

    function launchWhatsApp() {
        const dial = document.getElementById('dialCode').value.replace(/\D/g,'');
        const num = document.getElementById('phoneNumber').value.replace(/\D/g,'');
        if(num.length > 5) {
            const full = dial + num;
            saveHistory(full);
            window.location.href = `https://wa.me/${full}?text=${encodeURIComponent(document.getElementById('messageText').value)}`;
        }
    }

    // السجل
    function saveHistory(n) {
        let h = JSON.parse(localStorage.getItem('wa_hist_v9') || '[]');
        if(!h.includes(n)) { h.unshift(n); localStorage.setItem('wa_hist_v9', JSON.stringify(h.slice(0,10))); }
    }
    function openHistory() {
        const list = document.getElementById('historyList'); list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('wa_hist_v9') || '[]');
        h.forEach(n => {
            const d = document.createElement('div'); d.className = 'history-item';
            d.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:#25d366"></i>`;
            d.onclick = () => { document.getElementById('phoneNumber').value = n; closeHistory(); };
            list.appendChild(d);
        });
        document.getElementById('historyOverlay').style.display='flex';
        setTimeout(() => document.getElementById('historySheet').classList.add('open'), 10);
    }
    function closeHistory() {
        document.getElementById('historySheet').classList.remove('open');
        setTimeout(() => document.getElementById('historyOverlay').style.display='none', 300);
    }

    // الباركود
    function startQR() {
        document.getElementById('qr-view').style.display='block';
        codeReader.decodeFromVideoDevice(null, 'video', (res) => {
            if(res) {
                stopQR();
                if(res.text.includes('wa.me')) window.location.href = res.text;
                else document.getElementById('phoneNumber').value = res.text.replace(/\D/g,'');
            }
        });
    }
    function stopQR() { codeReader.reset(); document.getElementById('qr-view').style.display='none'; }

    // التثبيت PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'flex';
    });
    document.getElementById('installBtn').onclick = () => { if(deferredPrompt) deferredPrompt.prompt(); };

    function shareMe() { navigator.share({title: 'دردشة مباشرة', url: location.href}); }
    
    window.onload = initApp;
</script>
</body>
</html>
