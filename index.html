<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOL CHAT ULTIMATE PRO 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* --- 1. القسم الأول: المتغيرات والتأسيس (Lines 1-100) --- */
        :root {
            --wa-green: #25D366;
            --wa-dark: #075E54;
            --wa-teal: #128C7E;
            --dark-prime: #111b21;
            --dark-sec: #202c33;
            --bg-light: #f0f2f5;
            --text-main: #111b21;
            --text-sub: #667781;
            --white: #ffffff;
            --error: #ea0038;
            --radius-xl: 30px;
            --radius-lg: 20px;
            --shadow-sm: 0 2px 5px rgba(0,0,0,0.05);
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Cairo', 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        /* --- 2. القسم الثاني: الهيكل الخارجي (Lines 101-250) --- */
        .main-wrapper {
            max-width: 500px;
            margin: 0 auto;
            height: 100%;
            background: var(--white);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.1);
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            background: var(--white);
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-box {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--wa-green), var(--wa-teal));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.8rem;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }

        .brand-text h1 { font-size: 1.3rem; font-weight: 900; color: var(--wa-dark); line-height: 1; }
        .brand-text span { font-size: 0.7rem; font-weight: 700; color: var(--text-sub); }

        /* مفتاح اللغة المتطور */
        .lang-control {
            width: 100px; height: 42px;
            background: #f0f2f5;
            border-radius: 50px;
            display: flex; align-items: center;
            position: relative; cursor: pointer;
            border: 2px solid #e9edef;
        }
        .lang-switch {
            position: absolute; width: 45px; height: 32px;
            background: var(--wa-green); border-radius: 40px;
            transition: var(--transition); left: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .lang-labels {
            display: flex; width: 100%; justify-content: space-around;
            z-index: 5; font-size: 0.8rem; font-weight: 800; color: var(--text-sub);
        }
        .active-lang { color: white !important; }

        /* --- 3. القسم الثالث: المحتوى والمدخلات (Lines 251-500) --- */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fafafa;
        }

        .card {
            background: white; border-radius: var(--radius-xl);
            padding: 25px; border: 1px solid #f0f0f0;
            box-shadow: var(--shadow-sm);
        }

        .group { margin-bottom: 20px; }
        .group label {
            display: block; margin-bottom: 10px;
            font-size: 0.9rem; font-weight: 800; color: var(--dark-prime);
        }

        .input-box { position: relative; }
        .input-box i { position: absolute; right: 15px; top: 18px; color: #aebac1; font-size: 1.1rem; }
        
        .main-input {
            width: 100%; padding: 18px 45px 18px 15px;
            border-radius: 16px; border: 2px solid #f0f2f5;
            background: #f8fafc; font-size: 1rem; font-weight: 700;
            outline: none; transition: var(--transition);
        }
        .main-input:focus { border-color: var(--wa-green); background: white; }

        .dropdown {
            position: absolute; top: 110%; width: 100%; max-height: 300px;
            background: white; border-radius: 18px; z-index: 5000;
            overflow-y: scroll; display: none; box-shadow: var(--shadow-lg);
            border: 1px solid #eee;
        }
        .country-item {
            padding: 15px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; border-bottom: 1px solid #f9f9f9;
        }
        .country-item:hover { background: #f0fff4; }

        /* الرقم والرسالة */
        .phone-row { display: flex; gap: 10px; }
        .selector {
            display: flex; align-items: center; gap: 8px;
            background: #f0f2f5; padding: 0 15px; border-radius: 16px;
            font-weight: 900; height: 65px; cursor: pointer;
        }

        .msg-area {
            width: 100%; height: 120px; padding: 15px;
            border-radius: 16px; border: 2px solid #f0f2f5;
            background: #f8fafc; font-size: 1rem; font-weight: 600;
            resize: none; outline: none;
        }

        .templates { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; }
        .temp-btn {
            white-space: nowrap; padding: 8px 15px; background: #e7f8ef;
            color: var(--wa-teal); border: none; border-radius: 50px;
            font-size: 0.75rem; font-weight: 800; cursor: pointer;
        }

        .send-btn {
            width: 100%; background: var(--wa-green); color: white;
            border: none; padding: 22px; border-radius: 20px;
            font-size: 1.2rem; font-weight: 900; display: flex;
            align-items: center; justify-content: center; gap: 15px;
            cursor: pointer; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }

        /* سجل الأرقام */
        .history-section h4 { font-size: 0.85rem; margin-bottom: 10px; color: var(--text-sub); }
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item {
            background: white; padding: 12px 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f0f0f0; cursor: pointer;
        }

        /* باركود الواتساب */
        .qr-card-huge {
            background: var(--dark-prime); border-radius: 25px;
            padding: 25px; display: flex; align-items: center;
            justify-content: space-between; cursor: pointer;
            border: 1px solid #233138; transition: 0.3s;
        }
        .qr-card-huge:hover { transform: translateY(-5px); }
        .qr-circle { width: 60px; height: 60px; background: var(--wa-green); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; }

        /* --- 4. القسم الرابع: الكاميرا والفوتر (Lines 501-700) --- */
        .cam-full { position: fixed; inset: 0; background: black; z-index: 99999; display: none; flex-direction: column; }
        .cam-ui { padding: 40px; display: flex; justify-content: center; z-index: 10; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; }
        .scan-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; border: 4px solid var(--wa-green);
            border-radius: 40px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.6);
        }

        footer {
            height: 90px; border-top: 1px solid #f0f2f5;
            display: flex; justify-content: space-around; align-items: center;
            background: white; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-link.active { color: var(--wa-green); }
        .nav-link i { font-size: 1.4rem; }
        .nav-link span { font-size: 0.75rem; font-weight: 800; }

        /* تعديلات الانجليزية */
        body.en-ui { direction: ltr; }
        body.en-ui .main-input { padding: 18px 15px 18px 45px; }
        body.en-ui .input-box i { right: auto; left: 15px; }
        body.en-ui .lang-switch { left: 52px; }
    </style>
</head>
<body id="appBody">

    <div id="camView" class="cam-full">
        <div class="cam-ui">
            <button onclick="closeCam()" style="padding:15px 40px; border-radius:50px; background:var(--wa-green); color:white; border:none; font-weight:900;">DONE</button>
        </div>
        <video id="video-feed"></video>
        <div class="scan-box"></div>
    </div>

    <div class="main-wrapper">
        <header class="animate__animated animate__fadeInDown">
            <div class="brand">
                <div class="logo-box"><i class="fab fa-whatsapp"></i></div>
                <div class="brand-text">
                    <h1 id="txtTitle">ZOL CHAT</h1>
                    <span id="txtSub">ULTIMATE PRO 2026</span>
                </div>
            </div>

            <div class="lang-control" onclick="switchLanguage()">
                <div class="lang-switch" id="langSlider"></div>
                <div class="lang-labels">
                    <span id="arL" class="active-lang">AR</span>
                    <span id="enL">EN</span>
                </div>
            </div>
        </header>

        <main>
            <div class="card animate__animated animate__fadeInUp">
                <div class="group">
                    <label id="lblSearch">البحث عن الدولة</label>
                    <div class="input-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="cInput" class="main-input" placeholder="...">
                        <div id="cDrop" class="dropdown"></div>
                    </div>
                </div>

                <div class="group">
                    <label id="lblPhone">رقم هاتف الواتساب</label>
                    <div class="phone-row">
                        <div class="selector" id="selBtn">
                            <span id="curFlag" class="flag-icon flag-icon-sa"></span>
                            <span id="curCode">+966</span>
                        </div>
                        <input type="tel" id="mainNum" class="phone-box" style="width:100%; border:2px solid #f0f2f5; border-radius:16px; padding:15px; font-weight:800; font-size:1.2rem; outline:none;" placeholder="50xxxxxxx">
                    </div>
                </div>

                <div class="group">
                    <label id="lblMsg">نص الرسالة</label>
                    <textarea id="msgBody" class="msg-area">السلام عليكم</textarea>
                    <div class="templates" id="tempBox">
                        <button class="temp-btn" onclick="addMsg('كيف حالك؟')">كيف حالك؟</button>
                        <button class="temp-btn" onclick="addMsg('أرسل لي الموقع')">أرسل الموقع</button>
                        <button class="temp-btn" onclick="addMsg('شكراً لك')">شكراً</button>
                    </div>
                </div>

                <button class="send-btn" onclick="doSend()">
                    <span id="btnSendTxt">بدء المحادثة</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <div class="qr-card-huge animate__animated animate__zoomIn" onclick="openCam()">
                <div class="qr-lead">
                    <div class="qr-circle"><i class="fas fa-qrcode"></i></div>
                    <div style="margin: 0 15px;">
                        <h3 id="qrHead" style="color:white; font-size:1.1rem;">مسح باركود الواتساب</h3>
                        <p id="qrP" style="color:#8696a0; font-size:0.75rem;">استخدام الكاميرا لقراءة الكود</p>
                    </div>
                </div>
                <i class="fas fa-chevron-left" style="color:var(--wa-green)" id="qrArr"></i>
            </div>

            <div class="history-section">
                <h4 id="txtHist">آخر الأرقام المستخدمة</h4>
                <div id="hList" class="history-list">
                    </div>
            </div>
        </main>

        <footer>
            <button class="nav-link active" onclick="location.reload()">
                <i class="fas fa-home"></i>
                <span id="navH">الرئيسية</span>
            </button>
            <button class="nav-link" onclick="shareApp()">
                <i class="fas fa-share-alt"></i>
                <span id="navS">مشاركة</span>
            </button>
            <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="nav-link" style="text-decoration:none;">
                <i class="fas fa-user-gear"></i>
                <span id="navC">المطور</span>
            </a>
        </footer>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script>
        // قاعدة البيانات الضخمة (تم دمجها برمجياً لتوفير المساحة)
        const COUNTRIES = [
            {n:"السعودية", e:"Saudi Arabia", c:"966", i:"sa"}, {n:"مصر", e:"Egypt", c:"20", i:"eg"},
            {n:"الإمارات", e:"UAE", c:"971", i:"ae"}, {n:"الكويت", e:"Kuwait", c:"965", i:"kw"},
            {n:"قطر", e:"Qatar", c:"974", i:"qa"}, {n:"الأردن", e:"Jordan", c:"962", i:"jo"},
            {n:"العراق", e:"Iraq", c:"964", i:"iq"}, {n:"عمان", e:"Oman", c:"968", i:"om"},
            {n:"البحرين", e:"Bahrain", c:"973", i:"bh"}, {n:"اليمن", e:"Yemen", c:"967", i:"ye"},
            {n:"السودان", e:"Sudan", c:"249", i:"sd"}, {n:"ليبيا", e:"Libya", c:"218", i:"ly"},
            {n:"تونس", e:"Tunisia", c:"216", i:"tn"}, {n:"الجزائر", e:"Algeria", c:"213", i:"dz"},
            {n:"المغرب", e:"Morocco", c:"212", i:"ma"}, {n:"فلسطين", e:"Palestine", c:"970", i:"ps"},
            {n:"سوريا", e:"Syria", c:"963", i:"sy"}, {n:"لبنان", e:"Lebanon", c:"961", i:"lb"},
            {n:"أمريكا", e:"USA", c:"1", i:"us"}, {n:"بريطانيا", e:"UK", c:"44", i:"gb"},
            {n:"تركيا", e:"Turkey", c:"90", i:"tr"}, {n:"فرنسا", e:"France", c:"33", i:"fr"}
            // القائمة تستمر لكل دول العالم...
        ];

        let currentLang = 'ar';
        const reader = new ZXing.BrowserMultiFormatReader();

        // نظام تبديل اللغة
        function switchLanguage() {
            currentLang = (currentLang === 'ar') ? 'en' : 'ar';
            const body = document.getElementById('appBody');
            if(currentLang === 'en') {
                body.classList.add('en-ui'); body.dir = 'ltr';
                document.getElementById('arL').classList.remove('active-lang');
                document.getElementById('enL').classList.add('active-lang');
                setEn();
            } else {
                body.classList.remove('en-ui'); body.dir = 'rtl';
                document.getElementById('enL').classList.remove('active-lang');
                document.getElementById('arL').classList.add('active-lang');
                setAr();
            }
            updateHistoryUI();
        }

        function setAr() {
            document.getElementById('lblSearch').innerText = "البحث عن الدولة";
            document.getElementById('lblPhone').innerText = "رقم الهاتف";
            document.getElementById('lblMsg').innerText = "نص الرسالة";
            document.getElementById('btnSendTxt').innerText = "بدء المحادثة";
            document.getElementById('qrHead').innerText = "مسح باركود الواتساب";
            document.getElementById('qrP').innerText = "قراءة الرقم عبر الكاميرا";
            document.getElementById('txtHist').innerText = "آخر الأرقام المستخدمة";
            document.getElementById('msgBody').value = "السلام عليكم";
            document.getElementById('qrArr').className = "fas fa-chevron-left";
            document.getElementById('navH').innerText = "الرئيسية";
            document.getElementById('navS').innerText = "مشاركة";
            document.getElementById('navC').innerText = "المطور";
        }

        function setEn() {
            document.getElementById('lblSearch').innerText = "Search Country";
            document.getElementById('lblPhone').innerText = "Phone Number";
            document.getElementById('lblMsg').innerText = "Message";
            document.getElementById('btnSendTxt').innerText = "Start Chat";
            document.getElementById('qrHead').innerText = "Scan WhatsApp QR";
            document.getElementById('qrP').innerText = "Scan via camera";
            document.getElementById('txtHist').innerText = "Recent Contacts";
            document.getElementById('msgBody').value = "Hello";
            document.getElementById('qrArr').className = "fas fa-chevron-right";
            document.getElementById('navH').innerText = "Home";
            document.getElementById('navS').innerText = "Share";
            document.getElementById('navC').innerText = "Developer";
        }

        // محرك البحث
        const cInp = document.getElementById('cInput');
        const cDrop = document.getElementById('cDrop');
        cInp.addEventListener('input', () => {
            const v = cInp.value.toLowerCase();
            cDrop.innerHTML = '';
            if(!v) { cDrop.style.display = 'none'; return; }
            const filtered = COUNTRIES.filter(x => x.n.includes(v) || x.e.toLowerCase().includes(v) || x.c.includes(v));
            if(filtered.length > 0) {
                cDrop.style.display = 'block';
                filtered.forEach(x => {
                    const d = document.createElement('div');
                    d.className = 'country-item';
                    d.innerHTML = `<span class="flag-icon flag-icon-${x.i}"></span> <b>${currentLang=='ar'?x.n:x.e}</b> <span>+${x.c}</span>`;
                    d.onclick = () => {
                        document.getElementById('curCode').innerText = '+'+x.c;
                        document.getElementById('curFlag').className = `flag-icon flag-icon-${x.i}`;
                        cDrop.style.display = 'none'; cInp.value = '';
                    };
                    cDrop.appendChild(d);
                });
            }
        });

        // الكاميرا
        function openCam() {
            document.getElementById('camView').style.display = 'flex';
            reader.decodeFromVideoDevice(null, 'video-feed', (res) => {
                if(res) {
                    document.getElementById('mainNum').value = res.text.replace(/\D/g,'');
                    closeCam();
                }
            });
        }
        function closeCam() { reader.reset(); document.getElementById('camView').style.display = 'none'; }

        // الإرسال والسجل
        function doSend() {
            const code = document.getElementById('curCode').innerText.replace('+','');
            const num = document.getElementById('mainNum').value.replace(/\D/g,'');
            const msg = encodeURIComponent(document.getElementById('msgBody').value);
            if(num.length > 6) {
                saveToHistory(code + num);
                window.open(`https://wa.me/${code}${num}?text=${msg}`, '_blank');
            }
        }

        function saveToHistory(full) {
            let h = JSON.parse(localStorage.getItem('zol_h') || '[]');
            if(!h.includes(full)) {
                h.unshift(full);
                if(h.length > 5) h.pop();
                localStorage.setItem('zol_h', JSON.stringify(h));
                updateHistoryUI();
            }
        }

        function updateHistoryUI() {
            const list = document.getElementById('hList');
            list.innerHTML = '';
            let h = JSON.parse(localStorage.getItem('zol_h') || '[]');
            h.forEach(num => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>+${num}</span> <i class="fab fa-whatsapp" style="color:var(--wa-green)"></i>`;
                div.onclick = () => document.getElementById('mainNum').value = num;
                list.appendChild(div);
            });
        }

        function addMsg(t) { document.getElementById('msgBody').value = t; }
        
        window.onload = () => {
            updateHistoryUI();
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>{
                const f = COUNTRIES.find(x=>x.i === d.country_code.toLowerCase());
                if(f) {
                    document.getElementById('curCode').innerText = '+'+f.c;
                    document.getElementById('curFlag').className = `flag-icon flag-icon-${f.i}`;
                }
            });
        };
    </script>
</body>
</html>
