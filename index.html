<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة مباشرة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand: #00a884; --bg: #ffffff; --surface: #f0f2f5; --text: #111b21; --accent: #0072ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
        .app-shell { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: var(--bg); }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: #fff; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
        .logo-box h1 { font-size: 18px; font-weight: 800; }
        
        .btn-lang { background: var(--surface); color: var(--text); border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        
        label { font-size: 13px; font-weight: 700; color: #667781; margin-bottom: 5px; display: block; }

        .search-field { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--surface); font-size: 16px; outline: none; }
        .results-panel { background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto; display: none; position: absolute; width: calc(100% - 40px); z-index: 100; }
        .c-item { padding: 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }

        /* تنسيق حقل الرقم والمفتاح المصلح */
        .phone-row { display: flex; gap: 10px; align-items: center; width: 100%; }
        .code-box { display: flex; align-items: center; background: var(--surface); border-radius: 15px; padding: 0 12px; width: 125px; height: 60px; flex-shrink: 0; }
        .code-input { width: 100%; border: none; background: transparent; font-weight: 800; font-size: 18px; text-align: center; outline: none; }
        .flag-box { width: 25px; display: flex; align-items: center; }

        .phone-input { flex: 1; height: 60px; padding: 0 15px; background: var(--surface); border-radius: 15px; border: none; font-size: 20px; font-weight: 800; outline: none; min-width: 0; }

        .message-box { width: 100%; padding: 15px; background: var(--surface); border-radius: 15px; border: none; font-size: 16px; resize: none; outline: none; min-height: 90px; }

        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { background: #e7f8ef; color: var(--brand); border: none; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }

        .btn-large { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-dark { background: var(--text); color: #fff; }
        
        /* زر التثبيت النبضي */
        .btn-install { 
            background: linear-gradient(45deg, var(--accent), #00d2ff); 
            color: white; display: none; margin-top: 5px;
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 114, 255, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 12px rgba(0, 114, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 114, 255, 0); }
        }

        footer { background: #fff; padding: 12px; border-top: 1px solid #eee; display: flex; justify-content: space-around; }
        .nav-item { border: none; background: none; color: #667781; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--brand); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 11px; font-weight: bold; }

        body.en { direction: ltr; }
    </style>
</head>
<body id="app-body">

<div class="app-shell">
    <header>
        <div class="logo-box">
            <img src="whatsapp-icon.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968841.png'">
            <h1 id="txt-title">دردشة مباشرة</h1>
        </div>
        <button class="btn-lang" onclick="changeLang()" id="lang-btn">English</button>
    </header>

    <main>
        <div class="search-wrap">
            <label id="txt-search">البحث عن الدولة</label>
            <input type="text" id="countryInput" class="search-field" placeholder="اكتب اسم الدولة أو المفتاح...">
            <div id="countryResults" class="results-panel"></div>
        </div>

        <div>
            <label id="txt-phone">رقم الجوال</label>
            <div class="phone-row">
                <div class="code-box">
                    <div class="flag-box" id="flagContainer"><span class="flag-icon flag-icon-sd"></span></div>
                    <span style="font-weight:900; margin:0 5px;">+</span>
                    <input type="tel" id="dialCode" class="code-input" value="249">
                </div>
                <input type="tel" id="phoneNumber" class="phone-input" placeholder="ادخل الرقم">
            </div>
        </div>

        <div>
            <label id="txt-msg">الرسالة</label>
            <textarea id="messageText" class="message-box"></textarea>
            <div class="suggestions" id="suggestionsBox"></div>
        </div>

        <button class="btn-large btn-primary" onclick="openWA()">
            <span id="txt-btn-send">بدء المراسلة الآن</span> <i class="fas fa-paper-plane"></i>
        </button>

        <button class="btn-large btn-dark" onclick="alert('جاري تفعيل الكاميرا...')">
            <i class="fas fa-qrcode"></i> <span id="txt-btn-qr">مسح باركود واتساب</span>
        </button>

        <button id="pwaBtn" class="btn-large btn-install" onclick="installPWA()">
            <i class="fas fa-download"></i> <span id="txt-install">تثبيت التطبيق على الهاتف</span>
        </button>
    </main>

    <footer>
        <button class="nav-item active" onclick="location.reload()"><i class="fas fa-house"></i><span id="n1">الرئيسية</span></button>
        <button class="nav-item" onclick="alert('السجل قيد التحديث')"><i class="fas fa-clock-rotate-left"></i><span id="n2">السجل</span></button>
        <a href="https://linktr.ee/abdul3ziz95" class="nav-item"><i class="fas fa-headset"></i><span id="n3">الدعم</span></a>
        <button class="nav-item" onclick="shareMe()"><i class="fas fa-share-nodes"></i><span id="n4">مشاركة</span></button>
    </footer>
</div>

<script>
    let countries = [];
    let currentLang = 'ar';

    async function init() {
        // جلب الدول
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,translations');
        const data = await res.json();
        countries = data.map(c => ({
            ar: c.translations.ara ? c.translations.ara.common : c.name.common,
            en: c.name.common,
            code: c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : ""),
            flag: c.cca2.toLowerCase()
        })).sort((a,b) => a.ar.localeCompare(b.ar));
        
        // التحديد التلقائي للدولة حسب الموقع (IP)
        try {
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            const found = countries.find(c => c.flag === geo.country.toLowerCase());
            if(found) setCountry(found);
        } catch(e) {}
        
        updateTexts();

        // ربط تغيير المفتاح يدوياً بتغيير العلم فوراً
        document.getElementById('dialCode').oninput = (e) => {
            const val = e.target.value.trim().replace('+', '');
            const found = countries.find(c => c.code.replace('+', '') === val);
            if(found) {
                document.getElementById('flagContainer').innerHTML = `<span class="flag-icon flag-icon-${found.flag}"></span>`;
            }
        };
    }

    // منطق البحث عن الدول
    document.getElementById('countryInput').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        const resDiv = document.getElementById('countryResults');
        resDiv.innerHTML = '';
        if(!v) { resDiv.style.display='none'; return; }
        const filter = countries.filter(c => c.ar.includes(v) || c.en.toLowerCase().includes(v) || c.code.includes(v));
        if(filter.length > 0) {
            resDiv.style.display='block';
            filter.forEach(c => {
                const d = document.createElement('div'); d.className = 'c-item';
                d.innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span> ${currentLang=='ar'?c.ar:c.en} (+${c.code.replace('+','')})`;
                d.onclick = () => { setCountry(c); resDiv.style.display='none'; document.getElementById('countryInput').value=''; };
                resDiv.appendChild(d);
            });
        }
    };

    function setCountry(c) {
        document.getElementById('dialCode').value = c.code.replace('+','');
        document.getElementById('flagContainer').innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span>`;
    }

    function changeLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('app-body').className = currentLang;
        document.getElementById('app-body').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateTexts();
    }

    function updateTexts() {
        const UI = {
            ar: ["دردشة مباشرة", "البحث عن الدولة", "رقم الجوال", "ادخل الرقم", "الرسالة", "بدء المراسلة الآن", "مسح باركود واتساب", "الرئيسية", "السجل", "الدعم", "مشاركة", "English", "تثبيت التطبيق على الهاتف", "السلام عليكم"],
            en: ["Direct Chat", "Search Country", "Phone Number", "Enter Number", "Message", "Start Messaging Now", "Scan QR Code", "Home", "History", "Support", "Share", "العربية", "Install App on Phone", "Hello!"]
        };
        const L = UI[currentLang];
        document.getElementById('txt-title').innerText = L[0];
        document.getElementById('txt-search').innerText = L[1];
        document.getElementById('txt-phone').innerText = L[2];
        document.getElementById('phoneNumber').placeholder = L[3];
        document.getElementById('txt-msg').innerText = L[4];
        document.getElementById('txt-btn-send').innerText = L[5];
        document.getElementById('txt-btn-qr').innerText = L[6];
        document.getElementById('n1').innerText = L[7];
        document.getElementById('n2').innerText = L[8];
        document.getElementById('n3').innerText = L[9];
        document.getElementById('n4').innerText = L[10];
        document.getElementById('lang-btn').innerText = L[11];
        document.getElementById('txt-install').innerText = L[12];
        document.getElementById('messageText').value = L[13];

        const box = document.getElementById('suggestionsBox');
        box.innerHTML = '';
        const sugs = currentLang === 'ar' ? ["السلام عليكم", "بكم السعر؟", "أرسل الموقع"] : ["Hi", "Price?", "Location"];
        sugs.forEach(t => {
            const btn = document.createElement('button'); btn.className = 'chip'; btn.innerText = t;
            btn.onclick = () => document.getElementById('messageText').value = t;
            box.appendChild(btn);
        });
    }

    function openWA() {
        const full = document.getElementById('dialCode').value + document.getElementById('phoneNumber').value;
        window.location.href = `https://wa.me/${full.replace(/\D/g,'')}?text=${encodeURIComponent(document.getElementById('messageText').value)}`;
    }

    // منطق التثبيت الرسمي (PWA)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('pwaBtn').style.display = 'flex';
    });
    function installPWA() {
        if(deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('pwaBtn').style.display = 'none'; });
        }
    }

    function shareMe() { navigator.share({title: 'دردشة مباشرة', url: location.href}); }
    window.onload = init;
</script>
</body>
</html>
