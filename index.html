<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Direct Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;700&display=swap');
        :root { --wa-green: #25D366; --bg-dark: #0b141a; --card-dark: #111b21; --input-dark: #2a3942; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: var(--bg-dark); color: #e9edef; overflow: hidden; height: 100vh; }
        .pwa-install-btn { background: linear-gradient(90deg, #25D366, #128C7E); }
        .modal-up { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-up.active { transform: translateY(0); }
        .search-container:focus-within { border-color: var(--wa-green); }
        .country-item { border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .country-item:active { background: var(--input-dark); }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="splash" class="fixed inset-0 z-[1000] bg-[#0b141a] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="animate-pulse mb-8"><i class="fab fa-whatsapp text-7xl text-[#25D366]"></i></div>
        <div class="flex flex-col gap-4 w-64">
            <button onclick="startApp('ar')" class="p-4 bg-[#25D366] text-black font-bold rounded-2xl shadow-xl">العربية</button>
            <button onclick="startApp('en')" class="p-4 border-2 border-[#25D366] text-[#25D366] font-bold rounded-2xl">English</button>
        </div>
    </div>

    <main class="w-full max-w-lg h-full md:h-auto md:max-h-[90vh] bg-[#111b21] md:rounded-[2.5rem] shadow-2xl flex flex-col p-6 overflow-hidden relative border border-white/5">
        
        <header class="flex justify-between items-center mb-8">
            <button onclick="switchLang()" class="bg-[#2a3942] px-4 py-1.5 rounded-full text-xs font-bold border border-white/10 hover:text-[#25D366]">
                <i class="fas fa-globe ml-1"></i> <span id="langBtnText">EN</span>
            </button>
            <h1 id="appTitle" class="text-xl font-bold">واتساب المباشر</h1>
            <i class="fab fa-whatsapp text-3xl text-[#25D366]"></i>
        </header>

        <div class="flex-1 space-y-6">
            
            <div class="space-y-2">
                <label id="lblCountry" class="text-xs text-gray-400 mr-2">اختر الدولة</label>
                <button onclick="openModal()" class="w-full flex items-center justify-between p-5 bg-[#202c33] rounded-2xl border border-white/5 group hover:border-[#25D366]/50 transition-all">
                    <div class="flex items-center gap-4">
                        <span id="flagMain" class="text-3xl">🇸🇦</span>
                        <div class="text-right">
                            <span id="nameMain" class="font-bold text-sm block">السعودية</span>
                            <span id="exampleMain" class="text-[10px] text-gray-500">50xxxxxxx</span>
                        </div>
                    </div>
                    <i class="fas fa-search-plus text-[#25D366]"></i>
                </button>
            </div>

            <div class="space-y-2">
                <label id="lblPhone" class="text-xs text-gray-400 mr-2">رقم الجوال</label>
                <div class="flex gap-3" dir="ltr">
                    <div class="relative w-1/3 min-w-[100px]">
                        <span id="flagInput" class="absolute left-3 top-1/2 -translate-y-1/2 text-xl pointer-events-none">🇸🇦</span>
                        <input type="text" id="dialCode" value="+966" class="w-full p-5 pl-11 bg-[#202c33] border border-white/5 rounded-2xl text-center font-bold text-lg outline-none focus:border-[#25D366]">
                    </div>
                    <input type="tel" id="phoneNum" placeholder="50xxxxxxx" class="flex-1 p-5 bg-[#202c33] border border-white/5 rounded-2xl font-bold text-lg outline-none focus:border-[#25D366] tracking-widest">
                </div>
            </div>

            <div class="space-y-2">
                <label id="lblMsg" class="text-xs text-gray-400 mr-2">الرسالة (اختياري)</label>
                <textarea id="msg" rows="3" class="w-full p-5 bg-[#202c33] border border-white/5 rounded-2xl text-sm outline-none focus:border-[#25D366] resize-none"></textarea>
            </div>

            <button onclick="sendToWhatsApp()" class="w-full pwa-install-btn text-black py-5 rounded-[1.5rem] font-bold text-xl flex items-center justify-center gap-3 transition shadow-lg active:scale-95">
                <i class="fas fa-paper-plane text-sm"></i> <span id="btnText">إرسال المحادثة</span>
            </button>
        </div>

        <p class="text-[10px] text-center text-gray-600 mt-6 uppercase tracking-widest">Powered by WhatsApp API • Secure & Direct</p>
    </main>

    <div id="modal" class="fixed inset-0 z-[2000] bg-black/80 backdrop-blur-xl hidden">
        <div id="modalContent" class="modal-up w-full h-full bg-[#111b21] flex flex-col">
            <header class="p-6 border-b border-white/10 flex items-center justify-between bg-[#111b21]">
                <h3 id="modalTitle" class="text-lg font-bold">ابحث عن دولتك</h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-[#2a3942] flex items-center justify-center"><i class="fas fa-times"></i></button>
            </header>
            
            <div class="p-6">
                <div class="search-container flex items-center bg-[#202c33] rounded-2xl border border-transparent p-1 transition-all">
                    <i class="fas fa-search px-4 text-gray-500"></i>
                    <input type="text" id="searchInp" oninput="searchData()" placeholder="اسم الدولة، الكود، أو المفتاح..." class="flex-1 p-4 bg-transparent outline-none">
                </div>
            </div>

            <div id="countryList" class="flex-1 overflow-y-auto px-2">
                </div>
        </div>
    </div>

    <script>
        let allCountries = [];
        let currentLang = 'ar';
        const texts = {
            ar: { title: "واتساب المباشر", cLabel: "اختر الدولة", pLabel: "رقم الجوال", mLabel: "الرسالة (اختياري)", btn: "إرسال المحادثة", mTitle: "ابحث عن دولتك", search: "ابحث باسم الدولة أو المفتاح...", alert: "يرجى كتابة الرقم أولاً", example: "مثال: " },
            en: { title: "WhatsApp Direct", cLabel: "Select Country", pLabel: "Phone Number", mLabel: "Message (Optional)", btn: "Start Chat", mTitle: "Select Country", search: "Search by name or code...", alert: "Please enter a number", example: "Example: " }
        };

        // تشغيل التطبيق
        async function startApp(l) {
            currentLang = l;
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 700);
            updateUI();
            await loadCountries();
        }

        // تحميل كل دول العالم
        async function loadCountries() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,flags,cca2');
                const data = await response.json();
                allCountries = data.map(c => ({
                    name: c.name.common,
                    nativeName: c.name.nativeName ? Object.values(c.name.nativeName)[0].common : c.name.common,
                    flag: c.flags.emoji || '🏳️',
                    dial: (c.idd.root || '') + (c.idd.suffixes ? (c.idd.suffixes.length > 1 ? '' : c.idd.suffixes[0]) : ''),
                    code: c.cca2
                })).filter(c => c.dial).sort((a,b) => a.name.localeCompare(b.name));
                renderList(allCountries);
            } catch (e) {
                console.error("خطأ في جلب الدول، سيتم استخدام القائمة الاحتياطية");
                // قائمة احتياطية في حال انقطاع الإنترنت
                allCountries = [{name: "Saudi Arabia", nativeName: "السعودية", flag: "🇸🇦", dial: "+966", code: "SA"}];
                renderList(allCountries);
            }
        }

        function renderList(list) {
            const listDiv = document.getElementById('countryList');
            listDiv.innerHTML = list.map(c => `
                <div onclick="selectCountry('${c.flag}', '${currentLang === 'ar' ? c.nativeName : c.name}', '${c.dial}')" class="country-item flex items-center justify-between p-5">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${c.flag}</span>
                        <div class="text-right">
                            <span class="font-bold text-sm block">${currentLang === 'ar' ? c.nativeName : c.name}</span>
                            <span class="text-[10px] text-gray-500">${currentLang === 'ar' ? c.name : c.nativeName}</span>
                        </div>
                    </div>
                    <span class="text-[#25D366] font-mono font-bold" dir="ltr">${c.dial}</span>
                </div>
            `).join('');
        }

        function searchData() {
            const term = document.getElementById('searchInp').value.toLowerCase();
            const filtered = allCountries.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.nativeName.toLowerCase().includes(term) || 
                c.dial.includes(term)
            );
            renderList(filtered);
        }

        function selectCountry(flag, name, dial) {
            document.getElementById('flagMain').innerText = flag;
            document.getElementById('flagInput').innerText = flag;
            document.getElementById('nameMain').innerText = name;
            document.getElementById('dialCode').value = dial.startsWith('+') ? dial : '+' + dial;
            document.getElementById('phoneNum').placeholder = "Enter number...";
            closeModal();
        }

        function updateUI() {
            const t = texts[currentLang];
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('appTitle').innerText = t.title;
            document.getElementById('lblCountry').innerText = t.cLabel;
            document.getElementById('lblPhone').innerText = t.pLabel;
            document.getElementById('lblMsg').innerText = t.mLabel;
            document.getElementById('btnText').innerText = t.btn;
            document.getElementById('modalTitle').innerText = t.mTitle;
            document.getElementById('searchInp').placeholder = t.search;
            document.getElementById('langBtnText').innerText = currentLang === 'ar' ? 'EN' : 'AR';
        }

        function switchLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            updateUI();
            renderList(allCountries);
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modalContent').classList.add('active'), 10);
        }

        function closeModal() {
            document.getElementById('modalContent').classList.remove('active');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 400);
        }

        function sendToWhatsApp() {
            let dial = document.getElementById('dialCode').value.replace('+', '').trim();
            let phone = document.getElementById('phoneNum').value.trim();
            let msg = encodeURIComponent(document.getElementById('msg').value);
            if(!phone) return alert(texts[currentLang].alert);
            if(phone.startsWith('0')) phone = phone.substring(1);
            window.open(`https://wa.me/${dial}${phone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
