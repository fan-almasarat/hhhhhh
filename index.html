<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال رقم الهاتف المتطور</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <style>
        /* تنسيقات التصميم الحديث */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }

        /* ضبط حاوية الإدخال لتكون مرنة */
        .iti {
            width: 100%;
            display: block;
        }

        input[type="tel"] {
            width: 100%;
            height: 45px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            padding-right: 10px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="tel"]:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0,123,255,0.2);
        }

        .btn-submit {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }

        /* تنسيق خاص لجعل قائمة الدول تظهر بشكل صحيح مع الكتابة العربية */
        .iti__country-list {
            text-align: left; /* لضمان ظهور أسماء الدول بوضوح */
            direction: ltr;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2 id="title">رقم الهاتف / Phone Number</h2>
    <form id="phone-form">
        <input id="phone" type="tel" name="phone">
        <button type="submit" class="btn-submit">إرسال / Submit</button>
    </form>
    <p id="result" style="margin-top:10px; font-size: 14px; text-align: center;"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script>

<script>
    // اختيار الحقل
    const input = document.querySelector("#phone");
    const resultDisplay = document.querySelector("#result");

    // تهيئة المكتبة
    const iti = window.intlTelInput(input, {
        // دعم اللغتين وتفضيل الدول العربية في أعلى القائمة
        preferredCountries: ["sa", "ae", "eg", "kw"],
        
        // إظهار المفتاح بجانب العلم (وهذا ما يمنع العلم من التغير عند الكتابة)
        separateDialCode: true,
        
        // البحث عن الدول وتنسيق تلقائي
        autoPlaceholder: "aggressive",
        
        // جعل القائمة تضم كل دول العالم
        allowDropdown: true,

        // اختيار الدولة بناءً على عنوان الـ IP الخاص بالمستخدم (اختياري)
        initialCountry: "auto",
        geoIpLookup: function(callback) {
            fetch("https://ipapi.co/json")
                .then(res => res.json())
                .then(data => callback(data.country_code))
                .catch(() => callback("sa"));
        },
    });

    // التعامل مع إرسال النموذج
    document.getElementById("phone-form").addEventListener("submit", function(e) {
        e.preventDefault();
        
        // الحصول على الرقم كاملًا مع مفتاح الدولة
        const fullNumber = iti.getNumber(); 
        
        if (iti.isValidNumber()) {
            resultDisplay.style.color = "green";
            resultDisplay.innerHTML = "تم بنجاح: " + fullNumber;
        } else {
            resultDisplay.style.color = "red";
            resultDisplay.innerHTML = "الرقم غير صحيح، يرجى المحاولة مرة أخرى.";
        }
    });
</script>

</body>
</html>
