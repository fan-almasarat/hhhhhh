<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOL CHAT PRO</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --wa: #25D366; --bg: #ffffff; --text: #111b21; --gray: #667781; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
        .app { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; position: relative; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { color: var(--wa); font-size: 24px; font-weight: 900; }
        
        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .field { background: #f8f9fa; border: 2px solid #f1f3f4; border-radius: 12px; padding: 12px; }
        label { font-size: 12px; color: var(--gray); font-weight: bold; display: block; margin-bottom: 5px; }
        select, input, textarea { width: 100%; border: none; background: transparent; outline: none; font-size: 16px; font-weight: bold; color: var(--text); }
        
        .row { display: flex; gap: 10px; align-items: center; }
        .dial-code { width: 80px; text-align: center; border-right: 1px solid #ddd; padding-right: 10px; }
        
        .btn-main { background: var(--wa); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-install { background: #000; color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; border: none; cursor: pointer; display: none; }

        /* سجل منبثق */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 25px 25px 0 0; padding: 20px; max-height: 70%; overflow-y: auto; }
        .hist-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }

        footer { padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #eee; }
        .nav-btn { background: none; border: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; }
        .active { color: var(--wa); }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="logo">ZOL CHAT</div>
        <button id="installApp" class="btn-install">تثبيت التطبيق</button>
    </header>

    <main>
        <div class="field">
            <label>اختر الدولة</label>
            <select id="countrySelect"></select>
        </div>

        <div class="field">
            <label>رقم الهاتف</label>
            <div class="row">
                <input type="text" id="codeVal" class="dial-code" readonly>
                <input type="tel" id="phoneVal" placeholder="000 000 000">
            </div>
        </div>

        <div class="field">
            <label>الرسالة</label>
            <textarea id="msgVal" rows="3">السلام عليكم</textarea>
        </div>

        <button class="btn-main" onclick="openWA()">
            <span>فتح الدردشة</span> <i class="fab fa-whatsapp"></i>
        </button>
    </main>

    <footer>
        <button class="nav-btn active"><i class="fas fa-home"></i><span>الرئيسية</span></button>
        <button class="nav-btn" onclick="toggleModal(true)"><i class="fas fa-history"></i><span>السجل</span></button>
        <button class="nav-btn" onclick="share()"><i class="fas fa-share-alt"></i><span>مشاركة</span></button>
    </footer>
</div>

<div id="histModal" class="modal" onclick="toggleModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-bottom:15px; text-align:center;">آخر المراسلات</h3>
        <div id="histList"></div>
        <button onclick="toggleModal(false)" class="btn-main" style="margin-top:20px; background:#eee; color:#333;">إغلاق</button>
    </div>
</div>

<script>
    // 1. جلب قائمة الدول الشاملة
    const countryData = [];
    async function init() {
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,flags');
            const data = await res.json();
            data.sort((a, b) => a.name.common.localeCompare(b.name.common));
            const select = document.getElementById('countrySelect');
            
            data.forEach(c => {
                if(c.idd.root) {
                    const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
                    const option = document.createElement('option');
                    option.value = code;
                    option.text = `${c.name.common} (${code})`;
                    option.dataset.cca2 = c.cca2;
                    select.appendChild(option);
                    countryData.push({name: c.name.common, code: code, cca2: c.cca2});
                }
            });

            // 2. اكتشاف الموقع تلقائياً
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            select.value = countryData.find(c => c.cca2 === geo.country_code).code;
            updateCode();
        } catch(e) { console.error("Error loading countries"); }
    }

    document.getElementById('countrySelect').onchange = updateCode;
    function updateCode() { document.getElementById('codeVal').value = document.getElementById('countrySelect').value; }

    function openWA() {
        const full = document.getElementById('codeVal').value.replace('+','') + document.getElementById('phoneVal').value;
        const msg = encodeURIComponent(document.getElementById('msgVal').value);
        if(full.length > 5) {
            saveHist(full);
            window.open(`https://wa.me/${full}?text=${msg}`);
        }
    }

    // 3. إدارة السجل
    function saveHist(n) {
        let h = JSON.parse(localStorage.getItem('zh') || '[]');
        if(!h.includes(n)) { h.unshift(n); localStorage.setItem('zh', JSON.stringify(h.slice(0,10))); }
        renderHist();
    }

    function renderHist() {
        const list = document.getElementById('histList');
        list.innerHTML = '';
        JSON.parse(localStorage.getItem('zh') || '[]').forEach(n => {
            const d = document.createElement('div');
            d.className = 'hist-item';
            d.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:#25d366"></i>`;
            d.onclick = () => { document.getElementById('phoneVal').value = n.replace(document.getElementById('codeVal').value.replace('+',''), ''); toggleModal(false); };
            list.appendChild(d);
        });
    }

    function toggleModal(show) { document.getElementById('histModal').style.display = show ? 'flex' : 'none'; }

    // 4. ميزة التثبيت (PWA)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installApp').style.display = 'block';
    });

    document.getElementById('installApp').onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installApp').style.display = 'none';
            deferredPrompt = null;
        }
    };

    // التسجيل لـ Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    function share() { navigator.share ? navigator.share({url: location.href}) : alert(location.href); }
    window.onload = () => { init(); renderHist(); };
</script>
</body>
</html>
