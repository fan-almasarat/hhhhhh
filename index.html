<!DOCTYPE html>
<html lang="en" dir="ltr" id="appHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Direct Chat Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="page-wrapper">
        <div id="installBanner" class="install-banner" style="display: none;">
            <div class="install-info">
                <img src="whatsapp-icon.png" width="40">
                <div>
                    <strong>Install App</strong>
                    <p>Faster access on your home screen</p>
                </div>
            </div>
            <button id="btnInstallAction">Add</button>
        </div>

        <nav class="top-nav">
            <h2 id="txtTitle">Direct Chat</h2>
            <button id="langToggle" onclick="toggleLanguage()">العربية</button>
        </nav>

        <div class="main-content">
            <div class="input-card">
                <label id="lblCountry">Select Country</label>
                <div class="search-box">
                    <input type="text" id="countryInput" placeholder="Search country..." oninput="filterCountries(this.value)">
                    <div id="countriesDropdown" class="dropdown-content"></div>
                </div>

                <div class="phone-row">
                    <div class="code-display">
                        <span id="currentFlag" class="flag-icon flag-icon-us"></span>
                        <input type="text" id="codeInput" value="+1" readonly>
                    </div>
                    <input type="tel" id="phoneInput" placeholder="Phone Number" inputmode="numeric">
                </div>

                <label id="lblMsg">Ready Message</label>
                <textarea id="messageInput">Peace be upon you</textarea>

                <button class="btn-send" onclick="openWhatsApp()">
                    <i class="fab fa-whatsapp"></i> <span id="btnChat">Start Chat</span>
                </button>
            </div>

            <div class="action-grid">
                <button class="action-btn" onclick="startQRScanner()">
                    <i class="fas fa-qrcode"></i> <span id="btnQR">Scan QR</span>
                </button>
                <button class="action-btn" onclick="handleNativeShare()">
                    <i class="fas fa-share-nodes"></i> <span id="txtShareBtn">Share</span>
                </button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <div id="reader"></div>
            <button onclick="stopQRScanner()" class="close-btn">Close Camera</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js"></script>
</body>
</html>
