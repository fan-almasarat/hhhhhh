<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة مباشرة - Direct Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #e4f5e9; font-family: 'Tajawal', sans-serif; }
        
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-field { border: 1px solid #ccc; border-radius: 6px; padding: 12px; outline: none; transition: 0.3s; width: 100%; }
        .input-field:focus { border-color: #25D366; }
        
        /* تخصيص مكتبة الدول لتناسب التصميم */
        .iti { width: 100%; }
        .iti__selected-flag { background: #f8f9fa !important; border-radius: 6px !important; border: 1px solid #ccc !important; }
        .iti__country-list { background: white !important; border-radius: 8px; border: 1px solid #ddd; }
        .iti__search-input { padding: 10px !important; margin: 5px !important; width: calc(100% - 10px) !important; text-align: right; }
        
        .btn-blue { background: #5a8dee; color: white; border-radius: 6px; }
        .btn-green { background: #4cd964; color: white; border-radius: 6px; }
        .social-btn { border-radius: 8px; padding: 12px; color: white; display: flex; align-items: center; justify-content: center; flex: 1; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-xl card p-10 space-y-6">
        <div class="text-center">
            <h1 id="txt-header" class="text-3xl font-bold text-[#2d6a4f]">دردشة مباشرة</h1>
            <p id="txt-sub" class="text-gray-500 text-sm mt-2">أسرع وأذكى طريقة للتواصل مباشرة عبر واتساب.</p>
        </div>

        <button class="w-full btn-blue py-3 font-bold flex items-center justify-center gap-2">
            <span id="txt-install">📲 تثبيت التطبيق</span>
        </button>

        <div class="text-left">
            <button onclick="toggleLang()" class="text-xs text-blue-600 underline">English</button>
        </div>

        <div class="space-y-4">
            <div class="text-right">
                <label id="txt-label-select" class="text-xs font-bold text-gray-700 mb-1 block">اختر الدولة أو ابحث عنها:</label>
                <div id="country-search-container" dir="ltr">
                    <input type="tel" id="country-selector" class="input-field text-center font-bold">
                </div>
            </div>

            <div class="flex gap-2 items-end" dir="ltr">
                <div class="w-1/3 text-right">
                    <div id="dial-display" class="input-field bg-gray-50 text-center font-bold flex items-center justify-center gap-2" style="padding: 11px;">
                        <span id="code-val">+966</span>
                        <img id="flag-val" src="https://flagcdn.com/w20/sa.png" class="w-5">
                    </div>
                </div>
                <div class="w-2/3 text-right">
                    <label id="txt-label-num" class="text-[10px] font-bold text-gray-500 mb-1 block mr-2" dir="rtl">أدخل الرقم المحلي (بدون الرمز):</label>
                    <input type="number" id="phone-main" class="input-field text-center" placeholder="أدخل الرقم هنا">
                </div>
            </div>

            <button onclick="startChat()" class="w-full btn-green py-4 font-bold text-lg flex items-center justify-center gap-2 shadow-sm">
                <span id="txt-start">🌀 بدء المحادثة الآن</span>
            </button>
        </div>

        <div class="space-y-3">
            <p id="txt-share" class="text-center text-xs font-bold text-gray-600">شارك التطبيق مع أصدقائك:</p>
            <div class="flex gap-3">
                <div class="social-btn bg-[#25D366]">W</div>
                <div class="social-btn bg-[#e0e0e0]">🔗</div>
                <div class="social-btn bg-[#4267B2]">f</div>
            </div>
        </div>

        <div class="text-center text-[10px] text-gray-400 mt-10">
            <p id="txt-footer">📞 اتصل بي</p>
            <p>© 2025 Abdulaziz95 - جميع الحقوق محفوظة</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script>
        let currentLang = 'ar';
        const countryInput = document.querySelector("#country-selector");
        const dialCodeSpan = document.querySelector("#code-val");
        const flagImg = document.querySelector("#flag-val");

        const translations = {
            ar: {
                header: "دردشة مباشرة", sub: "أسرع وأذكى طريقة للتواصل مباشرة عبر واتساب.",
                install: "📲 تثبيت التطبيق", select: "اختر الدولة أو ابحث عنها:",
                num: "أدخل الرقم المحلي (بدون الرمز):", start: "🌀 بدء المحادثة الآن",
                share: "شارك التطبيق مع أصدقائك:", footer: "📞 اتصل بي",
                search: "بحث عن دولة..."
            },
            en: {
                header: "Direct Chat", sub: "The fastest way to connect on WhatsApp.",
                install: "📲 Install App", select: "Select or search for country:",
                num: "Enter local number (without code):", start: "🌀 Start Chat Now",
                share: "Share with your friends:", footer: "📞 Contact Me",
                search: "Search country..."
            }
        };

        const iti = window.intlTelInput(countryInput, {
            initialCountry: "sa",
            separateDialCode: false,
            countrySearch: true,
            i18n: { searchPlaceholder: "بحث عن دولة..." },
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        // تحديث الحقل السفلي عند تغيير الدولة
        countryInput.addEventListener("countrychange", function() {
            const data = iti.getSelectedCountryData();
            dialCodeSpan.innerText = "+" + data.dialCode;
            flagImg.src = `https://flagcdn.com/w20/${data.iso2}.png`;
            countryInput.value = data.name + " (+" + data.dialCode + ")";
        });

        // تعيين القيمة الأولية
        setTimeout(() => {
            const data = iti.getSelectedCountryData();
            countryInput.value = data.name + " (+" + data.dialCode + ")";
        }, 500);

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const t = translations[currentLang];
            document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('txt-header').innerText = t.header;
            document.getElementById('txt-sub').innerText = t.sub;
            document.getElementById('txt-install').innerText = t.install;
            document.getElementById('txt-label-select').innerText = t.select;
            document.getElementById('txt-label-num').innerText = t.num;
            document.getElementById('txt-start').innerText = t.start;
            document.getElementById('txt-share').innerText = t.share;
            document.getElementById('txt-footer').innerText = t.footer;
            iti.setOptions({ i18n: { searchPlaceholder: t.search } });
        }

        function startChat() {
            const code = dialCodeSpan.innerText.replace('+', '');
            let phone = document.getElementById('phone-main').value;
            if (!phone) return alert("أدخل الرقم يا زول!");
            if (phone.startsWith('0')) phone = phone.substring(1);
            window.open(`https://wa.me/${code}${phone}`, '_blank');
        }
    </script>
</body>
</html>
