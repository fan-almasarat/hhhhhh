<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>واتساب المباشر PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --brand: #00a884; --bg: #f0f2f5; --surface: #ffffff; --text: #111b21; --gray: #667781; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .app-shell { width: 100%; max-width: 500px; background: var(--surface); height: 100%; display: flex; flex-direction: column; position: relative; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 42px; height: 42px; border-radius: 12px; object-fit: cover; }
        .logo-box h1 { font-size: 19px; font-weight: 800; }

        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        label { font-size: 13px; font-weight: 700; color: var(--gray); margin-bottom: 5px; display: block; }

        /* تنسيق الحقول */
        .input-row { display: flex; gap: 10px; align-items: center; }
        .country-input-box { display: flex; align-items: center; background: var(--bg); border-radius: 15px; padding: 0 12px; width: 110px; height: 60px; flex-shrink: 0; }
        .dial-field { width: 100%; border: none; background: transparent; font-weight: 800; font-size: 18px; text-align: center; outline: none; }
        .main-input { flex: 1; height: 60px; background: var(--bg); border-radius: 15px; border: 2px solid transparent; padding: 0 15px; font-size: 20px; font-weight: 800; outline: none; min-width: 0; }
        .main-input:focus { border-color: var(--brand); background: #fff; }

        .text-box { width: 100%; height: 100px; background: var(--bg); border-radius: 15px; border: none; padding: 15px; font-size: 16px; outline: none; resize: none; }

        /* الرسائل المقترحة */
        .chips-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { background: #e7f8ef; color: var(--brand); border: none; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }

        /* الأزرار */
        .btn { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 8px 15px rgba(0,168,132,0.2); }
        .btn-dark { background: #202124; color: #fff; }
        .btn-install { background: linear-gradient(45deg, #0072ff, #00d2ff); color: white; display: none; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* واجهة الباركود */
        #scanner-ui { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; }
        #video-view { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scan-box { width: 260px; height: 260px; border: 4px solid #fff; border-radius: 30px; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--brand); top: 0; animation: scanning 2s linear infinite; }
        @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }

        /* السجل */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: flex-end; }
        .modal-body { width: 100%; background: #fff; border-radius: 25px 25px 0 0; padding: 25px; max-height: 70%; overflow-y: auto; }
        .hist-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-weight: bold; cursor: pointer; }

        footer { background: #fff; padding: 10px; border-top: 1px solid #eee; display: flex; justify-content: space-around; }
        .nav-btn { border: none; background: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--brand); }
    </style>
</head>
<body>

<div id="scanner-ui">
    <video id="video-view"></video>
    <div class="scan-overlay">
        <button onclick="stopCamera()" style="position:absolute; top:40px; left:20px; padding:10px 20px; border-radius:20px; border:none; background:rgba(255,255,255,0.3); color:#fff; font-weight:bold;">إغلاق</button>
        <div class="scan-box"><div class="scan-line"></div></div>
    </div>
</div>

<div class="app-shell">
    <header>
        <div class="logo-box">
            <img src="whatsapp-icon.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968841.png'">
            <h1>دردشة مباشرة</h1>
        </div>
        <button onclick="alert('اللغة العربية مفعلة')" style="border:none; background:var(--bg); padding:8px 15px; border-radius:15px; font-weight:bold;">AR</button>
    </header>

    <main>
        <div>
            <label>البحث عن الدولة</label>
            <input type="text" id="countrySearch" class="main-input" style="font-size:16px; height:50px; width:100%;" placeholder="ابحث باسم الدولة...">
        </div>

        <div>
            <label>رقم الجوال</label>
            <div class="input-row">
                <div class="country-input-box">
                    <span id="flagIcon" class="flag-icon flag-icon-sd"></span>
                    <span style="font-weight:900; margin:0 5px;">+</span>
                    <input type="tel" id="dialCode" class="dial-field" value="249">
                </div>
                <input type="tel" id="phoneNum" class="main-input" placeholder="ادخل الرقم">
            </div>
        </div>

        <div>
            <label>الرسالة</label>
            <textarea id="msg" class="text-box">السلام عليكم</textarea>
            <div class="chips-container" id="chips"></div>
        </div>

        <button class="btn btn-primary" onclick="goWA()">بدء المراسلة <i class="fas fa-paper-plane"></i></button>
        <button class="btn btn-dark" onclick="startCamera()">مسح باركود <i class="fas fa-qrcode"></i></button>
        <button id="pwaBtn" class="btn btn-install" onclick="installApp()">تثبيت التطبيق <i class="fas fa-download"></i></button>
    </main>

    <div id="histModal" class="modal" onclick="closeHist()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h3 style="text-align:center; margin-bottom:20px;">آخر المراسلات</h3>
            <div id="histList"></div>
            <button onclick="closeHist()" style="width:100%; padding:15px; margin-top:15px; border:none; border-radius:15px; background:var(--bg);">إغلاق</button>
        </div>
    </div>

    <footer>
        <div class="nav-btn active" onclick="location.reload()"><i class="fas fa-house"></i><span>الرئيسية</span></div>
        <div class="nav-btn" onclick="openHist()"><i class="fas fa-history"></i><span>السجل</span></div>
        <div class="nav-btn" onclick="navigator.share({url: location.href})"><i class="fas fa-share-nodes"></i><span>مشاركة</span></div>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let countries = [];

    async function init() {
        // رسائل مقترحة
        const msgs = ["السلام عليكم", "بكم السعر؟", "ممكن الموقع؟", "متوفر حالياً؟"];
        const container = document.getElementById('chips');
        msgs.forEach(t => {
            const btn = document.createElement('button'); btn.className = 'chip'; btn.innerText = t;
            btn.onclick = () => document.getElementById('msg').value = t;
            container.appendChild(btn);
        });

        // جلب الدول
        const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,cca2,translations');
        const data = await res.json();
        countries = data.map(c => ({
            name: c.translations.ara?.common || c.name.common,
            code: (c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "")).replace('+', ''),
            flag: c.cca2.toLowerCase()
        }));

        // تحديد الموقع تلقائياً
        try {
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            document.getElementById('dialCode').value = geo.country_calling_code.replace('+', '');
            document.getElementById('flagIcon').className = `flag-icon flag-icon-${geo.country_code.toLowerCase()}`;
        } catch(e) {}

        // تحديث العلم عند الكتابة
        document.getElementById('dialCode').oninput = (e) => {
            const found = countries.find(c => c.code === e.target.value.trim());
            if(found) document.getElementById('flagIcon').className = `flag-icon flag-icon-${found.flag}`;
        };
    }

    function startCamera() {
        document.getElementById('scanner-ui').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video-view', (result) => {
            if (result) {
                let text = result.text;
                document.getElementById('phoneNum').value = text.includes('wa.me/') ? text.split('wa.me/')[1].split('?')[0] : text.replace(/\D/g, '');
                stopCamera();
            }
        });
    }
    function stopCamera() { codeReader.reset(); document.getElementById('scanner-ui').style.display = 'none'; }

    function goWA() {
        const full = document.getElementById('dialCode').value + document.getElementById('phoneNum').value;
        if(full.length < 5) return alert("الرقم غير مكتمل");
        
        let h = JSON.parse(localStorage.getItem('wa_hist') || '[]');
        if(!h.includes(full)) { h.unshift(full); localStorage.setItem('wa_hist', JSON.stringify(h.slice(0,10))); }
        
        window.location.href = `https://wa.me/${full}?text=${encodeURIComponent(document.getElementById('msg').value)}`;
    }

    function openHist() {
        const list = document.getElementById('histList'); list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('wa_hist') || '[]');
        h.forEach(n => {
            const d = document.createElement('div'); d.className = 'hist-item';
            d.innerHTML = `<span>+${n}</span><i class="fab fa-whatsapp" style="color:green"></i>`;
            d.onclick = () => { document.getElementById('phoneNum').value = n; closeHist(); };
            list.appendChild(d);
        });
        document.getElementById('histModal').style.display = 'flex';
    }
    function closeHist() { document.getElementById('histModal').style.display = 'none'; }

    let defP;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defP = e; document.getElementById('pwaBtn').style.display = 'flex'; });
    function installApp() { if(defP) { defP.prompt(); defP = null; } }

    window.onload = init;
</script>
</body>
</html>
