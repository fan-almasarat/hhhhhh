<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="mainTitle">دردشة مباشرة</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="page-wrapper" id="pageWrapper">
        <nav class="top-nav">
            <button id="langToggle" onclick="toggleLanguage()" class="nav-btn">English</button>
            <button id="installButton" class="nav-btn install-btn" style="display: none;"><i class="fas fa-download"></i></button>
        </nav>

        <header class="app-header">
            <div class="logo-container">
                <img src="whatsapp-icon.png" alt="Logo" class="main-logo">
            </div>
            <h1 id="txtTitle" class="app-heading">دردشة مباشرة</h1>
            <p id="txtDesc" class="description">أسرع وسيلة للمراسلة دون حفظ الرقم.</p>
        </header>

        <main class="main-form">
            <div class="input-group">
                <label id="lblCountry" for="countryInput">اختر الدولة:</label>
                <div class="search-wrapper">
                    <input list="country-options" id="countryInput" placeholder="بحث عن دولة..." onchange="handleCountrySelection(this.value)">
                    <datalist id="country-options"></datalist>
                </div>
            </div>

            <div class="phone-row">
                <div class="country-box">
                    <span id="currentFlag" class="flag-icon flag-icon-sd"></span>
                    <input type="tel" id="codeInput" value="+249" oninput="handleCodeInput(this.value)">
                </div>
                <input type="tel" id="phoneInput" placeholder="رقم الهاتف" inputmode="numeric">
            </div>

            <div class="input-group">
                <label id="lblMsg" for="messageInput">الرسالة (اختياري):</label>
                <textarea id="messageInput" placeholder="اكتب رسالتك هنا...">السلام عليكم</textarea>
            </div>

            <button id="whatsappButton" class="btn-primary" onclick="openWhatsApp()">
                <i class="fab fa-whatsapp"></i> <span id="btnChat">بدء المحادثة</span>
            </button>
            
            <button id="qrButton" class="btn-secondary" onclick="toggleQRScanner()">
                <i class="fas fa-qrcode"></i> <span id="btnQR">مسح باركود</span>
            </button>
        </main>

        <div class="share-section">
            <p id="txtShare" class="share-title">شارك التطبيق:</p>
            <div class="share-grid">
                <button class="share-card" onclick="nativeShare()"><i class="fas fa-share-nodes"></i></button>
                <button class="share-card wa" onclick="shareSocial('whatsapp')"><i class="fab fa-whatsapp"></i></button>
                <button class="share-card fb" onclick="shareSocial('facebook')"><i class="fab fa-facebook-f"></i></button>
            </div>
        </div>

        <footer class="app-footer">
            <p class="copyright">© 2026 Abdul3ziz95</p>
        </footer>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleQRScanner()">&times;</span>
            <div id="reader"></div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js?v=2.0"></script>
</body>
</html>
