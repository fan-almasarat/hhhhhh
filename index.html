<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOL CHAT ULTIMATE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --wa: #25D366; --dark: #111b21; --gray: #667781; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--dark); }
        
        .app-container { max-width: 500px; margin: 0 auto; height: 100%; background: #fff; display: flex; flex-direction: column; position: relative; }
        
        header { background: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { color: var(--wa); font-weight: 900; font-size: 22px; display: flex; align-items: center; gap: 8px; }
        .lang-toggle { background: var(--wa); color: #fff; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; }

        main { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 13px; color: var(--gray); }
        .input-field { width: 100%; padding: 12px; border: 2px solid #f0f2f5; border-radius: 10px; background: #f9f9f9; font-size: 15px; font-weight: 600; outline: none; margin-bottom: 10px; }
        
        .phone-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .country-selector { width: 100px; background: #f0f2f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; border: 2px solid #f0f2f5; cursor: pointer; }
        .country-selector input { width: 45px; border: none; background: transparent; font-weight: 800; text-align: center; font-size: 15px; outline: none; }
        .phone-box { flex: 1; }

        .sug-container { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 8px; }
        .sug-item { background: #e7f8ef; color: #075E54; padding: 6px 12px; border-radius: 15px; border: none; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; }

        .btn-primary { width: 100%; background: var(--wa); color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; }
        
        .history-card { margin-top: 5px; }
        .history-list { display: flex; flex-direction: column; }
        .history-entry { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        
        .scan-btn { width: 100%; background: var(--dark); color: #fff; border: none; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-top: 5px; }

        #camera-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #video-stream { width: 100%; height: 100%; object-fit: cover; }
        .scan-region { position: absolute; inset: 0; margin: auto; width: 260px; height: 260px; border: 3px solid var(--wa); border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); }

        footer { background: #fff; padding: 8px; display: flex; justify-content: space-around; border-top: 1px solid #eee; }
        .nav-link { border: none; background: none; color: var(--gray); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
        .nav-link.active { color: var(--wa); }
        
        body.en { direction: ltr; }
    </style>
</head>
<body id="body">

    <div id="camera-modal">
        <div style="position:absolute; top:20px; width:100%; text-align:center; z-index:100;">
            <button onclick="stopScanning()" style="background:var(--wa); color:white; border:none; padding:10px 30px; border-radius:50px; font-weight:900;">إلغاء المسح</button>
        </div>
        <video id="video-stream" playsinline></video>
        <div class="scan-region"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo"><i class="fab fa-whatsapp"></i> ZOL CHAT</div>
            <button class="lang-toggle" onclick="changeLang()" id="lBtn">English</button>
        </header>

        <main>
            <div class="card">
                <label id="txt1">ابحث عن الدولة أو المفتاح</label>
                <input type="text" id="cSearch" class="input-field" placeholder="السودان، السعودية، 249...">

                <label id="txt2">رقم الجوال</label>
                <div class="phone-input-row">
                    <div class="country-selector">
                        <span id="flagIcon" class="flag-icon flag-icon-sd"></span>
                        <input type="tel" id="pCode" value="249">
                    </div>
                    <input type="tel" id="pNum" class="input-field phone-box" placeholder="ادخل الرقم" inputmode="numeric">
                </div>

                <label id="txt3">الرسالة</label>
                <textarea id="pMsg" class="input-field" style="height:70px; margin-bottom:5px;">السلام عليكم</textarea>
                
                <div class="sug-container" id="suggestions"></div>

                <button class="btn-primary" onclick="launchWA()">
                    <span id="txt4">فتح محادثة</span> <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <button class="scan-btn" onclick="startScanning()">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-qrcode" style="font-size:24px; color:var(--wa);"></i>
                    <div style="text-align:right;">
                        <b id="txt5">مسح باركود واتساب</b><br>
                        <small id="txt6" style="color:#8696a0;">التوجيه التلقائي للمحادثة</small>
                    </div>
                </div>
                <i class="fas fa-chevron-left" id="arr"></i>
            </button>

            <div class="card history-card">
                <label id="txt7">آخر المراسلات</label>
                <div id="historyList" class="history-list"></div>
            </div>
        </main>

        <footer>
            <button class="nav-link active" onclick="location.reload()"><i class="fas fa-home"></i><span id="n1">الرئيسية</span></button>
            <button class="nav-link" onclick="shareApp()"><i class="fas fa-share-nodes"></i><span id="n2">مشاركة</span></button>
            <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="nav-link" style="text-decoration:none;"><i class="fas fa-user-check"></i><span id="n3">المطور</span></a>
        </footer>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script>
        // قاعدة بيانات الدول الشاملة
        const COUNTRIES = [
            {n:"السودان", e:"Sudan", c:"249", i:"sd"}, {n:"السعودية", e:"Saudi Arabia", c:"966", i:"sa"},
            {n:"مصر", e:"Egypt", c:"20", i:"eg"}, {n:"الإمارات", e:"UAE", c:"971", i:"ae"},
            {n:"الكويت", e:"Kuwait", c:"965", i:"kw"}, {n:"قطر", e:"Qatar", c:"974", i:"qa"},
            {n:"عمان", e:"Oman", c:"968", i:"om"}, {n:"البحرين", e:"Bahrain", c:"973", i:"bh"},
            {n:"الأردن", e:"Jordan", c:"962", i:"jo"}, {n:"العراق", e:"Iraq", c:"964", i:"iq"},
            {n:"اليمن", e:"Yemen", c:"967", i:"ye"}, {n:"فلسطين", e:"Palestine", c:"970", i:"ps"},
            {n:"لبنان", e:"Lebanon", c:"961", i:"lb"}, {n:"سوريا", e:"Syria", c:"963", i:"sy"},
            {n:"المغرب", e:"Morocco", c:"212", i:"ma"}, {n:"الجزائر", e:"Algeria", c:"213", i:"dz"},
            {n:"تونس", e:"Tunisia", c:"216", i:"tn"}, {n:"ليبيا", e:"Libya", c:"218", i:"ly"},
            {n:"أمريكا", e:"USA", c:"1", i:"us"}, {n:"كندا", e:"Canada", c:"1", i:"ca"},
            {n:"تركيا", e:"Turkey", c:"90", i:"tr"}, {n:"بريطانيا", e:"UK", c:"44", i:"gb"}
        ];

        let lang = 'ar';
        const reader = new ZXing.BrowserMultiFormatReader();

        // 1. اكتشاف الدولة تلقائياً حسب الموقع
        async function autoDetect() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const found = COUNTRIES.find(c => c.c === data.country_calling_code.replace('+',''));
                if(found) {
                    document.getElementById('pCode').value = found.c;
                    document.getElementById('flagIcon').className = `flag-icon flag-icon-${found.i}`;
                }
            } catch(e) { console.log("Auto-detect failed"); }
        }

        function changeLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.getElementById('body').className = lang;
            document.getElementById('body').dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            const trans = {
                ar: ["ابحث عن الدولة أو المفتاح", "رقم الجوال", "الرسالة", "فتح محادثة", "مسح باركود واتساب", "التوجيه التلقائي للمحادثة", "آخر المراسلات", "الرئيسية", "مشاركة", "المطور", "ادخل الرقم", "English"],
                en: ["Search Country or Code", "Phone Number", "Message", "Open Chat", "Scan WA QR", "Auto-redirect to chat", "Recent History", "Home", "Share", "Developer", "Enter Number", "العربية"]
            };
            const c = trans[lang];
            document.getElementById('txt1').innerText = c[0]; document.getElementById('txt2').innerText = c[1];
            document.getElementById('txt3').innerText = c[2]; document.getElementById('txt4').innerText = c[3];
            document.getElementById('txt5').innerText = c[4]; document.getElementById('txt6').innerText = c[5];
            document.getElementById('txt7').innerText = c[6]; document.getElementById('n1').innerText = c[7];
            document.getElementById('n2').innerText = c[8]; document.getElementById('n3').innerText = c[9];
            document.getElementById('pNum').placeholder = c[10]; document.getElementById('lBtn').innerText = c[11];
            document.getElementById('arr').className = lang === 'ar' ? 'fas fa-chevron-left' : 'fas fa-chevron-right';
            renderSugs();
        }

        function renderSugs() {
            const list = lang === 'ar' ? ["السلام عليكم", "بكم السعر؟", "أرسل الموقع"] : ["Hello", "How much?", "Send Location"];
            const div = document.getElementById('suggestions');
            div.innerHTML = '';
            list.forEach(s => {
                const b = document.createElement('button');
                b.className = 'sug-item'; b.innerText = s;
                b.onclick = () => document.getElementById('pMsg').value = s;
                div.appendChild(b);
            });
        }

        // البحث اليدوي عن الدولة
        document.getElementById('cSearch').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            const found = COUNTRIES.find(c => c.n.includes(v) || c.e.toLowerCase().includes(v) || c.c.includes(v));
            if(found) {
                document.getElementById('pCode').value = found.c;
                document.getElementById('flagIcon').className = `flag-icon flag-icon-${found.i}`;
            }
        };

        // المفتاح اليدوي (للفرق بين أمريكا وكندا)
        document.getElementById('pCode').oninput = (e) => {
            const v = e.target.value;
            const found = COUNTRIES.find(c => c.c === v);
            if(found) document.getElementById('flagIcon').className = `flag-icon flag-icon-${found.i}`;
        };

        function launchWA() {
            const code = document.getElementById('pCode').value.replace(/\D/g,'');
            const num = document.getElementById('pNum').value.replace(/\D/g,'');
            const msg = encodeURIComponent(document.getElementById('pMsg').value);
            if(num) {
                const full = code + num;
                addToHistory(full);
                window.location.href = `https://wa.me/${full}?text=${msg}`;
            }
        }

        // مسح الباركود والتوجيه التلقائي
        async function startScanning() {
            document.getElementById('camera-modal').style.display = 'flex';
            try {
                const devs = await reader.listVideoInputDevices();
                const back = devs.find(d => d.label.toLowerCase().includes('back')) || devs[0];
                reader.decodeFromVideoDevice(back.deviceId, 'video-stream', (res) => {
                    if(res) {
                        const url = res.text;
                        stopScanning();
                        // إذا كان الرابط يحتوي على رقم واتساب، وجهه مباشرة
                        if(url.includes('wa.me') || url.includes('whatsapp.com')) {
                            window.location.href = url;
                        } else {
                            // إذا كان باركود لرقم فقط
                            document.getElementById('pNum').value = url.replace(/\D/g,'');
                            launchWA();
                        }
                    }
                });
            } catch(e) { stopScanning(); alert("خطأ في الكاميرا"); }
        }

        function stopScanning() { reader.reset(); document.getElementById('camera-modal').style.display = 'none'; }

        function addToHistory(n) {
            let h = JSON.parse(localStorage.getItem('zol_hist') || '[]');
            if(!h.includes(n)) { h.unshift(n); if(h.length > 5) h.pop(); localStorage.setItem('zol_hist', JSON.stringify(h)); }
            renderHistory();
        }

        function renderHistory() {
            const div = document.getElementById('historyList');
            div.innerHTML = '';
            const h = JSON.parse(localStorage.getItem('zol_hist') || '[]');
            h.forEach(n => {
                const entry = document.createElement('div');
                entry.className = 'history-entry';
                entry.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:var(--wa)"></i>`;
                entry.onclick = () => { document.getElementById('pNum').value = n.substring(3); launchWA(); };
                div.appendChild(entry);
            });
        }

        function shareApp() {
            if(navigator.share) navigator.share({title:'Zol Chat', url:location.href});
            else { navigator.clipboard.writeText(location.href); alert("تم نسخ الرابط"); }
        }

        window.onload = () => { autoDetect(); renderSugs(); renderHistory(); };
    </script>
</body>
</html>
