<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب المباشر - Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-green: #25D366; --wa-dark: #075E54; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; }
        @media (prefers-color-scheme: dark) {
            body { background: #0b141a; color: white; }
            .card { background: #111b21 !important; border-color: #222d34 !important; }
            input, textarea { background: #2a3942 !important; color: white !important; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="card w-full max-w-md bg-white p-6 rounded-2xl shadow-xl border border-gray-100 transition-all">
        <div class="text-center mb-6">
            <div class="bg-[#25D366] w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fab fa-whatsapp text-white text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold">مراسلة سريعة</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">أرسل رسالة واتساب دون حفظ الرقم</p>
        </div>

        <div class="space-y-4">
            <div class="flex gap-2">
                <div class="w-1/3">
                    <label class="block text-xs mb-1 opacity-70">المفتاح</label>
                    <input type="number" id="code" value="966" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 outline-none focus:ring-2 focus:ring-[#25D366] text-center font-bold">
                </div>
                <div class="w-2/3">
                    <label class="block text-xs mb-1 opacity-70">رقم الجوال</label>
                    <input type="tel" id="phone" placeholder="5xxxxxxxx" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 outline-none focus:ring-2 focus:ring-[#25D366] font-bold">
                </div>
            </div>

            <div>
                <label class="block text-xs mb-1 opacity-70">الرسالة (اختياري)</label>
                <textarea id="msg" rows="3" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 outline-none focus:ring-2 focus:ring-[#25D366]" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="send()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-white py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> ابدأ الدردشة
            </button>
        </div>

        <div id="installBtn" class="hidden mt-6 border-t pt-4 border-gray-100 dark:border-gray-800">
            <button onclick="installApp()" class="w-full text-sm text-[#25D366] font-medium py-2 rounded-lg border border-[#25D366] hover:bg-[#25D366] hover:text-white transition">
                <i class="fas fa-download ml-1"></i> تثبيت التطبيق على جهازك
            </button>
        </div>
    </div>

    <script>
        // برمجة الإرسال
        function send() {
            let code = document.getElementById('code').value.replace('+', '');
            let phone = document.getElementById('phone').value.trim();
            let msg = encodeURIComponent(document.getElementById('msg').value);

            if(!phone) return alert("ضع الرقم أولاً");
            if(phone.startsWith('0')) phone = phone.substring(1);

            window.open(`https://wa.me/${code}${phone}?text=${msg}`, '_blank');
        }

        // برمجة التثبيت (PWA)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBtn').classList.add('hidden');
                }
                deferredPrompt = null;
            }
        }
    </script>
</body>
</html>
