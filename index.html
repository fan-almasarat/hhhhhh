<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة مباشرة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand: #00a884; --bg: #f0f2f5; --surface: #ffffff; --text: #111b21; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body, html { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .app-shell { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: var(--surface); position: relative; }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; }
        .logo-box h1 { font-size: 18px; font-weight: 800; }

        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* إصلاح حقل الرقم والمفتاح */
        label { font-size: 13px; font-weight: bold; color: #667781; margin-bottom: 5px; display: block; }
        .phone-row { display: flex; gap: 8px; width: 100%; align-items: center; }
        
        .code-input-wrap { 
            display: flex; align-items: center; background: #f0f2f5; 
            border-radius: 12px; padding: 0 8px; width: 110px; height: 55px; flex-shrink: 0;
        }
        .code-input-wrap input { 
            width: 100%; border: none; background: transparent; 
            font-size: 16px; font-weight: bold; text-align: center; outline: none; 
        }
        .flag-box { width: 28px; height: 20px; display: flex; align-items: center; justify-content: center; }

        .number-input-wrap { flex: 1; height: 55px; }
        .number-input-wrap input { 
            width: 100%; height: 100%; border: none; background: #f0f2f5; 
            border-radius: 12px; padding: 0 15px; font-size: 18px; font-weight: bold; outline: none;
        }

        .search-wrap input, .msg-wrap textarea { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: #f0f2f5; font-size: 15px; outline: none;
        }

        /* الأزرار */
        .btn { 
            width: 100%; padding: 16px; border-radius: 14px; border: none; 
            font-size: 16px; font-weight: bold; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main { background: var(--brand); color: white; }
        .btn-qr { background: #111b21; color: white; margin-top: 5px; }
        .btn-install { 
            background: #0072ff; color: white; margin-top: 5px; display: none;
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* البحث والسجل */
        .res-list { 
            background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            max-height: 200px; overflow-y: auto; display: none; margin-top: 5px;
        }
        .res-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        .sugs { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; }
        .chip { background: #e7f8ef; color: var(--brand); padding: 8px 15px; border-radius: 20px; font-size: 12px; white-space: nowrap; border: none; font-weight: bold; }

        footer { padding: 10px; display: flex; border-top: 1px solid #eee; background: white; }
        .nav-item { flex: 1; background: none; border: none; color: #667781; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
        .nav-item.active { color: var(--brand); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: bold; }

        /* الكاميرا */
        #qr-view { position: fixed; inset: 0; background: black; z-index: 9999; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 5000; }
        .modal-content { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; }
    </style>
</head>
<body id="body-el">

<div id="qr-view">
    <button onclick="stopScan()" style="position:absolute; top:30px; left:20px; z-index:10; padding:10px 20px; background:red; color:white; border:none; border-radius:10px;">إغلاق</button>
    <video id="video"></video>
</div>

<div class="app-shell">
    <header>
        <div class="logo-box">
            <img src="whatsapp-icon.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968841.png'">
            <h1 id="t-title">دردشة مباشرة</h1>
        </div>
        <button onclick="toggleLang()" id="lang-btn" style="background:#eee; border:none; padding:5px 12px; border-radius:15px; font-size:12px; font-weight:bold;">English</button>
    </header>

    <main>
        <div class="search-wrap">
            <label id="t-search">ابحث عن الدولة</label>
            <input type="text" id="countrySearch" placeholder="السعودية، مصر، 966...">
            <div id="results" class="res-list"></div>
        </div>

        <div>
            <label id="t-phone">رقم الجوال</label>
            <div class="phone-row">
                <div class="code-input-wrap">
                    <div class="flag-box" id="flagDiv"><span class="flag-icon flag-icon-sd"></span></div>
                    <span style="margin: 0 2px;">+</span>
                    <input type="tel" id="dialCode" value="249">
                </div>
                <div class="number-input-wrap">
                    <input type="tel" id="phoneNum" placeholder="500000000">
                </div>
            </div>
        </div>

        <div class="msg-wrap">
            <label id="t-msg">الرسالة</label>
            <textarea id="msgBody"></textarea>
            <div class="sugs" id="sugBox"></div>
        </div>

        <button class="btn btn-main" onclick="sendWA()">
            <span id="t-btn1">بدء المراسلة</span> <i class="fas fa-paper-plane"></i>
        </button>

        <button class="btn btn-qr" onclick="startScan()">
            <i class="fas fa-qrcode"></i> <span id="t-btn2">مسح باركود</span>
        </button>

        <button id="pwaBtn" class="btn btn-install" onclick="installApp()">
            <i class="fas fa-download"></i> <span id="t-btn3">تثبيت التطبيق</span>
        </button>
    </main>

    <div id="hModal" class="modal" onclick="closeH()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="t-h" style="margin-bottom:15px;">السجل</h3>
            <div id="hItems"></div>
            <button onclick="closeH()" style="width:100%; padding:12px; margin-top:15px; border:none; border-radius:10px;">إغلاق</button>
        </div>
    </div>

    <footer>
        <button class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><span id="n1">الرئيسية</span></button>
        <button class="nav-item" onclick="openH()"><i class="fas fa-history"></i><span id="n2">السجل</span></button>
        <a href="https://linktr.ee/abdul3ziz95" class="nav-item" style="text-decoration:none;"><i class="fas fa-headset"></i><span id="n3">الدعم</span></a>
        <button class="nav-item" onclick="shareApp()"><i class="fas fa-share-nodes"></i><span id="n4">مشاركة</span></button>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    let countries = [];
    let curLang = 'ar';
    const codeReader = new ZXing.BrowserMultiFormatReader();

    async function start() {
        const r = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,translations');
        const d = await r.json();
        countries = d.map(c => ({
            ar: c.translations.ara ? c.translations.ara.common : c.name.common,
            en: c.name.common,
            code: c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : ""),
            flag: c.cca2.toLowerCase()
        })).sort((a,b) => a.ar.localeCompare(b.ar));
        
        // ربط العلم بالكتابة اليدوية
        document.getElementById('dialCode').oninput = (e) => {
            const val = e.target.value.replace('+', '');
            const found = countries.find(c => c.code.replace('+', '') === val);
            if(found) document.getElementById('flagDiv').innerHTML = `<span class="flag-icon flag-icon-${found.flag}"></span>`;
        };

        updateUI();
    }

    document.getElementById('countrySearch').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        const res = document.getElementById('results');
        res.innerHTML = '';
        if(!v) { res.style.display='none'; return; }
        const filtered = countries.filter(c => c.ar.includes(v) || c.en.toLowerCase().includes(v) || c.code.includes(v));
        if(filtered.length > 0) {
            res.style.display='block';
            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'res-item';
                div.innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span> ${curLang=='ar'?c.ar:c.en} (${c.code})`;
                div.onclick = () => { 
                    document.getElementById('dialCode').value = c.code.replace('+','');
                    document.getElementById('flagDiv').innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span>`;
                    res.style.display='none';
                };
                res.appendChild(div);
            });
        }
    };

    function toggleLang() {
        curLang = curLang === 'ar' ? 'en' : 'ar';
        document.getElementById('body-el').dir = curLang === 'ar' ? 'rtl' : 'ltr';
        updateUI();
    }

    function updateUI() {
        const ui = {
            ar: ["دردشة مباشرة", "ابحث عن الدولة", "رقم الجوال", "الرسالة", "بدء المراسلة", "مسح باركود", "تثبيت التطبيق", "الرئيسية", "السجل", "الدعم", "مشاركة", "English", "السلام عليكم", "السجل الأخير"],
            en: ["Direct Chat", "Search Country", "Phone Number", "Message", "Start Chat", "Scan QR", "Install App", "Home", "History", "Support", "Share", "العربية", "Hello", "Recent History"]
        };
        const L = ui[curLang];
        document.getElementById('t-title').innerText = L[0];
        document.getElementById('t-search').innerText = L[1];
        document.getElementById('t-phone').innerText = L[2];
        document.getElementById('t-msg').innerText = L[3];
        document.getElementById('t-btn1').innerText = L[4];
        document.getElementById('t-btn2').innerText = L[5];
        document.getElementById('t-btn3').innerText = L[6];
        document.getElementById('n1').innerText = L[7];
        document.getElementById('n2').innerText = L[8];
        document.getElementById('n3').innerText = L[9];
        document.getElementById('n4').innerText = L[10];
        document.getElementById('lang-btn').innerText = L[11];
        document.getElementById('msgBody').value = L[12];
        document.getElementById('t-h').innerText = L[13];

        const sBox = document.getElementById('sugBox');
        sBox.innerHTML = '';
        const s = curLang === 'ar' ? ["السلام عليكم", "بكم السعر؟", "الموقع لو سمحت"] : ["Hi", "Price?", "Location please"];
        s.forEach(txt => {
            const b = document.createElement('button'); b.className='chip'; b.innerText=txt;
            b.onclick = () => document.getElementById('msgBody').value = txt;
            sBox.appendChild(b);
        });
    }

    function sendWA() {
        const c = document.getElementById('dialCode').value.replace(/\D/g,'');
        const n = document.getElementById('phoneNum').value.replace(/\D/g,'');
        if(n.length > 5) {
            const full = c + n;
            let h = JSON.parse(localStorage.getItem('h_v8') || '[]');
            if(!h.includes(full)) { h.unshift(full); localStorage.setItem('h_v8', JSON.stringify(h.slice(0,10))); }
            window.location.href = `https://wa.me/${full}?text=${encodeURIComponent(document.getElementById('msgBody').value)}`;
        }
    }

    function startScan() {
        document.getElementById('qr-view').style.display='block';
        codeReader.decodeFromVideoDevice(null, 'video', (res) => {
            if(res) {
                stopScan();
                const text = res.text;
                if(text.includes('wa.me/')) { window.location.href = text; }
                else { document.getElementById('phoneNum').value = text.replace(/\D/g,''); }
            }
        });
    }
    function stopScan() { codeReader.reset(); document.getElementById('qr-view').style.display='none'; }

    function openH() {
        const list = document.getElementById('hItems'); list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('h_v8') || '[]');
        h.forEach(num => {
            const d = document.createElement('div'); d.className='res-item';
            d.innerHTML = `<b>+${num}</b>`;
            d.onclick = () => { document.getElementById('phoneNum').value = num; closeH(); };
            list.appendChild(d);
        });
        document.getElementById('hModal').style.display='flex';
    }
    function closeH() { document.getElementById('hModal').style.display='none'; }

    let promptEvt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); promptEvt = e; document.getElementById('pwaBtn').style.display='flex'; });
    function installApp() { if(promptEvt) promptEvt.prompt(); }

    function shareApp() { navigator.share({title:'دردشة مباشرة', url:location.href}); }
    window.onload = start;
</script>
</body>
</html>
