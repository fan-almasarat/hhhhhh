<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>واتساب برو | المراسلة المباشرة</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- القسم الأول: التنسيق العام والرموز --- */
        :root {
            --brand-color: #00a884;
            --dark-color: #111b21;
            --bg-color: #f0f2f5;
            --white: #ffffff;
            --gray: #667781;
            --accent-blue: #0072ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--dark-color); height: 100vh; overflow: hidden; }

        .app-wrapper {
            max-width: 500px; margin: 0 auto; background: var(--white);
            height: 100%; display: flex; flex-direction: column; position: relative;
        }

        /* --- الهيدر --- */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; background: var(--white); border-bottom: 1px solid #eee;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .header-brand img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
        .header-brand h1 { font-size: 18px; font-weight: 800; }

        /* --- الحاويات --- */
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 700; color: var(--gray); margin-right: 5px; }

        /* حقل الهاتف المطور */
        .phone-input-container { display: flex; gap: 10px; align-items: center; }
        .country-box {
            display: flex; align-items: center; background: var(--bg-color);
            border-radius: 15px; padding: 0 12px; width: 115px; height: 60px; flex-shrink: 0;
        }
        .dial-input {
            width: 100%; border: none; background: transparent; font-weight: 800;
            font-size: 18px; text-align: center; outline: none;
        }
        .number-input {
            flex: 1; height: 60px; background: var(--bg-color); border-radius: 15px;
            border: 2px solid transparent; padding: 0 15px; font-size: 20px; font-weight: 800; outline: none;
        }
        .number-input:focus { border-color: var(--brand-color); background: #fff; }

        /* الرسالة */
        .message-area {
            width: 100%; min-height: 100px; background: var(--bg-color);
            border-radius: 15px; border: none; padding: 15px; font-size: 16px; outline: none; resize: none;
        }

        /* الأزرار */
        .btn {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            font-size: 17px; font-weight: 900; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .btn-send { background: var(--brand-color); color: #fff; }
        .btn-qr { background: var(--dark-color); color: #fff; }
        
        .btn-install {
            background: linear-gradient(45deg, var(--accent-blue), #00d2ff);
            color: white; display: none; animation: pulse 2s infinite; margin-top: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 114, 255, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 12px rgba(0, 114, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 114, 255, 0); }
        }

        /* --- واجهة الباركود (WhatsApp Look) --- */
        #scanner-ui {
            position: fixed; inset: 0; background: #000; z-index: 5000; display: none;
        }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .cutout {
            width: 260px; height: 260px; border: 4px solid #fff; border-radius: 30px;
            position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
        }
        .laser {
            position: absolute; width: 100%; height: 3px; background: var(--brand-color);
            top: 0; animation: scanning 2s linear infinite; box-shadow: 0 0 15px var(--brand-color);
        }
        @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }

        /* --- مودال السجل --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;
            display: none; align-items: flex-end;
        }
        .modal-content {
            width: 100%; background: #fff; border-radius: 25px 25px 0 0;
            padding: 25px; max-height: 70%; overflow-y: auto;
        }
        .history-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; cursor: pointer;
        }

        /* --- الفوتر --- */
        footer {
            background: #fff; padding: 12px; border-top: 1px solid #eee;
            display: flex; justify-content: space-around;
        }
        .nav-link {
            border: none; background: none; color: var(--gray);
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer;
        }
        .nav-link.active { color: var(--brand-color); }

        body.en { direction: ltr; }
    </style>
</head>
<body id="main-body">

<div id="scanner-ui">
    <video id="video-preview"></video>
    <div class="scan-frame">
        <button onclick="stopScan()" style="position:absolute; top:40px; left:20px; border:none; background:rgba(255,255,255,0.3); color:#fff; padding:10px 20px; border-radius:30px; font-weight:bold;">إغلاق</button>
        <div class="cutout"><div class="laser"></div></div>
        <p style="color:#fff; margin-top:30px; font-weight:bold;">ضع رمز الواتساب داخل المربع</p>
    </div>
</div>

<div class="app-wrapper">
    <header>
        <div class="header-brand">
            <img src="whatsapp-icon.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968841.png'">
            <h1>دردشة مباشرة</h1>
        </div>
        <button onclick="toggleLang()" style="border:none; background:var(--bg-color); padding:8px 15px; border-radius:15px; font-weight:bold;">EN</button>
    </header>

    <main>
        <div class="form-group">
            <label>البحث عن الدولة</label>
            <input type="text" id="countrySearch" class="number-input" style="font-size:16px; height:50px;" placeholder="ابحث باسم الدولة...">
        </div>

        <div class="form-group">
            <label>رقم الجوال</label>
            <div class="phone-input-container">
                <div class="country-box">
                    <span id="flagIcon" class="flag-icon flag-icon-sd" style="font-size:20px;"></span>
                    <span style="font-weight:900; margin:0 5px;">+</span>
                    <input type="tel" id="dialCode" class="dial-input" value="249">
                </div>
                <input type="tel" id="phoneNum" class="number-input" placeholder="ادخل الرقم">
            </div>
        </div>

        <div class="form-group">
            <label>الرسالة</label>
            <textarea id="msg" class="message-area">السلام عليكم</textarea>
        </div>

        <button class="btn btn-send" onclick="launchWhatsApp()">إرسال الآن <i class="fas fa-paper-plane"></i></button>
        <button class="btn btn-dark" onclick="startScan()">مسح باركود <i class="fas fa-qrcode"></i></button>
        <button id="installBtn" class="btn btn-install" onclick="installPWA()">تثبيت التطبيق <i class="fas fa-download"></i></button>
    </main>

    <div id="historyModal" class="modal" onclick="closeHistory()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="text-align:center; margin-bottom:20px;">آخر الأرقام</h3>
            <div id="historyList"></div>
            <button onclick="closeHistory()" style="width:100%; padding:15px; margin-top:15px; border:none; border-radius:15px; background:var(--bg-color);">إغلاق</button>
        </div>
    </div>

    <footer>
        <button class="nav-link active" onclick="location.reload()"><i class="fas fa-house"></i><span>الرئيسية</span></button>
        <button class="nav-link" onclick="openHistory()"><i class="fas fa-history"></i><span>السجل</span></button>
        <button class="nav-link" onclick="shareApp()"><i class="fas fa-share-nodes"></i><span>مشاركة</span></button>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let countries = [];

    // 1. التحديد التلقائي للدولة والمفتاح
    async function init() {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,cca2,translations');
        const data = await res.json();
        countries = data.map(c => ({
            name: c.translations.ara?.common || c.name.common,
            code: (c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "")).replace('+', ''),
            flag: c.cca2.toLowerCase()
        }));

        try {
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            document.getElementById('dialCode').value = geo.country_calling_code.replace('+', '');
            document.getElementById('flagIcon').className = `flag-icon flag-icon-${geo.country_code.toLowerCase()}`;
        } catch(e) {}

        // تغيير العلم عند كتابة المفتاح يدوياً
        document.getElementById('dialCode').oninput = (e) => {
            const val = e.target.value.trim();
            const found = countries.find(c => c.code === val);
            if(found) document.getElementById('flagIcon').className = `flag-icon flag-icon-${found.flag}`;
        };
    }

    // 2. مسح الباركود (مثل واتساب)
    function startScan() {
        document.getElementById('scanner-ui').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video-preview', (result) => {
            if (result) {
                let text = result.text;
                let extractedNum = text.includes('wa.me/') ? text.split('wa.me/')[1].split('?')[0] : text.replace(/\D/g, '');
                document.getElementById('phoneNum').value = extractedNum;
                stopScan();
            }
        });
    }
    function stopScan() { codeReader.reset(); document.getElementById('scanner-ui').style.display = 'none'; }

    // 3. السجل (History)
    function launchWhatsApp() {
        const dial = document.getElementById('dialCode').value;
        const num = document.getElementById('phoneNum').value;
        const full = dial + num;
        if(num.length < 5) return alert("الرقم ناقص!");
        
        let h = JSON.parse(localStorage.getItem('chat_history') || '[]');
        if(!h.includes(full)) { h.unshift(full); localStorage.setItem('chat_history', JSON.stringify(h.slice(0,10))); }
        
        window.location.href = `https://wa.me/${full}?text=${encodeURIComponent(document.getElementById('msg').value)}`;
    }

    function openHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('chat_history') || '[]');
        if(h.length === 0) list.innerHTML = '<p style="text-align:center; color:gray;">لا يوجد سجل بعد</p>';
        h.forEach(n => {
            const d = document.createElement('div'); d.className = 'history-card';
            d.innerHTML = `<span>+${n}</span><i class="fab fa-whatsapp" style="color:#00a884; font-size:20px;"></i>`;
            d.onclick = () => { document.getElementById('phoneNum').value = n; closeHistory(); };
            list.appendChild(d);
        });
        document.getElementById('historyModal').style.display = 'flex';
    }
    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

    // 4. التثبيت (PWA)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'flex';
    });
    function installPWA() {
        if(deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBtn').style.display = 'none'; });
        }
    }

    function shareApp() { navigator.share({title: 'دردشة مباشرة', url: location.href}); }
    window.onload = init;
</script>
</body>
</html>
