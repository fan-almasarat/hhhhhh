<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة مباشرة | Direct Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #f0f7f2; font-family: 'Tajawal', sans-serif; color: #1c1e21; }
        
        /* تأثيرات الحقول */
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .input-box { border: 1.5px solid #e1e4e8; border-radius: 12px; padding: 14px; transition: 0.3s; outline: none; width: 100%; text-align: center; font-weight: bold; }
        .input-box:focus { border-color: #25D366; box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.1); }
        
        /* تخصيص قائمة الدول */
        .iti { width: 100%; }
        .iti__selected-flag { background: #f8f9fa !important; border-radius: 12px !important; border: 1.5px solid #e1e4e8 !important; }
        .iti__country-list { background: white !important; border-radius: 15px; border: none; box-shadow: 0 15px 50px rgba(0,0,0,0.15); z-index: 1000; }
        .iti__search-input { padding: 12px !important; margin: 8px !important; border-radius: 10px !important; text-align: inherit; }

        /* زر التثبيت المطور */
        .install-float {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1a73e8; color: white; padding: 12px 25px;
            border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3);
            display: flex; align-items: center; gap: 10px; transition: 0.3s; z-index: 100;
        }
        .install-float:hover { transform: translateX(-50%) translateY(-3px); background: #1557b0; }

        /* أزرار المشاركة */
        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .s-btn { padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .s-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 pb-24">

    <button class="install-float" id="btn-install-app">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span id="txt-install">تثبيت التطبيق الاحترافي</span>
    </button>

    <div class="w-full max-w-lg card p-8 space-y-8 relative">
        <button onclick="toggleLang()" class="absolute top-4 left-4 text-sm font-bold text-blue-600 hover:bg-blue-50 px-3 py-1 rounded-lg transition" id="lang-btn">English</button>

        <div class="text-center">
            <h1 id="txt-header" class="text-3xl font-bold text-[#128c7e]">دردشة مباشرة</h1>
            <p id="txt-sub" class="text-gray-500 text-sm mt-3">تواصل مباشرة مع أي رقم واتساب دون حفظه.</p>
        </div>

        <div class="space-y-5">
            <div>
                <label id="txt-label-select" class="text-xs font-bold text-gray-400 mb-2 block mr-1 uppercase tracking-wider">اختر الدولة أو ابحث عنها:</label>
                <div dir="ltr">
                    <input type="tel" id="country-search" class="input-box text-blue-600">
                </div>
            </div>

            <div class="flex gap-3" dir="ltr">
                <div class="w-1/3 group">
                    <label id="txt-label-code" class="text-right text-[10px] font-bold text-gray-400 mb-2 block mr-1 uppercase" dir="rtl">الرمز:</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-3 text-green-600 font-bold">+</span>
                        <input type="number" id="manual-code" value="966" class="input-box pl-7 pr-2 border-green-200 bg-green-50/30 text-green-700">
                    </div>
                </div>
                <div class="w-2/3">
                    <label id="txt-label-num" class="text-right text-[10px] font-bold text-gray-400 mb-2 block mr-1 uppercase" dir="rtl">الرقم المحلي:</label>
                    <input type="number" id="phone-main" placeholder="50xxxxxxx" class="input-box">
                </div>
            </div>

            <button onclick="startChat()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-white py-5 rounded-2xl font-bold text-xl shadow-lg shadow-green-200 transition-all active:scale-95 flex items-center justify-center gap-3">
                <span id="txt-start">بدء المحادثة الآن</span>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </button>
        </div>

        <div class="pt-6 border-t border-gray-100">
            <p id="txt-share" class="text-center text-[11px] font-bold text-gray-400 mb-4 uppercase">شارك التطبيق مع أصدقائك:</p>
            <div class="social-grid">
                <a href="#" class="s-btn bg-[#25D366]">WhatsApp</a>
                <a href="#" class="s-btn bg-[#3b5998]">Facebook</a>
                <a href="#" class="s-btn bg-[#1DA1F2]">Twitter</a>
            </div>
        </div>

        <div class="text-center text-[11px] text-gray-400 pt-4">
            <p id="txt-footer">📞 اتصل بي - جميع الحقوق محفوظة © 2026</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script>
        const countryInput = document.querySelector("#country-search");
        const manualCode = document.querySelector("#manual-code");
        const phoneMain = document.querySelector("#phone-main");
        const htmlTag = document.getElementById("main-html");

        let currentLang = 'ar';
        const arCountries = { "sa": "السعودية", "eg": "مصر", "sd": "السودان", "ae": "الإمارات", "kw": "الكويت", "qa": "قطر", "jo": "الأردن", "ps": "فلسطين", "iq": "العراق", "ye": "اليمن", "ma": "المغرب", "dz": "الجزائر" };

        const translations = {
            ar: {
                header: "دردشة مباشرة", sub: "تواصل مباشرة مع أي رقم واتساب دون حفظه.",
                install: "تثبيت التطبيق الاحترافي", select: "اختر الدولة أو ابحث عنها:",
                code: "الرمز:", num: "الرقم المحلي:", start: "بدء المحادثة الآن",
                share: "شارك التطبيق مع أصدقائك:", footer: "📞 اتصل بي - جميع الحقوق محفوظة © 2026", search: "بحث عن دولة..."
            },
            en: {
                header: "Direct Chat", sub: "Connect with any WhatsApp number without saving it.",
                install: "Install Pro App", select: "Select or search country:",
                code: "Code:", num: "Local Number:", start: "Start Chat Now",
                share: "Share with your friends:", footer: "📞 Contact Me - All Rights Reserved © 2026", search: "Search country..."
            }
        };

        // تهيئة المكتبة
        const iti = window.intlTelInput(countryInput, {
            initialCountry: "sa",
            countrySearch: true,
            i18n: { searchPlaceholder: "بحث عن دولة...", ...arCountries },
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        // 1. عند اختيار دولة من القائمة: تحديث حقل الرمز
        countryInput.addEventListener("countrychange", function() {
            const data = iti.getSelectedCountryData();
            manualCode.value = data.dialCode;
            countryInput.value = data.name + " (+" + data.dialCode + ")";
        });

        // 2. عند كتابة الرمز يدوياً: تحديث العلم تلقائياً
        manualCode.addEventListener("input", function() {
            const val = this.value;
            const allCountries = iti.getCountryData();
            const found = allCountries.find(c => c.dialCode === val);
            if (found) {
                iti.setCountry(found.iso2);
                countryInput.value = found.name + " (+" + found.dialCode + ")";
            }
        });

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const t = translations[currentLang];
            htmlTag.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').innerText = currentLang === 'ar' ? 'English' : 'العربية';
            
            document.getElementById('txt-header').innerText = t.header;
            document.getElementById('txt-sub').innerText = t.sub;
            document.getElementById('txt-install').innerText = t.install;
            document.getElementById('txt-label-select').innerText = t.select;
            document.getElementById('txt-label-code').innerText = t.code;
            document.getElementById('txt-label-num').innerText = t.num;
            document.getElementById('txt-start').innerText = t.start;
            document.getElementById('txt-share').innerText = t.share;
            document.getElementById('txt-footer').innerText = t.footer;

            iti.setOptions({ i18n: { searchPlaceholder: t.search, ...(currentLang === 'ar' ? arCountries : {}) } });
        }

        function startChat() {
            const code = manualCode.value;
            let num = phoneMain.value;
            if (!code || !num) return alert(currentLang === 'ar' ? "يرجى إكمال البيانات" : "Please complete data");
            if (num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${code}${num}`, '_blank');
        }

        // قيمة افتراضية عند التحميل
        setTimeout(() => {
            const data = iti.getSelectedCountryData();
            countryInput.value = data.name + " (+" + data.dialCode + ")";
        }, 500);
    </script>
</body>
</html>
