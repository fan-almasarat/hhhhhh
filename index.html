<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة مباشرة - التفاعل الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #e4f5e9; font-family: 'Tajawal', sans-serif; }
        .main-card { background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 30px; position: relative; }
        
        /* تنسيق القائمة المنسدلة للبحث */
        .search-container { position: relative; width: 100%; }
        .dropdown-list { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #ddd; border-radius: 8px; 
            max-height: 200px; overflow-y: auto; z-index: 50; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .dropdown-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .dropdown-item:hover { background: #f0fdf4; }

        .input-style { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; text-align: center; font-weight: bold; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #25D366; }

        .dial-input-group { display: flex; align-items: center; background: #f1f3f4; border: 1.5px solid #ddd; border-radius: 10px; padding: 0 12px; width: 120px; }
        .dial-input-group input { background: transparent; border: none; width: 100%; text-align: center; font-weight: bold; outline: none; padding: 12px 0; }

        .btn-send { background: #4cd964; color: white; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; transition: 0.3s; }
        .btn-send:hover { background: #3ec455; transform: translateY(-2px); }

        .install-footer { position: fixed; bottom: 20px; background: #1a73e8; color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="main-card">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-[#1d4d38]">دردشة مباشرة</h1>
            <p class="text-gray-400 text-[11px] mt-1">ابحث عن الدولة أو اكتب المفتاح يدوياً</p>
        </div>

        <div class="mb-6 search-container">
            <label class="text-xs font-bold text-gray-500 mb-2 block text-center">اختر الدولة أو ابحث عنها:</label>
            <input type="text" id="country-search" class="input-style" placeholder="اكتب اسم الدولة هنا..." onfocus="showDropdown()" oninput="filterCountries()">
            <div id="dropdown" class="dropdown-list"></div>
        </div>

        <div class="flex gap-3 items-end mb-8" dir="ltr">
            <div class="flex flex-col items-center gap-1">
                <label class="text-[10px] font-bold text-gray-400" dir="rtl">الرمز</label>
                <div class="dial-input-group">
                    <img id="flag-img" src="https://flagcdn.com/w40/sa.png" class="w-6 shadow-sm">
                    <span class="text-green-600 font-bold ml-1">+</span>
                    <input type="number" id="manual-code" value="966" oninput="syncByCode()">
                </div>
            </div>

            <div class="flex-1">
                <label class="text-[10px] font-bold text-gray-400 mb-1 block text-right" dir="rtl">الرقم المحلي</label>
                <input type="number" id="phone-num" placeholder="50xxxxxxx" class="input-style">
            </div>
        </div>

        <button onclick="launchWhatsApp()" class="btn-send">بدء المحادثة الآن</button>

        <div class="mt-8 flex justify-center gap-4 border-t pt-6">
            <div class="text-[10px] text-gray-400 italic">نظام التزامن الثنائي الذكي 2026</div>
        </div>
    </div>

    <div class="install-footer" onclick="alert('جاري التثبيت...')">📲 تثبيت التطبيق المتطور</div>

    <script>
        const countries = [
            { n: "المملكة العربية السعودية", c: "966", i: "sa" },
            { n: "مصر", c: "20", i: "eg" },
            { n: "السودان", c: "249", i: "sd" },
            { n: "الإمارات العربية المتحدة", c: "971", i: "ae" },
            { n: "الكويت", c: "965", i: "kw" },
            { n: "قطر", c: "974", i: "qa" },
            { n: "الأردن", c: "962", i: "jo" },
            { n: "سلطنة عمان", c: "968", i: "om" },
            { n: "البحرين", c: "973", i: "bh" },
            { n: "العراق", c: "964", i: "iq" },
            { n: "اليمن", c: "967", i: "ye" },
            { n: "المغرب", c: "212", i: "ma" },
            { n: "تركيا", c: "90", i: "tr" }
        ];

        const searchInput = document.getElementById('country-search');
        const dropdown = document.getElementById('dropdown');
        const manualCode = document.getElementById('manual-code');
        const flagImg = document.getElementById('flag-img');

        // إظهار القائمة
        function showDropdown() { dropdown.style.display = 'block'; renderList(countries); }

        // البحث وتصفية الدول
        function filterCountries() {
            const term = searchInput.value.toLowerCase();
            const filtered = countries.filter(c => c.n.includes(term) || c.c.includes(term));
            renderList(filtered);
        }

        // بناء القائمة
        function renderList(list) {
            dropdown.innerHTML = list.map(c => `
                <div class="dropdown-item" onclick="selectCountry('${c.n}', '${c.c}', '${c.i}')">
                    <span>${c.n}</span>
                    <span class="text-green-600 font-bold">+${c.c}</span>
                </div>
            `).join('');
        }

        // عند اختيار دولة من القائمة (تحديث المفتاح والعلم)
        function selectCountry(name, code, iso) {
            searchInput.value = name;
            manualCode.value = code;
            flagImg.src = `https://flagcdn.com/w40/${iso}.png`;
            dropdown.style.display = 'none';
        }

        // عند كتابة المفتاح يدوياً (تحديث البحث والعلم)
        function syncByCode() {
            const code = manualCode.value;
            const found = countries.find(c => c.c === code);
            if (found) {
                searchInput.value = found.n;
                flagImg.src = `https://flagcdn.com/w40/${found.i}.png`;
            } else {
                searchInput.value = "دولة غير معروفة";
            }
        }

        function launchWhatsApp() {
            const code = manualCode.value;
            let num = document.getElementById('phone-num').value;
            if(!code || !num) return alert("أدخل البيانات كاملة!");
            if(num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${code}${num}`, '_blank');
        }

        // إغلاق القائمة عند الضغط خارجها
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) dropdown.style.display = 'none';
        });

        // القيمة الافتراضية
        window.onload = () => { searchInput.value = countries[0].n; };
    </script>
</body>
</html>
