<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Multi-Lang Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Inter:wght@400;700&display=swap');
        :root { --green: #25D366; --dark-bg: #0b141a; --card-bg: #111b21; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Tajawal', 'Inter', sans-serif; transition: all 0.3s ease; }
        
        /* تخصيص مكتبة الدول لتظهر بشكل احترافي */
        .iti { width: 100%; }
        .iti__country-list { 
            background-color: var(--card-bg) !important; 
            border: 1px solid #2a3942 !important; 
            color: white !important;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin-top: 10px;
        }
        .iti__search-input {
            background-color: #202c33 !important;
            color: white !important;
            border: 1px solid #3b4a54 !important;
            padding: 12px !important;
            border-radius: 12px !important;
        }
        .iti__country:hover { background-color: #2a3942 !important; }
        .iti__selected-flag { background-color: #202c33 !important; border-radius: 15px 0 0 15px !important; }

        /* ستايل المدخلات */
        input, textarea {
            background: #2a3942 !important;
            border: 1px solid #3b4a54 !important;
            color: white !important;
            border-radius: 18px !important;
        }
        .btn-green { background: var(--green); color: black; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-8 rounded-[2.5rem] border border-white/5 relative shadow-2xl">
        
        <div class="absolute top-6 left-6" id="lang-toggle-container">
            <button onclick="toggleLanguage()" class="bg-[#202c33] px-4 py-2 rounded-full text-xs font-bold border border-white/10 hover:bg-white/10 transition">
                <span id="lang-text">English</span>
            </button>
        </div>

        <div class="text-center mb-10 mt-6">
            <div class="bg-green-500/10 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </div>
            <h2 id="title" class="text-2xl font-bold tracking-tight">واتساب المباشر</h2>
            <p id="subtitle" class="text-gray-400 text-sm mt-2">تواصل مع أي رقم في العالم بذكاء</p>
        </div>

        <div class="space-y-6">
            <div dir="ltr">
                <label id="label-phone" class="block text-[11px] font-bold mb-2 text-gray-500 uppercase tracking-widest text-right">رقم الهاتف</label>
                <input type="tel" id="phone" class="w-full p-5 outline-none font-bold text-lg">
            </div>

            <div>
                <label id="label-msg" class="block text-[11px] font-bold mb-2 text-gray-500 uppercase tracking-widest">الرسالة (اختياري)</label>
                <textarea id="message" rows="3" class="w-full p-5 outline-none text-sm resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="sendWhatsApp()" class="w-full btn-green py-5 rounded-2xl font-bold text-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                <span id="btn-text">إرسال الآن</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        const phoneInputTag = document.querySelector("#phone");

        // تهيئة المكتبة مع خيار البحث المدمج تلقائياً
        const iti = window.intlTelInput(phoneInputTag, {
            initialCountry: "sa",
            separateDialCode: true,
            showSelectedDialCode: true,
            allowDropdown: true,
            // تفعيل ميزة البحث (Search)
            countrySearch: true, 
            preferredCountries: ["sa", "eg", "ae", "kw"],
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        const translations = {
            ar: {
                title: "واتساب المباشر",
                subtitle: "تواصل مع أي رقم في العالم بذكاء",
                labelPhone: "رقم الهاتف",
                labelMsg: "الرسالة (اختياري)",
                placeholderMsg: "اكتب رسالتك هنا...",
                btn: "إرسال الآن",
                langBtn: "English",
                alert: "يرجى إدخال رقم صحيح"
            },
            en: {
                title: "Direct WhatsApp",
                subtitle: "Contact any number worldwide smartly",
                labelPhone: "Phone Number",
                labelMsg: "Message (Optional)",
                placeholderMsg: "Type your message here...",
                btn: "Send Now",
                langBtn: "العربية",
                alert: "Please enter a valid number"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const html = document.getElementById('html-tag');
            const t = translations[currentLang];

            // تغيير الاتجاه والنصوص
            html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('title').innerText = t.title;
            document.getElementById('subtitle').innerText = t.subtitle;
            document.getElementById('label-phone').innerText = t.labelPhone;
            document.getElementById('label-msg').innerText = t.labelMsg;
            document.getElementById('message').placeholder = t.placeholderMsg;
            document.getElementById('btn-text').innerText = t.btn;
            document.getElementById('lang-text').innerText = t.langBtn;

            // ضبط محاذاة العناوين
            document.getElementById('label-phone').style.textAlign = currentLang === 'ar' ? 'right' : 'left';
            
            // تحديث قائمة الدول لتظهر أسماء الدول باللغة المختارة
            iti.setOptions({ i18n: currentLang }); 
        }

        function sendWhatsApp() {
            const number = iti.getNumber();
            const msg = encodeURIComponent(document.getElementById('message').value);
            
            if (!iti.isValidNumber()) {
                alert(translations[currentLang].alert);
                return;
            }

            window.open(`https://wa.me/${number.replace('+', '')}?text=${msg}`, '_blank');
        }
    </script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
