<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Smart Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #0b141a; color: white; font-family: 'Tajawal', sans-serif; overflow: hidden; }
        .app-card { background: #111b21; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { background: #2a3942; border: 1px solid #3b4a54; border-radius: 15px; }
        .search-dropdown { display: none; position: absolute; top: 100%; right: 0; width: 100%; max-height: 250px; background: #202c33; border: 1px solid #3b4a54; z-index: 100; overflow-y: auto; border-radius: 12px; margin-top: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .search-dropdown.active { display: block; }
        .country-row { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .country-row:hover { background: #2a3942; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md app-card p-6 rounded-[2rem] shadow-2xl border border-white/5">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-[#25D366]">واتساب المباشر الذكي</h1>
            <p class="text-gray-400 text-[10px] mt-1 uppercase tracking-widest">تغيير تلقائي للعلم والبحث بالعربي</p>
        </div>

        <div class="space-y-5">
            <div class="relative">
                <label class="text-[10px] font-bold text-gray-500 uppercase mr-1">رقم الهاتف</label>
                <div class="input-group flex items-center mt-1 p-1 overflow-visible" dir="ltr">
                    <div class="px-3 border-r border-[#3b4a54] cursor-pointer" onclick="toggleSearch()">
                        <span id="flag-display" class="text-2xl">🇸🇦</span>
                    </div>
                    <div class="flex items-center text-[#25D366] font-bold px-2">
                        <span>+</span>
                        <input type="number" id="dial-code" value="966" class="w-14 bg-transparent outline-none text-center text-lg" oninput="codeToFlag()">
                    </div>
                    <input type="number" id="phone-input" placeholder="50xxxxxxx" class="flex-1 bg-transparent p-3 outline-none text-lg text-white">
                </div>

                <div id="dropdown" class="search-dropdown" dir="rtl">
                    <input type="text" id="search-box" placeholder="بحث باسم الدولة (مثلاً: السودان)..." class="w-full p-3 bg-[#111b21] border-none text-sm outline-none sticky top-0" oninput="filterData()">
                    <div id="list-items"></div>
                </div>
            </div>

            <div class="text-right">
                <label class="text-[10px] font-bold text-gray-500 uppercase mr-1">الرسالة</label>
                <textarea id="msg-text" rows="2" class="w-full input-group p-4 mt-1 text-sm outline-none resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="launch()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-black py-4 rounded-xl font-bold text-lg transition-transform active:scale-95">
                مراسلة الآن
            </button>
        </div>
    </div>

    <script>
        // قاعدة بيانات كاملة لأهم الدول (يمكنك إضافة المزيد بنفس النمط)
        const data = [
            {n:"السعودية", c:"966", f:"🇸🇦"}, {n:"مصر", c:"20", f:"🇪🇬"},
            {n:"السودان", c:"249", f:"🇸🇩"}, {n:"الإمارات", c:"971", f:"🇦🇪"},
            {n:"الكويت", c:"965", f:"🇰🇼"}, {n:"قطر", c:"974", f:"🇶🇦"},
            {n:"عمان", c:"968", f:"🇴🇲"}, {n:"البحرين", c:"973", f:"🇧🇭"},
            {n:"الأردن", c:"962", f:"🇯🇴"}, {n:"العراق", c:"964", f:"🇮🇶"},
            {n:"اليمن", c:"967", f:"🇾🇪"}, {n:"سوريا", c:"963", f:"🇸🇾"},
            {n:"لبنان", c:"961", f:"🇱🇧"}, {n:"فلسطين", c:"970", f:"🇵🇸"},
            {n:"المغرب", c:"212", f:"🇲🇦"}, {n:"تونس", c:"216", f:"🇹🇳"},
            {n:"الجزائر", c:"213", f:"🇩🇿"}, {n:"ليبيا", c:"218", f:"🇱🇾"},
            {n:"تركيا", c:"90", f:"🇹🇷"}, {n:"بريطانيا", c:"44", f:"🇬🇧"},
            {n:"أمريكا", c:"1", f:"🇺🇸"}
        ];

        const flagDisp = document.getElementById('flag-display');
        const dialInput = document.getElementById('dial-code');
        const listItems = document.getElementById('list-items');
        const dropdown = document.getElementById('dropdown');

        function renderList(list) {
            listItems.innerHTML = list.map(i => `
                <div class="country-row" onclick="selectCountry('${i.f}', '${i.c}')">
                    <span>${i.f} ${i.n}</span>
                    <span class="text-[#25D366] font-mono">+${i.c}</span>
                </div>
            `).join('');
        }

        function toggleSearch() { dropdown.classList.toggle('active'); document.getElementById('search-box').focus(); }

        function selectCountry(f, c) {
            flagDisp.innerText = f;
            dialInput.value = c;
            dropdown.classList.remove('active');
        }

        // الميزة الذكية: تغير العلم بمجرد كتابة الكود
        function codeToFlag() {
            const val = dialInput.value;
            const found = data.find(i => i.c === val);
            if (found) flagDisp.innerText = found.f;
        }

        function filterData() {
            const q = document.getElementById('search-box').value;
            const filtered = data.filter(i => i.n.includes(q) || i.c.includes(q));
            renderList(filtered);
        }

        function launch() {
            const code = dialInput.value;
            let phone = document.getElementById('phone-input').value;
            const msg = encodeURIComponent(document.getElementById('msg-text').value);
            if(!code || !phone) return alert("يا زول كمل البيانات!");
            if(phone.startsWith('0')) phone = phone.substring(1);
            window.open(`https://wa.me/${code}${phone}?text=${msg}`, '_blank');
        }

        // إغلاق عند الضغط خارجاً
        window.onclick = (e) => { if(!e.target.closest('.relative')) dropdown.classList.remove('active'); };

        renderList(data);
    </script>
</body>
</html>
