<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Pro - Search Arabic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #0b141a; color: white; font-family: 'Tajawal', sans-serif; }
        .iti { width: 100%; }
        .iti__country-list { 
            background-color: #111b21 !important; 
            border: 1px solid #2a3942 !important; 
            color: white !important;
            border-radius: 20px;
        }
        .iti__search-input {
            background-color: #202c33 !important;
            color: white !important;
            border: 1px solid #3b4a54 !important;
            padding: 12px !important;
            text-align: right; /* للبحث بالعربي */
        }
        .iti__country-name { color: #e9edef !important; }
        .iti__selected-flag { background-color: #202c33 !important; border-radius: 15px 0 0 15px !important; }
        input, textarea { background: #2a3942 !important; border: 1px solid #3b4a54 !important; color: white !important; border-radius: 18px !important; }
        .btn-green { background: #25D366; color: black; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#111b21] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
        
        <div class="flex justify-between items-center mb-8">
            <button onclick="toggleLanguage()" class="bg-[#202c33] px-4 py-2 rounded-full text-xs font-bold border border-white/10">
                <span id="lang-text">English</span>
            </button>
            <div class="w-10 h-10 bg-green-500/10 rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.767 5.767 0 3.18 2.586 5.766 5.767 5.766 3.18 0 5.766-2.586 5.766-5.766 0-3.181-2.586-5.767-5.766-5.767zm0 1.754c2.212 0 4.013 1.801 4.013 4.013s-1.801 4.013-4.013 4.013-4.013-1.801-4.013-4.013 1.801-4.013 4.013-4.013z"/></svg>
            </div>
        </div>

        <div class="text-center mb-8">
            <h2 id="title" class="text-2xl font-bold">واتساب المباشر</h2>
            <p id="subtitle" class="text-gray-400 text-sm mt-2">البحث يدعم العربية والإنجليزية</p>
        </div>

        <div class="space-y-6">
            <div dir="ltr">
                <label id="label-phone" class="block text-[11px] font-bold mb-2 text-gray-500 uppercase text-right">رقم الهاتف</label>
                <input type="tel" id="phone" class="w-full p-5 outline-none font-bold text-lg">
            </div>

            <div>
                <label id="label-msg" class="block text-[11px] font-bold mb-2 text-gray-500 uppercase">الرسالة (اختياري)</label>
                <textarea id="message" rows="3" class="w-full p-5 outline-none text-sm resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="sendWhatsApp()" class="w-full btn-green py-5 rounded-2xl font-bold text-xl active:scale-95 transition-all">
                <span id="btn-text">إرسال الآن</span>
            </button>
        </div>
    </div>

    <script>
        let currentLang = 'ar';
        const phoneInputTag = document.querySelector("#phone");

        // خارطة تعريب أسماء الدول لدعم البحث بالعربي
        const arabicCountries = {
            "sa": "السعودية", "eg": "مصر", "ae": "الإمارات", "sd": "السودان", 
            "kw": "الكويت", "qa": "قطر", "om": "عمان", "bh": "البحرين", 
            "jo": "الأردن", "ps": "فلسطين", "iq": "العراق", "lb": "لبنان", 
            "sy": "سوريا", "ma": "المغرب", "dz": "الجزائر", "tn": "تونس", 
            "ly": "ليبيا", "ye": "اليمن", "tr": "تركيا", "us": "أمريكا"
        };

        const iti = window.intlTelInput(phoneInputTag, {
            initialCountry: "sa",
            separateDialCode: true,
            countrySearch: true,
            // تعريب أسماء الدول في القائمة
            i18n: {
                searchPlaceholder: "بحث عن دولة...",
                ...arabicCountries 
            },
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });

        const translations = {
            ar: { title: "واتساب المباشر", subtitle: "البحث يدعم العربية والإنجليزية", labelPhone: "رقم الهاتف", labelMsg: "الرسالة (اختياري)", placeholderMsg: "اكتب رسالتك هنا...", btn: "إرسال الآن", langBtn: "English" },
            en: { title: "Direct WhatsApp", subtitle: "Search supports Arabic & English", labelPhone: "Phone Number", labelMsg: "Message (Optional)", placeholderMsg: "Type message...", btn: "Send Now", langBtn: "العربية" }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('html-tag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            const t = translations[currentLang];

            document.getElementById('title').innerText = t.title;
            document.getElementById('subtitle').innerText = t.subtitle;
            document.getElementById('label-phone').innerText = t.labelPhone;
            document.getElementById('label-msg').innerText = t.labelMsg;
            document.getElementById('message').placeholder = t.placeholderMsg;
            document.getElementById('btn-text').innerText = t.btn;
            document.getElementById('lang-text').innerText = t.langBtn;

            // تحديث لغة البحث في المكتبة
            iti.setOptions({
                i18n: currentLang === 'ar' ? { searchPlaceholder: "بحث...", ...arabicCountries } : { searchPlaceholder: "Search..." }
            });
        }

        function sendWhatsApp() {
            const number = iti.getNumber();
            const msg = encodeURIComponent(document.getElementById('message').value);
            if (!iti.isValidNumber()) return alert(currentLang === 'ar' ? 'الرقم غير صحيح' : 'Invalid number');
            window.open(`https://wa.me/${number.replace('+', '')}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
