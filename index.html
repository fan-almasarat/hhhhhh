<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct - Global Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Inter:wght@400;700&display=swap');
        
        body { background-color: #f0f7f2; transition: all 0.3s ease; }
        .ar { font-family: 'Tajawal', sans-serif; }
        .en { font-family: 'Inter', sans-serif; }

        .main-card { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 480px; padding: 35px; }
        
        .input-style { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; text-align: center; font-weight: bold; outline: none; transition: 0.3s; background: #fff; }
        .input-style:focus { border-color: #25D366; box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.1); }

        /* قائمة الدول المنسدلة */
        .dropdown-box { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #e2e8f0; border-radius: 12px; 
            max-height: 250px; overflow-y: auto; z-index: 100; display: none;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); margin-top: 5px;
        }
        .country-row { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .country-row:hover { background: #f0fdf4; }

        .dial-container { display: flex; align-items: center; background: #f1f5f9; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 0 15px; width: 130px; }
        .dial-container input { background: transparent; border: none; width: 100%; text-align: center; font-weight: bold; outline: none; padding: 14px 0; font-size: 16px; }

        .btn-action { background: #4cd964; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 15px rgba(76, 217, 100, 0.3); }
        .btn-action:hover { background: #3ec455; transform: translateY(-2px); }

        .floating-install { position: fixed; bottom: 25px; background: #1a73e8; color: white; padding: 14px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3); cursor: pointer; z-index: 1000; display: flex; align-items: center; gap: 8px; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 ar">

    <div class="main-card relative">
        <button onclick="toggleLanguage()" class="absolute top-4 left-4 bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-xs font-bold hover:bg-gray-200 transition">
            <span id="btn-lang-toggle">English</span>
        </button>

        <div class="text-center mb-10">
            <h1 id="txt-title" class="text-2xl font-bold text-gray-800">دردشة مباشرة</h1>
            <p id="txt-subtitle" class="text-gray-400 text-xs mt-2">راسل أي رقم في العالم بضغطة زر</p>
        </div>

        <div class="mb-6 relative" id="search-area">
            <label id="lbl-search" class="text-[11px] font-bold text-gray-400 mb-2 block text-center uppercase tracking-widest">ابحث عن الدولة:</label>
            <input type="text" id="country-search" class="input-style" placeholder="اكتب اسم الدولة..." onfocus="openDropdown()" oninput="filterCountries()">
            <div id="dropdown" class="dropdown-box"></div>
        </div>

        <div class="flex gap-3 items-end mb-8" id="inputs-wrapper">
            <div class="flex flex-col items-center gap-1">
                <label id="lbl-code" class="text-[10px] font-bold text-gray-400 uppercase">الرمز</label>
                <div class="dial-container">
                    <img id="flag-img" src="https://flagcdn.com/w40/sa.png" class="w-6 rounded-sm shadow-sm">
                    <span class="text-green-600 font-bold ml-1">+</span>
                    <input type="number" id="manual-code" value="966" oninput="syncByCode()">
                </div>
            </div>

            <div class="flex-1">
                <label id="lbl-phone" class="text-[10px] font-bold text-gray-400 mb-1 block">الرقم المحلي</label>
                <input type="number" id="phone-input" placeholder="50xxxxxxx" class="input-style">
            </div>
        </div>

        <button onclick="sendWhatsApp()" class="btn-action" id="btn-chat">بدء المحادثة الآن</button>
    </div>

    <div class="floating-install" id="btn-install">
        <span>📲</span>
        <span id="txt-install">تثبيت التطبيق</span>
    </div>

    <script>
        // قاعدة بيانات ضخمة (أهم الدول مع دعم اللغتين)
        const countries = [
            { ar: "السعودية", en: "Saudi Arabia", c: "966", i: "sa" },
            { ar: "مصر", en: "Egypt", c: "20", i: "eg" },
            { ar: "السودان", en: "Sudan", c: "249", i: "sd" },
            { ar: "الإمارات", en: "UAE", c: "971", i: "ae" },
            { ar: "الكويت", en: "Kuwait", c: "965", i: "kw" },
            { ar: "قطر", en: "Qatar", c: "974", i: "qa" },
            { ar: "الأردن", en: "Jordan", c: "962", i: "jo" },
            { ar: "سلطنة عمان", en: "Oman", c: "968", i: "om" },
            { ar: "البحرين", en: "Bahrain", c: "973", i: "bh" },
            { ar: "اليمن", en: "Yemen", c: "967", i: "ye" },
            { ar: "العراق", en: "Iraq", c: "964", i: "iq" },
            { ar: "فلسطين", en: "Palestine", c: "970", i: "ps" },
            { ar: "لبنان", en: "Lebanon", c: "961", i: "lb" },
            { ar: "سوريا", en: "Syria", c: "963", i: "sy" },
            { ar: "تركيا", en: "Turkey", c: "90", i: "tr" },
            { ar: "المغرب", en: "Morocco", c: "212", i: "ma" },
            { ar: "تونس", en: "Tunisia", c: "216", i: "tn" },
            { ar: "الجزائر", en: "Algeria", c: "213", i: "dz" },
            { ar: "ليبيا", en: "Libya", c: "218", i: "ly" },
            { ar: "أمريكا", en: "USA", c: "1", i: "us" },
            { ar: "بريطانيا", en: "UK", c: "44", i: "gb" },
            { ar: "فرنسا", en: "France", c: "33", i: "fr" },
            { ar: "ألمانيا", en: "Germany", c: "49", i: "de" }
        ];

        let lang = 'ar';
        const searchInput = document.getElementById('country-search');
        const manualCode = document.getElementById('manual-code');
        const flagImg = document.getElementById('flag-img');
        const dropdown = document.getElementById('dropdown');

        function toggleLanguage() {
            lang = lang === 'ar' ? 'en' : 'ar';
            const root = document.getElementById('html-root');
            root.dir = lang === 'ar' ? 'rtl' : 'ltr';
            root.className = `flex flex-col items-center justify-center min-h-screen p-4 ${lang}`;
            
            document.getElementById('txt-title').innerText = lang === 'ar' ? "دردشة مباشرة" : "Direct Chat";
            document.getElementById('txt-subtitle').innerText = lang === 'ar' ? "راسل أي رقم في العالم بضغطة زر" : "Message any global number instantly";
            document.getElementById('lbl-search').innerText = lang === 'ar' ? "ابحث عن الدولة:" : "Search Country:";
            document.getElementById('lbl-code').innerText = lang === 'ar' ? "الرمز" : "Code";
            document.getElementById('lbl-phone').innerText = lang === 'ar' ? "الرقم المحلي" : "Local Number";
            document.getElementById('btn-chat').innerText = lang === 'ar' ? "بدء المحادثة الآن" : "Start Chat Now";
            document.getElementById('txt-install').innerText = lang === 'ar' ? "تثبيت التطبيق" : "Install App";
            document.getElementById('btn-lang-toggle').innerText = lang === 'ar' ? "English" : "العربية";
            searchInput.placeholder = lang === 'ar' ? "اكتب اسم الدولة..." : "Type country name...";
            
            syncByCode(); // تحديث اسم الدولة في الحقل حسب اللغة
        }

        function openDropdown() { dropdown.style.display = 'block'; renderList(countries); }

        function renderList(list) {
            dropdown.innerHTML = list.map(c => `
                <div class="country-row" onclick="selectCountry('${c[lang]}', '${c.c}', '${c.i}')">
                    <span>${c[lang]}</span>
                    <span class="text-green-600 font-bold">+${c.c}</span>
                </div>
            `).join('');
        }

        function filterCountries() {
            const term = searchInput.value.toLowerCase();
            const filtered = countries.filter(c => c.ar.includes(term) || c.en.toLowerCase().includes(term) || c.c.includes(term));
            renderList(filtered);
        }

        function selectCountry(name, code, iso) {
            searchInput.value = name;
            manualCode.value = code;
            flagImg.src = `https://flagcdn.com/w40/${iso}.png`;
            dropdown.style.display = 'none';
        }

        function syncByCode() {
            const code = manualCode.value;
            const found = countries.find(c => c.c === code);
            if (found) {
                searchInput.value = found[lang];
                flagImg.src = `https://flagcdn.com/w40/${found.i}.png`;
            } else {
                searchInput.value = lang === 'ar' ? "دولة غير مسجلة" : "Unknown Country";
            }
        }

        function sendWhatsApp() {
            const code = manualCode.value;
            let num = document.getElementById('phone-input').value;
            if(!code || !num) return alert(lang === 'ar' ? "البيانات ناقصة يا زول!" : "Data is missing!");
            if(num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${code}${num}`, '_blank');
        }

        // إغلاق المنسدلة عند الضغط خارجها
        document.addEventListener('click', (e) => { if(!e.target.closest('#search-area')) dropdown.style.display = 'none'; });

        window.onload = () => { syncByCode(); };
    </script>
</body>
</html>
