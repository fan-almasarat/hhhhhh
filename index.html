<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Direct Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="app-container">
        <nav class="top-nav">
            <button id="langBtn" class="nav-btn" onclick="toggleAppLanguage()">العربية</button>
            <button id="installBtn" class="install-btn" style="display: none;">📲 Install</button>
        </nav>

        <header class="header">
            <h1 id="mainTitle">Direct Chat</h1>
            <p id="subTitle">Chat on WhatsApp without saving numbers.</p>
        </header>

        <main class="content-area">
            
            <div class="input-wrapper search-section">
                <label id="lblCountry">Select Country</label>
                <div class="search-container">
                    <input type="text" id="countrySearch" placeholder="Search country..." autocomplete="off">
                    <i class="fas fa-search search-icon"></i>
                    <div id="countriesDropdown" class="custom-dropdown"></div>
                </div>
            </div>

            <div class="phone-container">
                <div class="code-badge">
                    <span id="flagIcon" class="flag-icon flag-icon-us"></span>
                    <span id="codeText">+1</span>
                </div>
                <input type="tel" id="phoneNumber" placeholder="Phone Number" inputmode="numeric">
            </div>

            <button id="startChatBtn" class="main-action-btn" onclick="startWhatsAppChat()">
                <i class="fab fa-whatsapp"></i> <span id="btnChatText">Start Chat</span>
            </button>

        </main>

        <footer class="footer-area">
            <p id="shareLabel">Share App</p>
            <button class="share-system-btn" onclick="shareAppNative()">
                <i class="fas fa-share-nodes"></i> <span id="btnShareText">Share with friends</span>
            </button>
            <div class="copyright">
                <p>© 2026 Direct Chat App</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
</html>
