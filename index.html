<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة مباشرة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand: #00a884; --bg: #ffffff; --surface: #f0f2f5; --text: #111b21; --gray: #667781; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
        .app-shell { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: var(--bg); position: relative; }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo-box { display: flex; align-items: center; gap: 10px; color: var(--brand); }
        .logo-box h1 { font-size: 20px; font-weight: 800; }
        
        .btn-lang { background: var(--brand); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        label { font-size: 14px; font-weight: 700; color: var(--gray); margin-bottom: 5px; display: block; }

        .input-group { background: var(--surface); border-radius: 15px; }
        .search-field { width: 100%; padding: 16px; border: none; background: transparent; font-size: 16px; outline: none; }
        .results-panel { background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto; display: none; margin-top: 5px; position: absolute; width: 93%; z-index: 100; }
        .c-item { padding: 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }

        .phone-row { display: flex; gap: 10px; }
        .code-box { width: 110px; background: var(--surface); border-radius: 15px; display: flex; align-items: center; justify-content: center; padding: 0 10px; }
        .code-input { width: 100%; border: none; background: transparent; font-weight: 900; font-size: 18px; text-align: center; outline: none; color: var(--text); }
        .phone-input { flex: 1; padding: 18px; background: var(--surface); border-radius: 15px; border: none; font-size: 20px; font-weight: 900; outline: none; }

        .message-box { width: 100%; padding: 15px; background: var(--surface); border-radius: 15px; border: none; font-size: 16px; resize: none; outline: none; min-height: 90px; }

        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .chip { background: #e7f8ef; color: var(--brand); border: none; padding: 10px 18px; border-radius: 25px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }

        .btn-large { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 17px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-secondary { background: var(--text); color: #fff; }

        /* زر التثبيت النبضي */
        .btn-install { 
            background: linear-gradient(45deg, #00c6ff, #0072ff); 
            color: white; border: none; padding: 15px; border-radius: 15px; 
            font-weight: 900; margin-top: 5px; display: none; cursor: pointer;
            animation: pulse-animation 2s infinite; 
        }
        @keyframes pulse-animation {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 114, 255, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(0, 114, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 114, 255, 0); }
        }

        /* المودال */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 5000; display: none; align-items: flex-end; }
        .modal-sheet { background: #fff; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; transform: translateY(100%); transition: 0.3s ease-out; }
        .modal-sheet.open { transform: translateY(0); }
        .h-row { padding: 18px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; }

        footer { background: #fff; padding: 12px 5px; border-top: 1px solid #eee; display: flex; justify-content: space-around; }
        .nav-item { border: none; background: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--brand); }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 11px; font-weight: 800; }

        #qr-screen { position: fixed; inset: 0; background: #000; z-index: 6000; display: none; }
        #v-stream { width: 100%; height: 100%; object-fit: cover; }
        .v-overlay { position: absolute; inset: 0; margin: auto; width: 260px; height: 260px; border: 4px solid var(--brand); border-radius: 30px; box-shadow: 0 0 0 5000px rgba(0,0,0,0.6); }

        body.en { direction: ltr; }
    </style>
</head>
<body id="app-body">

<div id="qr-screen">
    <button onclick="closeQR()" style="position:absolute; top:40px; left:50%; transform:translateX(-50%); z-index:100; padding:12px 30px; border-radius:30px; background:red; color:white; border:none; font-weight:bold;">إلغاء</button>
    <video id="v-stream" playsinline></video>
    <div class="v-overlay"></div>
</div>

<div class="app-shell">
    <header>
        <div class="logo-box"><i class="fas fa-paper-plane"></i> <h1 id="txt-title">دردشة مباشرة</h1></div>
        <button class="btn-lang" onclick="changeLang()" id="lang-btn">English</button>
    </header>

    <main>
        <div>
            <label id="txt-search">البحث عن الدولة</label>
            <div class="input-group">
                <input type="text" id="countryInput" class="search-field" placeholder="السودان، مصر، 249...">
            </div>
            <div id="countryResults" class="results-panel"></div>
        </div>

        <div>
            <label id="txt-phone">رقم الجوال</label>
            <div class="phone-row">
                <div class="code-box">
                    <span id="flagIcon" class="flag-icon flag-icon-sd"></span>
                    <span style="margin:0 5px;">+</span>
                    <input type="tel" id="dialCode" class="code-input" value="249">
                </div>
                <input type="tel" id="phoneNumber" class="phone-input" placeholder="ادخل الرقم">
            </div>
        </div>

        <div>
            <label id="txt-msg">الرسالة</label>
            <textarea id="messageText" class="message-box"></textarea>
            <div class="suggestions" id="suggestionsBox"></div>
        </div>

        <button class="btn-large btn-primary" onclick="openWhatsApp()">
            <span id="txt-btn-send">بدء المراسلة الآن</span> <i class="fas fa-comment-dots"></i>
        </button>

        <button class="btn-large btn-secondary" onclick="openQR()">
            <i class="fas fa-qrcode"></i> <span id="txt-btn-qr">مسح باركود واتساب</span>
        </button>

        <button id="pwaInstallBtn" class="btn-install">
            <i class="fas fa-download"></i> <span id="txt-install">تثبيت التطبيق على هاتفك</span>
        </button>
    </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeHistory()">
        <div class="modal-sheet" id="modalSheet" onclick="event.stopPropagation()">
            <h2 style="text-align:center; margin-bottom:20px;" id="txt-hist-title">آخر المراسلات</h2>
            <div id="historyContent"></div>
            <button onclick="closeHistory()" style="width:100%; padding:15px; margin-top:15px; border:none; border-radius:15px; background:var(--surface); font-weight:bold;">إغلاق</button>
        </div>
    </div>

    <footer>
        <button class="nav-item active" onclick="location.reload()"><i class="fas fa-house"></i><span id="n1">الرئيسية</span></button>
        <button class="nav-item" onclick="openHistory()"><i class="fas fa-history"></i><span id="n2">السجل</span></button>
        <a href="https://linktr.ee/abdul3ziz95" target="_blank" class="nav-item"><i class="fas fa-headset"></i><span id="n3">الدعم</span></a>
        <button class="nav-item" onclick="shareMe()"><i class="fas fa-share-nodes"></i><span id="n4">مشاركة</span></button>
    </footer>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
    let countries = [];
    let currentLang = 'ar';
    const qrReader = new ZXing.BrowserMultiFormatReader();

    async function setup() {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2,translations');
        const data = await res.json();
        countries = data.map(c => ({
            ar: c.translations.ara ? c.translations.ara.common : c.name.common,
            en: c.name.common,
            code: c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : ""),
            flag: c.cca2.toLowerCase()
        })).sort((a,b) => a.ar.localeCompare(b.ar));
        
        try {
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            const found = countries.find(c => c.flag === geo.country.toLowerCase());
            if(found) setCountry(found);
        } catch(e) {}
        
        renderSugs(); // استدعاء فوري للرسائل العربية
        updateTexts(); // تحديث النصوص الأولية
    }

    document.getElementById('countryInput').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        const resDiv = document.getElementById('countryResults');
        resDiv.innerHTML = '';
        if(!v) { resDiv.style.display='none'; return; }
        const filter = countries.filter(c => c.ar.includes(v) || c.en.toLowerCase().includes(v) || c.code.includes(v));
        if(filter.length > 0) {
            resDiv.style.display='block';
            filter.forEach(c => {
                const div = document.createElement('div');
                div.className = 'c-item';
                div.innerHTML = `<span class="flag-icon flag-icon-${c.flag}"></span> ${currentLang=='ar'?c.ar:c.en} (${c.code})`;
                div.onclick = () => { setCountry(c); resDiv.style.display='none'; document.getElementById('countryInput').value=''; };
                resDiv.appendChild(div);
            });
        }
    };

    function setCountry(c) {
        document.getElementById('dialCode').value = c.code.replace('+','');
        document.getElementById('flagIcon').className = `flag-icon flag-icon-${c.flag}`;
    }

    function changeLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('app-body').className = currentLang;
        document.getElementById('app-body').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateTexts();
        renderSugs();
    }

    function updateTexts() {
        const UI = {
            ar: ["دردشة مباشرة", "البحث عن الدولة", "رقم الجوال", "ادخل الرقم", "الرسالة", "بدء المراسلة الآن", "مسح باركود واتساب", "آخر المراسلات", "الرئيسية", "السجل", "الدعم", "مشاركة", "English", "تثبيت التطبيق على هاتفك", "السلام عليكم"],
            en: ["Direct Chat", "Search Country", "Phone Number", "Enter Number", "Message", "Start Messaging Now", "Scan WhatsApp QR", "Recent History", "Home", "History", "Support", "Share", "العربية", "Install App on Phone", "Hello there"]
        };
        const L = UI[currentLang];
        document.getElementById('txt-title').innerText = L[0];
        document.getElementById('txt-search').innerText = L[1];
        document.getElementById('txt-phone').innerText = L[2];
        document.getElementById('phoneNumber').placeholder = L[3];
        document.getElementById('txt-msg').innerText = L[4];
        document.getElementById('txt-btn-send').innerText = L[5];
        document.getElementById('txt-btn-qr').innerText = L[6];
        document.getElementById('txt-hist-title').innerText = L[7];
        document.getElementById('n1').innerText = L[8];
        document.getElementById('n2').innerText = L[9];
        document.getElementById('n3').innerText = L[10];
        document.getElementById('n4').innerText = L[11];
        document.getElementById('lang-btn').innerText = L[12];
        document.getElementById('txt-install').innerText = L[13];
        document.getElementById('messageText').value = L[14];
    }

    function renderSugs() {
        const s = currentLang === 'ar' ? ["السلام عليكم", "بكم السعر؟", "أرسل الموقع", "متوفر؟"] : ["Hi", "Price?", "Location", "Available?"];
        const box = document.getElementById('suggestionsBox');
        box.innerHTML = '';
        s.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'chip'; btn.innerText = t;
            btn.onclick = () => document.getElementById('messageText').value = t;
            box.appendChild(btn);
        });
    }

    function openWhatsApp() {
        const full = document.getElementById('dialCode').value.replace(/\D/g,'') + document.getElementById('phoneNumber').value.replace(/\D/g,'');
        const msg = encodeURIComponent(document.getElementById('messageText').value);
        if(full.length > 7) {
            let h = JSON.parse(localStorage.getItem('zh_v5') || '[]');
            if(!h.includes(full)) { h.unshift(full); localStorage.setItem('zh_v5', JSON.stringify(h.slice(0,10))); }
            window.location.href = `https://wa.me/${full}?text=${msg}`;
        }
    }

    async function openQR() {
        document.getElementById('qr-screen').style.display='block';
        try {
            const devs = await qrReader.listVideoInputDevices();
            qrReader.decodeFromVideoDevice(devs.find(d => d.label.includes('back'))?.deviceId || devs[0].deviceId, 'v-stream', (res) => {
                if(res) {
                    closeQR();
                    if(res.text.includes('wa.me')) window.location.href = res.text;
                    else { document.getElementById('phoneNumber').value = res.text.replace(/\D/g,''); openWhatsApp(); }
                }
            });
        } catch(e) { closeQR(); }
    }
    function closeQR() { qrReader.reset(); document.getElementById('qr-screen').style.display='none'; }

    function openHistory() {
        const list = document.getElementById('historyContent'); list.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('zh_v5') || '[]');
        h.forEach(n => {
            const row = document.createElement('div'); row.className = 'h-row';
            row.innerHTML = `<b>+${n}</b> <i class="fab fa-whatsapp" style="color:#25d366"></i>`;
            row.onclick = () => { document.getElementById('phoneNumber').value = n; closeHistory(); };
            list.appendChild(row);
        });
        document.getElementById('modalOverlay').style.display='flex';
        setTimeout(() => document.getElementById('modalSheet').classList.add('open'), 10);
    }
    function closeHistory() {
        document.getElementById('modalSheet').classList.remove('open');
        setTimeout(() => document.getElementById('modalOverlay').style.display='none', 300);
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('pwaInstallBtn').style.display = 'block';
    });
    document.getElementById('pwaInstallBtn').onclick = () => {
        if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
    };

    function shareMe() { navigator.share({title: 'دردشة مباشرة', url: location.href}); }
    window.onload = setup;
</script>
</body>
</html>
