<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { background-color: #0b141a; color: white; font-family: 'Tajawal', sans-serif; }
        .input-card { background: #111b21; border: 1px solid rgba(255,255,255,0.05); }
        .field-bg { background: #2a3942; border: 1px solid #3b4a54; }
        .search-list { display: none; position: absolute; top: 100%; right: 0; width: 250px; max-height: 300px; background: #202c33; border: 1px solid #3b4a54; z-index: 50; overflow-y: auto; border-radius: 12px; }
        .search-list.active { display: block; }
        .country-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #2a3942; }
        .country-item:hover { background: #2a3942; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md input-card p-8 rounded-[2rem] shadow-2xl relative">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-[#25D366]">واتساب المباشر</h2>
            <p class="text-gray-400 text-xs mt-2">اكتب الكود وسيتغير العلم تلقائياً</p>
        </div>

        <div class="space-y-6">
            <div class="relative">
                <label class="text-[11px] font-bold text-gray-500 uppercase mr-2 tracking-widest">رقم الهاتف</label>
                <div class="flex items-center field-bg rounded-2xl overflow-hidden mt-2 p-1" dir="ltr">
                    <div class="relative px-3 cursor-pointer border-r border-[#3b4a54]" onclick="toggleSearch()">
                        <span id="current-flag" class="text-2xl">🇸🇦</span>
                        <div id="country-list" class="search-list text-right" dir="rtl">
                            <input type="text" id="search-input" placeholder="بحث بالعربي..." class="w-full p-2 bg-[#111b21] border-none text-sm outline-none" oninput="filterCountries()">
                            <div id="countries-render"></div>
                        </div>
                    </div>
                    <div class="flex items-center text-[#25D366] font-bold px-2">
                        <span>+</span>
                        <input type="number" id="dial-code" value="966" class="w-16 bg-transparent outline-none text-center text-lg" oninput="updateFlagByCode()">
                    </div>
                    <input type="number" id="phone-num" placeholder="50xxxxxxx" class="flex-1 bg-transparent p-4 outline-none text-lg">
                </div>
            </div>

            <div class="text-right">
                <label class="text-[11px] font-bold text-gray-500 uppercase mr-2 tracking-widest">الرسالة</label>
                <textarea id="msg" rows="3" class="w-full field-bg rounded-2xl p-4 mt-2 text-sm outline-none focus:border-[#25D366] resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button onclick="send()" class="w-full bg-[#25D366] hover:bg-[#1ebd5e] text-black py-4 rounded-xl font-bold text-lg transition-all active:scale-95 shadow-lg">
                بدء المحادثة
            </button>
        </div>
    </div>

    <script>
        const countries = [
            {n: "السعودية", c: "966", f: "🇸🇦"}, {n: "مصر", c: "20", f: "🇪🇬"},
            {n: "الإمارات", c: "971", f: "🇦🇪"}, {n: "السودان", c: "249", f: "🇸🇩"},
            {n: "الكويت", c: "965", f: "🇰🇼"}, {n: "قطر", c: "974", f: "🇶🇦"},
            {n: "عمان", c: "968", f: "🇴🇲"}, {n: "البحرين", c: "973", f: "🇧🇭"},
            {n: "الأردن", c: "962", f: "🇯🇴"}, {n: "العراق", c: "964", f: "🇮🇶"},
            {n: "اليمن", c: "967", f: "🇾🇪"}, {n: "المغرب", c: "212", f: "🇲🇦"}
        ];

        function renderCountries(data) {
            const container = document.getElementById('countries-render');
            container.innerHTML = data.map(item => `
                <div class="country-item flex justify-between items-center" onclick="selectCountry('${item.f}', '${item.c}')">
                    <span>${item.f} ${item.n}</span>
                    <span class="text-[#25D366] font-mono">+${item.c}</span>
                </div>
            `).join('');
        }

        function toggleSearch() { document.getElementById('country-list').classList.toggle('active'); }

        function selectCountry(flag, code) {
            document.getElementById('current-flag').innerText = flag;
            document.getElementById('dial-code').value = code;
            toggleSearch();
        }

        // ميزة تغيير العلم عند كتابة الكود يدوياً
        function updateFlagByCode() {
            const code = document.getElementById('dial-code').value;
            const found = countries.find(item => item.c === code);
            if (found) {
                document.getElementById('current-flag').innerText = found.f;
            }
        }

        function filterCountries() {
            const q = document.getElementById('search-input').value;
            const filtered = countries.filter(i => i.n.includes(q) || i.c.includes(q));
            renderCountries(filtered);
        }

        function send() {
            const code = document.getElementById('dial-code').value;
            let num = document.getElementById('phone-num').value;
            const text = encodeURIComponent(document.getElementById('msg').value);
            if(!code || !num) return alert("يرجى إكمال البيانات");
            if(num.startsWith('0')) num = num.substring(1);
            window.open(`https://wa.me/${code}${num}?text=${text}`, '_blank');
        }

        // إغلاق القائمة عند الضغط خارجها
        window.onclick = function(event) {
            if (!event.target.closest('.relative')) {
                document.getElementById('country-list').classList.remove('active');
            }
        }

        renderCountries(countries);
    </script>
</body>
</html>
